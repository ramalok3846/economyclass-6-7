    // ============================================================================

    const formatMoney = (num) => new Intl.NumberFormat('ko-KR').format(Math.floor(num || 0)) + 'G';
    const formatDate = (dateInput) => {
      const d = new Date(dateInput);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    };
    const getYYYYMMDD = (dateInput) => {
      const d = new Date(dateInput);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };
    const getThisWeekDays = () => {
      const curr = new Date(); const day = curr.getDay(); const diff = curr.getDate() - day + (day === 0 ? -6 : 1); 
      const startOfWeek = new Date(curr.setDate(diff)); const days = [];
      for(let i=0; i<5; i++) { const d = new Date(startOfWeek); d.setDate(startOfWeek.getDate() + i); days.push(d); }
      return days;
    };
    const parseAmount = (str) => parseInt(String(str).replace(/[^0-9-]/g, ''), 10) || 0;
    const applyConversion = (rawPrice, settings) => {
      if (!settings) return rawPrice;
      let price = rawPrice / (settings.divideBy || 100);
      const mult = Math.pow(10, settings.decimals || 0);
      if (settings.roundMode === 'round') price = Math.round(price * mult) / mult;
      else if (settings.roundMode === 'ceil') price = Math.ceil(price * mult) / mult;
      else if (settings.roundMode === 'floor') price = Math.floor(price * mult) / mult;
      return price;
    };
    const convertGoogleSheetUrl = (url) => {
      if (!url) return '';
      if (url.includes('/gviz/tq?tqx=out:csv')) return url; 
      const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
      if (match && match[1]) {
        const sheetId = match[1]; const gidMatch = url.match(/[#&]gid=([0-9]+)/);
        return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv${gidMatch ? `&gid=${gidMatch[1]}` : ''}`;
      }
      return url;
    };
    const handleImageCompression = (e, callback) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader(); reader.readAsDataURL(file);
      reader.onload = (event) => {
        const img = new Image(); img.src = event.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas'); const MAX_WIDTH = 256; const scaleSize = MAX_WIDTH / img.width;
          canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
          const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          callback(canvas.toDataURL('image/jpeg', 0.6));
        };
      };
    };

    const Modal = ({ isOpen, title, children, onClose, iconStr, color = 'purple' }) => {

    const CustomDropdown = ({ options, value, onChange, placeholder }) => (
      <select className="w-full bg-purple-50 border-2 border-purple-100 text-purple-900 rounded-2xl px-5 py-4 font-bold outline-none focus:border-purple-400 transition-colors" value={value} onChange={e=>onChange(e.target.value)}>

    // ============================================================================
    // [5] 뷰 컴포넌트들
    // ============================================================================
    
    // --- [1] 로그인 화면 ---
    function LoginView({ onLogin, users, showAlert }) {
      const [selectedUser, setSelectedUser] = useState(null); const [password, setPassword] = useState('');
      const [useAuto, setUseAuto] = useState(false); const [useSession, setUseSession] = useState(true);
      const [isLoggingIn, setIsLoggingIn] = useState(false); const [isUserModalOpen, setIsUserModalOpen] = useState(false);
      const sortedUsers = [...users].sort((a, b) => (a.role === 'admin' ? 1 : b.role === 'admin' ? -1 : a.name.localeCompare(b.name)));

      const handleSubmit = (e) => {

        if (!password) return showAlert('비밀번호를 입력해주세요.');
        if (String(selectedUser.pass) !== String(password)) return showAlert('비밀번호가 일치하지 않습니다.');
        setIsLoggingIn(true); setTimeout(() => onLogin(selectedUser.id, selectedUser, useAuto, useSession), 800);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 relative z-0 bg-gradient-to-br from-purple-900 via-indigo-900 to-purple-950 animate-gradient">
          <div className="bg-white rounded-[2.5rem] p-8 sm:p-10 shadow-2xl w-full max-w-md animate-zoom-in border-4 border-purple-200/50">
            <div className="flex flex-col items-center mb-8">
              <div className="w-20 h-20 bg-gradient-to-tr from-fuchsia-600 to-purple-600 rounded-3xl flex items-center justify-center shadow-xl mb-4 text-white"><i className="fa-solid fa-graduation-cap text-4xl"></i></div>
              <h1 className="text-3xl font-black text-purple-950 text-center tracking-tight">HH 경제교실</h1>

            </div>
            {!selectedUser ? (
              <div className="animate-fade-in"><button onClick={() => setIsUserModalOpen(true)} className="w-full bg-white border-2 border-purple-200 text-purple-900 text-xl font-black py-5 rounded-2xl shadow-sm hover:border-purple-500 transition-colors flex justify-between items-center px-6"><span>내 이름 선택하기</span><i className="fa-solid fa-users text-purple-400"></i></button></div>
            ) : (
              <form onSubmit={handleSubmit} className="space-y-6 animate-fade-in">
                <div className="flex items-center gap-4 bg-purple-50 p-4 rounded-2xl border-2 border-purple-100">
                  <div className="flex-1"><span className="text-xs font-bold text-purple-500">선택된 사용자</span><p className="text-xl font-black text-purple-900">{selectedUser.name} <span className="text-sm font-bold text-purple-400">({selectedUser.role === 'admin' ? '관리자' : '학생'})</span></p></div>
                  <button type="button" onClick={() => {setSelectedUser(null); setPassword('');}} className="bg-white border-2 border-purple-200 text-purple-600 px-4 py-2 rounded-xl font-bold text-sm hover:bg-purple-100">변경</button>
                </div>
                <input type="password" autoFocus placeholder="비밀번호 입력" className="w-full bg-white border-2 border-purple-200 text-purple-900 text-center text-2xl tracking-widest rounded-2xl px-5 py-4 outline-none focus:border-purple-600 font-black shadow-inner" value={password} onChange={(e) => setPassword(e.target.value)} />

                  {selectedUser.role !== 'admin' && <label className="flex items-center gap-3 cursor-pointer"><input type="checkbox" checked={useSession} onChange={e=>setUseSession(e.target.checked)} className="w-5 h-5 accent-purple-600 rounded" /><span className="font-bold text-slate-700 text-sm">보안 세션 켜기 (미조작시 자동 로그아웃)</span></label>}

    // --- [2] 대시보드 화면 ---
    function DashboardView({ assets, dbData, db, showAlert, showConfirm, setGlobalView }) {
      const [modal, setModal] = useState(null); const [selectedTxs, setSelectedTxs] = useState([]);
      const [tTarget, setTTarget] = useState(''); const [tAmount, setTAmt] = useState('');
      const [aIds, setAIds] = useState([]); const [aType, setAType] = useState('add'); const [aAmt, setAAmt] = useState(''); const [aReason, setAReason] = useState('');
      const [adminSelfType, setAdminSelfType] = useState('add'); const [adminSelfAmount, setAdminSelfAmount] = useState('');
      const usersList = Object.values(dbData.users).filter(u => u.role === 'student');

      const executeTransfer = async (e) => {
        e.preventDefault(); const amt = parseInt(tAmount, 10);
        if (!tTarget || isNaN(amt) || amt <= 0) return;
        const trMin = dbData.settings?.transferMin || 0; const trMax = dbData.settings?.transferMax || 0; const trFee = dbData.settings?.transferFee || 0;
        const totalCost = amt + trFee;
        if (trMin > 0 && amt < trMin) return showAlert(`최소 송금액은 ${formatMoney(trMin)}입니다.`);
        if (trMax > 0 && amt > trMax) return showAlert(`최대 송금액은 ${formatMoney(trMax)}입니다.`);
        if (totalCost > assets.cash) return showAlert(`현금이 부족합니다. (수수료 포함: ${formatMoney(totalCost)})`);
        const targetUser = dbData.users[tTarget];
        const hasRecent = (dbData.txs || []).some(tx => tx.userId === assets.id && tx.type === '송금' && tx.desc.includes(targetUser.name) && Date.now() - tx.timestamp < 7*24*3600000);
        showConfirm(hasRecent ? `정말 ${targetUser.name}님에게 ${formatMoney(amt)}을 송금하시겠습니까?` : `⚠️ 주의: 최근 1주일 내 송금 기록이 없습니다. 정말 송금할까요?`, async () => {
          const updates = {};
          updates[`economy_users/${assets.id}/cash`] = assets.cash - totalCost; updates[`economy_users/${tTarget}/cash`] = targetUser.cash + amt;
          const tx1 = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tx1}`] = { id: tx1, userId: assets.id, type: '송금', desc: `${targetUser.name}에게 이체`, amount: `-${formatMoney(amt)}`, balance: formatMoney(assets.cash-amt), isPositive: false, timestamp: Date.now() };
          if (trFee > 0) { const txFee = db.ref('economy_transactions').push().key; updates[`economy_transactions/${txFee}`] = { id: txFee, userId: assets.id, type: '수수료', desc: `송금 수수료`, amount: `-${formatMoney(trFee)}`, balance: formatMoney(assets.cash-totalCost), isPositive: false, timestamp: Date.now()+1 }; }
          const tx2 = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tx2}`] = { id: tx2, userId: tTarget, type: '입금', desc: `${assets.name}으로부터 입금`, amount: `+${formatMoney(amt)}`, balance: formatMoney(targetUser.cash+amt), isPositive: true, timestamp: Date.now()+2 };
          await db.ref('/').update(updates); setModal(null); setTTarget(''); setTAmt(''); showAlert('송금을 완료했습니다.');
        });
      };

      const executeAdminAction = async (e) => {
        e.preventDefault(); const amt = parseInt(aAmt, 10);
        if (aIds.length === 0 || isNaN(amt) || amt <= 0) return;
        const updates = {};
        aIds.forEach((id, idx) => {
          const u = dbData.users[id]; const newCash = aType === 'add' ? u.cash + amt : u.cash - amt;
          updates[`economy_users/${id}/cash`] = newCash;
          const txRef = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${txRef}`] = { id: txRef, userId: id, type: aType==='add'?'시스템 지급':'시스템 차감', desc: aReason||'관리자 반영', amount: (aType==='add'?'+':'-')+formatMoney(amt), balance: formatMoney(newCash), isPositive: aType==='add', timestamp: Date.now()+idx };
        });
        await db.ref('/').update(updates); setModal(null); setAIds([]); setAAmt(''); setAReason(''); showAlert('학생 자산 변경 완료!');
      };

      const executeAdminSelf = async (e) => {
        e.preventDefault(); const amt = parseInt(adminSelfAmount, 10);
        if (isNaN(amt) || amt <= 0) return;
        const newCash = adminSelfType === 'add' ? assets.cash + amt : assets.cash - amt;
        const updates = {}; updates[`economy_users/${assets.id}/cash`] = newCash;
        const txRef = db.ref('economy_transactions').push().key;
        updates[`economy_transactions/${txRef}`] = { id: txRef, userId: assets.id, type: '시스템 관리', desc: adminSelfType==='add'?'내 지갑 돈 생성':'돈 버리기', amount: (adminSelfType==='add'?'+':'-')+formatMoney(amt), balance: formatMoney(newCash), isPositive: adminSelfType==='add', timestamp: Date.now() };
        await db.ref('/').update(updates); setModal(null); setAdminSelfAmount(''); showAlert("선생님 자산 업데이트 완료!");
      };

      const deleteTxs = (restore) => {
        if(selectedTxs.length === 0) return;
        showConfirm(`선택한 ${selectedTxs.length}개의 내역을 삭제${restore?'하고 금액을 복원':''}할까요?`, async () => {
          const updates = {};
          selectedTxs.forEach((txId, idx) => {
            const tx = dbData.txs.find(t => t.id === txId); if(!tx) return;

    // --- [3] 벌금 전용 탭 (FinesView) ---
    function FinesView({ assets, dbData, db, showAlert, showConfirm }) {
      const [tab, setTab] = useState(assets.role === 'admin' || assets.canFine ? 'impose' : 'my');
      const [modal, setModal] = useState(null); 
      const [fIds, setFIds] = useState([]); const [fAmt, setFAmt] = useState(''); const [fReason, setFReason] = useState(''); const [fNote, setFNote] = useState('');
      const [editTarget, setEditTarget] = useState(null);

      const usersList = Object.values(dbData.users).filter(u => u.role === 'student');
      const allFines = dbData.txs.filter(t => t.type === '벌금 부과' || t.type === '벌금 수정 차액' || t.type === '벌금 취소됨' || t.type === '벌금 취소환불');

      const myImposedFines = dbData.txs.filter(t => (assets.role === 'admin' || t.imposerId === assets.id) && t.type === '벌금 부과');

      const executeFine = async (e) => {
        e.preventDefault(); const amt = parseInt(fAmt, 10);
        if (fIds.length === 0 || isNaN(amt) || amt <= 0) return;
        const updates = {};
        fIds.forEach((id, idx) => {
          const u = dbData.users[id]; const newCash = u.cash - amt;
          updates[`economy_users/${id}/cash`] = newCash;
          const txRef = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${txRef}`] = { id: txRef, userId: id, imposerId: assets.id, imposerName: assets.name, type: '벌금 부과', desc: `${fReason} (부과자: ${assets.name})`, fineReason: fReason, fineNote: fNote, amount: `-${formatMoney(amt)}`, balance: formatMoney(newCash), isPositive: false, timestamp: Date.now()+idx };
        });
        await db.ref('/').update(updates); 
        setModal(null); setFIds([]); setFAmt(''); setFReason(''); setFNote(''); showAlert('벌금 부과 완료!');
      };

      const handleEditFine = async (e) => {
        e.preventDefault(); const newAmt = parseInt(fAmt, 10);
        if(isNaN(newAmt) || newAmt < 0) return;
        const oldAmt = parseAmount(editTarget.amount); const diff = oldAmt - newAmt; const u = dbData.users[editTarget.userId];
        showConfirm(`벌금 내역을 수정하시겠습니까?\n차액 ${formatMoney(diff)}만큼 학생의 자산이 조정됩니다.`, async () => {
           const updates = {}; updates[`economy_users/${u.id}/cash`] = u.cash + diff;
           if(newAmt === 0) { 
             updates[`economy_transactions/${editTarget.id}/type`] = '벌금 취소됨'; updates[`economy_transactions/${editTarget.id}/desc`] = `취소됨: ${fReason}`; updates[`economy_transactions/${editTarget.id}/amount`] = '0G'; updates[`economy_transactions/${editTarget.id}/isCancelled`] = true;
             const tRef = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tRef}`] = { id: tRef, userId: u.id, type: '벌금 취소환불', desc: `벌금 전액 취소: ${fReason}`, amount: `+${formatMoney(oldAmt)}`, balance: formatMoney(u.cash+oldAmt), isPositive: true, timestamp: Date.now() };
           } else {
             updates[`economy_transactions/${editTarget.id}/desc`] = `${fReason} (부과자: ${assets.name})`; updates[`economy_transactions/${editTarget.id}/fineReason`] = fReason; updates[`economy_transactions/${editTarget.id}/fineNote`] = fNote; updates[`economy_transactions/${editTarget.id}/amount`] = `-${formatMoney(newAmt)}`;
             if(diff !== 0) { const tRef = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tRef}`] = { id: tRef, userId: u.id, type: '벌금 차액조정', desc: `벌금 수정 차액반환`, amount: diff>0?`+${formatMoney(diff)}`:`${formatMoney(diff)}`, balance: formatMoney(u.cash+diff), isPositive: diff>0, timestamp: Date.now() }; }
           }
           await db.ref('/').update(updates); setModal(null); showAlert('벌금 내역이 수정되었습니다.');
        });
      };

      return (
        <div className="animate-fade-in space-y-8">
          <Modal isOpen={modal==='impose'} title="벌금 부과하기" iconStr="fa-solid fa-gavel" color="red" onClose={()=>setModal(null)}>

             </form>
          </Modal>

          <Modal isOpen={modal==='editFine'} title="부과 내역 수정 및 취소" iconStr="fa-solid fa-pen" color="red" onClose={()=>setModal(null)}>
             <form onSubmit={handleEditFine} className="space-y-6">
               <div className="bg-gray-100 p-4 rounded-xl text-center"><p className="font-bold text-gray-500">대상: <span className="text-gray-900 font-black">{dbData.users[editTarget?.userId]?.name}</span></p><p className="font-bold text-gray-500">원래 부과액: <span className="text-red-600 font-black">{editTarget?.amount}</span></p></div>
               <input type="number" required placeholder="수정할 벌금액 (0 입력시 전액 환불/취소)" className="w-full p-4 bg-white border-2 border-red-100 rounded-xl font-bold outline-none focus:border-red-400 shadow-inner" value={fAmt} onChange={(e) => setFAmt(e.target.value)} />
               <input type="text" required placeholder="수정할 사유" className="w-full p-4 bg-white border-2 border-red-100 rounded-xl font-bold outline-none focus:border-red-400 shadow-inner" value={fReason} onChange={(e) => setFReason(e.target.value)} />
               <input type="text" placeholder="비고란 (선택, 상세 메모)" className="w-full p-4 bg-white border-2 border-red-100 rounded-xl font-bold outline-none focus:border-red-400 shadow-inner" value={fNote} onChange={(e) => setFNote(e.target.value)} />
               <button type="submit" className="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-extrabold shadow-lg transition-colors">내역 수정 적용 (차액 환불)</button>
             </form>
          </Modal>

          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-red-100">
            <h1 className="text-3xl font-black flex items-center gap-4"><div className="bg-red-100 p-3 rounded-2xl"><i className="fa-solid fa-gavel text-red-600"></i></div> 벌금 관리 센터</h1>
            <div className="flex bg-red-50 p-2 rounded-2xl border-2 border-red-100 overflow-x-auto w-full sm:w-auto scrollbar-hide">
              <button onClick={()=>setTab('my')} className={`whitespace-nowrap px-6 py-3 font-extrabold rounded-xl transition-all ${tab==='my'?'bg-white text-red-900 shadow-md':'text-red-500 hover:text-red-700'}`}>내 벌금 내역</button>
              {(assets.role==='admin' || assets.canFine) && <button onClick={()=>setTab('impose')} className={`whitespace-nowrap px-6 py-3 font-extrabold rounded-xl transition-all ml-2 ${tab==='impose'?'bg-white text-red-900 shadow-md':'text-red-500 hover:text-red-700'}`}>부과 내역 관리</button>}
              {(assets.role==='admin' || assets.canFine) && <button onClick={()=>{setFIds([]); setFAmt(''); setFReason(''); setFNote(''); setModal('impose');}} className="whitespace-nowrap px-6 py-3 font-extrabold rounded-xl text-white bg-red-600 shadow-md hover:bg-red-700 transition-colors ml-2">+ 벌금 부과하기</button>}
            </div>
          </div>

          {tab === 'my' && (
            <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-red-100">
              <h3 className="font-black text-xl mb-6 text-red-900">내가 받은 벌금 및 처리 내역</h3>
              <div className="space-y-4">
                {myFines.map(t => (
                  <div key={t.id} className={`p-5 rounded-2xl border flex flex-col md:flex-row md:items-center justify-between gap-4 hover:shadow-sm transition-all ${t.isPositive?'bg-green-50 border-green-100':'bg-red-50/50 border-red-100 hover:bg-red-50'}`}>
                     <div>
                       <div className="flex items-center gap-2 mb-1"><span className="font-black text-lg text-gray-900">{t.fineReason || t.desc.split('(')[0]}</span><Badge type={t.isPositive?'positive':'negative'}>{t.amount}</Badge></div>
                       <p className="text-xs font-bold text-gray-500">{formatDate(t.timestamp)} | {t.imposerName ? `부과자: ${t.imposerName}` : t.desc}</p>
                       {t.fineNote && <p className="text-sm font-bold text-red-700 mt-2 bg-white p-2 rounded-lg border border-red-100 shadow-inner">비고: {t.fineNote}</p>}
                     </div>
                  </div>
                ))}
                {myFines.length === 0 && <p className="text-center font-bold text-red-300 py-10">받은 벌금 내역이 없습니다. 훌륭합니다!</p>}
              </div>
            </div>
          )}

          {tab === 'impose' && (assets.role==='admin' || assets.canFine) && (
            <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-red-100">
              <h3 className="font-black text-xl mb-6 text-red-900">내가 부과한 벌금 관리</h3>
              <div className="space-y-4">
                {myImposedFines.filter(t=>!t.isCancelled).map(t => (
                  <div key={t.id} className="bg-white p-5 rounded-2xl border-2 border-red-50 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4 hover:border-red-200 transition-colors">
                     <div>
                       <div className="flex items-center gap-2 mb-1"><span className="font-black text-lg text-red-950">대상: {dbData.users[t.userId]?.name}</span><span className="font-black text-red-600">{t.amount}</span></div>
                       <p className="text-sm font-bold text-gray-700">사유: {t.fineReason || t.desc}</p>
                       {t.fineNote && <p className="text-xs font-bold text-gray-500 mt-1">비고: {t.fineNote}</p>}
                       <p className="text-xs font-bold text-gray-400 mt-1">{formatDate(t.timestamp)}</p>
                     </div>
                     <button onClick={()=>{setEditTarget(t); setFAmt(parseAmount(t.amount).toString()); setFReason(t.fineReason || t.desc.split('(')[0].trim()); setFNote(t.fineNote || ''); setModal('editFine');}} className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl font-bold transition-colors">수정 / 취소</button>
                  </div>
                ))}
                {myImposedFines.filter(t=>!t.isCancelled).length === 0 && <p className="text-center font-bold text-red-300 py-10">부과한 내역이 없습니다.</p>}
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- [4] 직업(Jobs) 화면 ---
    function JobsView({ assets, dbData, db, showAlert, showConfirm }) {
      const [tab, setTab] = useState('my'); const [modal, setModal] = useState(null); 
      const [jId, setJId] = useState(''); const [jTitle, setJTitle] = useState(''); const [jDesc, setJDesc] = useState(''); const [jSal, setJSal] = useState(''); const [jMax, setJMax] = useState(''); const [jHiring, setJHiring] = useState(true); const [jSelf, setJSelf] = useState(false);
      const [payTarget, setPayTarget] = useState(null); const [payAmt, setPayAmt] = useState('');
      const jobs = dbData.jobs || []; const usersList = Object.values(dbData.users).filter(u => u.role === 'student');
      const myJob = jobs.find(j => j.id === assets.jobId); const weekDays = getThisWeekDays(); const todayStr = getYYYYMMDD(new Date());

      const toggleCheck = async (dStr) => {
        if(dStr !== todayStr) return; 
        const currentChecks = assets.jobChecklist || {}; const updates = {}; updates[`economy_users/${assets.id}/jobChecklist/${dStr}`] = !currentChecks[dStr];
        await db.ref('/').update(updates);
      };

      const openJobForm = (j=null) => {
        if(j) { setJId(j.id); setJTitle(j.title); setJDesc(j.desc); setJSal(j.salary); setJMax(j.maxUsers); setJHiring(j.isHiring); setJSelf(j.allowSelfApply); }
        else { setJId(''); setJTitle(''); setJDesc(''); setJSal(''); setJMax(''); setJHiring(true); setJSelf(false); }
        setModal('jobForm');
      };

      const saveJob = async (e) => {
        e.preventDefault(); const id = jId || db.ref('economy_jobs').push().key;
        await db.ref(`economy_jobs/${id}`).set({ id, title: jTitle, desc: jDesc, salary: parseInt(jSal,10), maxUsers: parseInt(jMax,10), isHiring: jHiring, allowSelfApply: jSelf });
        setModal(null); showAlert('직업이 저장되었습니다.');
      };

      const deleteJob = (id) => {
        showConfirm('이 직업을 삭제하시겠습니까?', async () => {
          const updates = {}; updates[`economy_jobs/${id}`] = null; usersList.forEach(u => { if(u.jobId === id) updates[`economy_users/${u.id}/jobId`] = ''; });
          await db.ref('/').update(updates); showAlert('삭제 완료');
        });
      };

      const applyJob = (jobId, studentId = assets.id) => {
        const j = jobs.find(x => x.id === jobId); if(!j) return;
        const currentCount = usersList.filter(u => u.jobId === jobId).length;
        if(currentCount >= j.maxUsers && studentId === assets.id && assets.role !== 'admin') return showAlert('모집 인원이 꽉 찼습니다.');
        showConfirm(studentId === assets.id ? `'${j.title}' 직업을 신청하시겠습니까?` : '직업을 배정하시겠습니까?', async () => { await db.ref(`economy_users/${studentId}/jobId`).set(jobId); showAlert('배정 완료!'); });
      };

      const removeJob = (studentId) => {
        showConfirm('해당 학생의 직업을 해제하시겠습니까?', async () => { await db.ref(`economy_users/${studentId}/jobId`).set(''); showAlert('해제 완료!'); });
      };

      const executePaySalary = async (e) => {
        e.preventDefault(); const amt = parseInt(payAmt, 10); if(isNaN(amt)) return;
        const updates = {}; updates[`economy_users/${payTarget.id}/cash`] = (payTarget.cash || 0) + amt; updates[`economy_users/${payTarget.id}/jobChecklist`] = null; 
        const tId = db.ref('economy_transactions').push().key;
        updates[`economy_transactions/${tId}`] = { id: tId, userId: payTarget.id, type: '주급 지급', desc: `주급: ${jobs.find(j=>j.id===payTarget.jobId)?.title||'알수없음'}`, amount: `+${formatMoney(amt)}`, balance: formatMoney(payTarget.cash+amt), isPositive: true, timestamp: Date.now() };
        await db.ref('/').update(updates); setModal(null); setPayTarget(null); showAlert(`${payTarget.name} 학생에게 주급 지급이 완료되었습니다!`);
      };

      const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

      return (
        <div className="animate-fade-in space-y-8">
          <Modal isOpen={modal==='jobForm'} title={jId?'직업 수정':'새 직업 등록'} iconStr="fa-solid fa-briefcase" color="emerald" onClose={()=>setModal(null)}>
            <form onSubmit={saveJob} className="space-y-4">
              <input required autoFocus placeholder="직업 이름" className="w-full p-4 bg-white border-2 border-emerald-100 rounded-xl font-bold outline-none" value={jTitle} onChange={e=>setJTitle(e.target.value)}/>
              <textarea required placeholder="상세 설명" className="w-full p-4 bg-white border-2 border-emerald-100 rounded-xl font-bold outline-none h-24" value={jDesc} onChange={e=>setJDesc(e.target.value)}/>
              <div className="flex gap-2"><input required type="number" placeholder="주급(G)" className="w-full p-4 bg-white border-2 border-emerald-100 rounded-xl font-bold outline-none" value={jSal} onChange={e=>setJSal(e.target.value)}/><input required type="number" placeholder="최대 인원" className="w-full p-4 bg-white border-2 border-emerald-100 rounded-xl font-bold outline-none" value={jMax} onChange={e=>setJMax(e.target.value)}/></div>
              <div className="bg-emerald-50 p-4 rounded-xl space-y-3 border border-emerald-100">
                 <label className="flex items-center gap-3 font-bold cursor-pointer text-emerald-900"><input type="checkbox" checked={jHiring} onChange={e=>setJHiring(e.target.checked)} className="w-5 h-5 accent-emerald-600"/> 이 직업 모집 활성화</label>
                 <label className="flex items-center gap-3 font-bold cursor-pointer text-emerald-900"><input type="checkbox" checked={jSelf} onChange={e=>setJSelf(e.target.checked)} className="w-5 h-5 accent-emerald-600"/> 학생들이 스스로 신청 가능하게 허용</label>
              </div>
              <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-xl font-black shadow-lg transition-colors">저장하기</button>
            </form>
          </Modal>

          <Modal isOpen={modal==='payJob'} title="주급 정산 및 지급" iconStr="fa-solid fa-sack-dollar" color="emerald" onClose={()=>setModal(null)}>
             {payTarget && (() => {
                const j = jobs.find(x => x.id === payTarget.jobId); const checks = payTarget.jobChecklist || {};
                let checkedCount = 0; weekDays.forEach(d => { if(checks[getYYYYMMDD(d)]) checkedCount++; });
                return (
                  <form onSubmit={executePaySalary} className="space-y-6">
                    <div className="bg-emerald-50 p-5 rounded-2xl border border-emerald-100 text-center"><h4 className="font-black text-xl text-emerald-950 mb-1">{payTarget.name}</h4><p className="text-emerald-700 font-bold">{j?.title} (기본 주급: {formatMoney(j?.salary)})</p></div>
                    <div className="space-y-2">
                       <p className="font-bold text-sm text-emerald-900">이번 주 업무 수행 내역 ({checkedCount} / 5일)</p>
                       <div className="flex justify-between gap-2">
                         {weekDays.map(d => {
                           const isC = checks[getYYYYMMDD(d)];
                           return (
                             <div key={d} className={`flex-1 py-2 rounded-lg text-center border-2 ${isC?'bg-green-100 border-green-300 text-green-700':'bg-gray-100 border-gray-200 text-gray-400'}`}><div className="text-xs font-black">{dayNames[d.getDay()]}</div><div>{isC ? <i className="fa-solid fa-check"></i> : <i className="fa-solid fa-xmark"></i>}</div></div>
                           )
                         })}
                       </div>
                    </div>
                    <div className="pt-4 border-t border-emerald-100"><label className="block text-sm font-extrabold mb-2 text-emerald-900">실제 지급할 주급 입력 (가감 가능)</label><input type="number" required autoFocus className="w-full p-4 bg-white border-2 border-emerald-200 rounded-xl font-black text-center text-2xl outline-none" value={payAmt} onChange={e=>setPayAmt(e.target.value)} /></div>
                    <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white p-4 rounded-xl font-black shadow-lg transition-colors">지급하고 체크리스트 초기화</button>
                  </form>
                );
             })()}
          </Modal>

          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-emerald-100">
            <h1 className="text-3xl font-black flex items-center gap-4"><div className="bg-emerald-100 p-3 rounded-2xl"><i className="fa-solid fa-briefcase text-emerald-600"></i></div> 직업 (1인 1역)</h1>
            <div className="flex bg-emerald-50 p-2 rounded-2xl border-2 border-emerald-100 overflow-x-auto w-full sm:w-auto scrollbar-hide">
              <button onClick={()=>setTab('my')} className={`whitespace-nowrap px-5 py-2.5 font-extrabold rounded-xl transition-all ${tab==='my'?'bg-white text-emerald-900 shadow-md':'text-emerald-600 hover:text-emerald-800'}`}>내 직업 & 업무 달력</button>
              <button onClick={()=>setTab('list')} className={`whitespace-nowrap px-5 py-2.5 font-extrabold rounded-xl transition-all ${tab==='list'?'bg-white text-emerald-900 shadow-md':'text-emerald-600 hover:text-emerald-800'}`}>모집 중인 직업</button>
              {assets.role==='admin'&&<button onClick={()=>setTab('mng_jobs')} className={`whitespace-nowrap px-5 py-2.5 font-extrabold rounded-xl transition-all ${tab==='mng_jobs'?'bg-white text-emerald-900 shadow-md':'text-emerald-600 hover:text-emerald-800'}`}>직업 템플릿 관리</button>}
              {assets.role==='admin'&&<button onClick={()=>setTab('mng_users')} className={`whitespace-nowrap px-5 py-2.5 font-extrabold rounded-xl transition-all ${tab==='mng_users'?'bg-white text-emerald-900 shadow-md':'text-emerald-600 hover:text-emerald-800'}`}>배정 및 주급 관리</button>}
            </div>
          </div>

          {tab === 'my' && (
            <div className="space-y-6 animate-fade-in">
               {myJob ? (
                 <div className="bg-white p-8 rounded-[2.5rem] border-2 border-emerald-100 shadow-xl">
                   <div className="flex flex-col md:flex-row justify-between gap-6 mb-8 border-b-2 border-emerald-50 pb-8">
                     <div><Badge type="positive">나의 현재 직업</Badge><h2 className="text-3xl font-black text-emerald-950 mt-3 mb-2">{myJob.title}</h2><p className="text-emerald-700 font-bold">{myJob.desc}</p></div>
                     <div className="bg-emerald-50 px-6 py-4 rounded-2xl border border-emerald-100 self-start md:self-center text-center min-w-[150px]"><p className="text-xs font-bold text-emerald-600 mb-1">기본 주급</p><p className="text-2xl font-black text-emerald-900">{formatMoney(myJob.salary)}</p></div>
                   </div>
                   <h3 className="text-xl font-black text-emerald-900 mb-2 flex items-center gap-2"><i className="fa-regular fa-calendar-check text-emerald-500"></i> 업무 달력</h3>
                   <p className="text-sm font-bold text-emerald-600 mb-6">매일의 업무 완료 상태를 체크하세요.</p>
                   <div className="flex gap-4 overflow-x-auto pb-4 scrollbar-hide">
                     {weekDays.map((d) => {
                       const dStr = getYYYYMMDD(d); const isToday = dStr === todayStr; const isChecked = assets.jobChecklist && assets.jobChecklist[dStr];
                       return (
                         <div key={dStr} className={`relative flex flex-col items-center justify-center p-6 rounded-3xl border-4 min-w-[160px] flex-1 transition-all ${isChecked ? 'bg-green-50 border-green-300 text-green-800 shadow-sm' : isToday ? 'bg-emerald-600 border-emerald-600 text-white shadow-xl cursor-pointer hover:bg-emerald-700 hover:-translate-y-2' : 'bg-gray-50 border-gray-200 text-gray-400'}`} onClick={() => isToday && toggleCheck(dStr)}>
                           {isChecked && <div className="absolute -top-3 -right-3 text-3xl text-green-500 drop-shadow-md animate-zoom-in"><i className="fa-solid fa-circle-check"></i></div>}
                           <span className="font-black text-lg">{dayNames[d.getDay()]}</span><span className="text-4xl font-black my-3 tracking-tighter">{d.getDate()}</span>
                           <span className="text-xs font-bold text-center leading-tight whitespace-pre-wrap">{isChecked ? '업무 완료' : isToday ? '클릭하여\n업무 완료를 체크하세요' : '당일만 체크가능'}</span>
                         </div>
                       )
                     })}
                   </div>
                 </div>
               ) : (
                 <div className="bg-white p-16 rounded-[2.5rem] border-2 border-dashed border-emerald-200 flex flex-col items-center justify-center text-center">
                   <div className="text-6xl text-emerald-200 mb-6"><i className="fa-solid fa-user-xmark"></i></div><h3 className="text-2xl font-black text-emerald-900 mb-2">현재 배정된 직업이 없습니다</h3><p className="font-bold text-emerald-600 mb-8">모집 중인 직업을 확인하고 신청해보세요!</p>
                   <button onClick={()=>setTab('list')} className="bg-emerald-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg hover:bg-emerald-700 transition-colors">모집 중인 직업 보러가기</button>
                 </div>
               )}
            </div>
          )}

          {tab === 'list' && (
            <div className="space-y-6 animate-fade-in">
              <div className="bg-emerald-50 p-6 rounded-2xl border border-emerald-100 flex items-center justify-between"><p className="font-bold text-emerald-800">현재 운영 중인 직업을 확인하세요.</p></div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                 {jobs.map(j => {
                   const currCount = usersList.filter(u=>u.jobId === j.id).length; const isFull = currCount >= j.maxUsers;
                   return (
                     <div key={j.id} className={`bg-white p-6 rounded-[2rem] border-2 shadow-md flex flex-col transition-transform hover:-translate-y-1 ${!j.isHiring||isFull?'border-gray-200 opacity-80':'border-emerald-100'}`}>
                        <div className="flex justify-between items-start mb-2"><h4 className="font-black text-xl text-emerald-950 pr-2">{j.title}</h4><span className="bg-emerald-100 text-emerald-800 text-xs font-black px-2.5 py-1 rounded-lg whitespace-nowrap">{currCount} / {j.maxUsers}명</span></div>
                        <p className="text-sm font-bold text-gray-500 mb-6 flex-1">{j.desc}</p>
                        <div className="bg-emerald-50 p-4 rounded-xl flex justify-between items-center mb-4"><span className="text-xs font-black text-emerald-700">주급</span><span className="font-black text-emerald-600 text-lg">{formatMoney(j.salary)}</span></div>
                        {!j.isHiring ? <div className="py-3 text-center text-sm font-black text-gray-400 bg-gray-50 rounded-xl">모집 마감됨</div> : isFull ? <div className="py-3 text-center text-sm font-black text-red-400 bg-red-50 rounded-xl">정원이 꽉 찼습니다</div> : j.allowSelfApply ? <button onClick={()=>applyJob(j.id)} className="w-full py-3 bg-emerald-600 text-white rounded-xl font-black shadow-md hover:bg-emerald-700 transition-colors">신청하기</button> : <div className="py-3 text-center text-xs font-black text-emerald-500 bg-emerald-50 border border-emerald-100 rounded-xl">직업 배정은 담당자가 관리합니다</div>}
                     </div>
                   )
                 })}
              </div>
            </div>
          )}

          {tab === 'mng_jobs' && assets.role === 'admin' && (
            <div className="space-y-6 animate-fade-in">
               <button onClick={()=>openJobForm()} className="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-4 rounded-2xl font-black shadow-xl transition-transform hover:-translate-y-1"><i className="fa-solid fa-plus mr-2"></i> 새 직업 만들기</button>
               <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                 {jobs.map(j => (
                   <div key={j.id} className="bg-white p-5 rounded-2xl border-2 border-emerald-100 shadow-sm flex flex-col sm:flex-row justify-between gap-4">

    function InvestView({ assets, dbData, db, showAlert, showConfirm }) {
      const [modal, setModal] = useState(null); const [selStock, setSelStock] = useState(null); const [qty, setQty] = useState('');
      const syncRef = useRef({ isPaused: false, isCancelled: false }); const [syncState, setSyncState] = useState({ status: 'idle', progress: 0, text: '' });
      const [showManageModal, setShowManageModal] = useState(false); const [newTck, setNewTck] = useState(''); const [newNm, setNewNm] = useState(''); const [newIco, setNewIco] = useState('📈'); const [newVirt, setNewVirt] = useState(false); const [editVirtualModal, setEditVirtualModal] = useState(null); const [newVirtualPrice, setNewVirtualPrice] = useState('');

      const executeBuy = async (e) => {
        e.preventDefault(); const q = parseInt(qty, 10); if(isNaN(q) || q<=0) return showAlert('자연수(주) 단위로만 입력 가능합니다.');
        const cost = q * selStock.currentPrice; if(assets.cash < cost) return showAlert(`현금이 부족합니다. (필요: ${formatMoney(cost)})`);
        showConfirm(`${selStock.name} ${q}주를 ${formatMoney(cost)}에 매수할까요?`, async () => {
          const updates = {}; const p = assets.portfolio?.[selStock.id] || { qty:0, totalInvested:0 }; const nQty = p.qty + q; const nInv = p.totalInvested + cost;
          updates[`economy_users/${assets.id}/cash`] = assets.cash - cost; updates[`economy_users/${assets.id}/portfolio/${selStock.id}`] = { qty: nQty, totalInvested: nInv, avgPrice: nInv/nQty };
          const txRef = db.ref('economy_transactions').push().key; updates[`economy_transactions/${txRef}`] = { id: txRef, userId: assets.id, type: '주식 매수', desc: `${selStock.name} ${q}주 매수`, amount: `-${formatMoney(cost)}`, balance: formatMoney(assets.cash-cost), isPositive: false, timestamp: Date.now() };
          await db.ref('/').update(updates); setModal(null); setQty(''); showAlert('매수 완료!');
        });
      };

      const executeSell = (q) => {
        const p = assets.portfolio?.[selStock.id]; if(!p || p.qty < q) return showAlert('보유 주식이 부족합니다.');
        const rev = q * selStock.currentPrice;
        showConfirm(`${q}주를 매도하여 ${formatMoney(rev)}를 받을까요?`, async () => {
          const updates = {}; const nQty = p.qty - q; const nInv = p.totalInvested * (nQty/p.qty);
          updates[`economy_users/${assets.id}/cash`] = assets.cash + rev;
          if(nQty <= 0) updates[`economy_users/${assets.id}/portfolio/${selStock.id}`] = null; else updates[`economy_users/${assets.id}/portfolio/${selStock.id}`] = { qty: nQty, totalInvested: nInv, avgPrice: p.avgPrice };
          const txRef = db.ref('economy_transactions').push().key; updates[`economy_transactions/${txRef}`] = { id: txRef, userId: assets.id, type: '주식 매도', desc: `${selStock.name} ${q}주 매도`, amount: `+${formatMoney(rev)}`, balance: formatMoney(assets.cash+rev), isPositive: true, timestamp: Date.now() };
          await db.ref('/').update(updates); setModal(null); showAlert('매도 완료!');
        });
      };

      const handleAddStock = async (e) => {
        e.preventDefault(); const id = db.ref('economy_stocks').push().key;
        await db.ref(`economy_stocks/${id}`).set({ id, ticker: newTck, name: newNm, icon: newIco, isVirtual: newVirt, currentPrice: 1000, prevPrice: 1000, lastUpdated: 0 });
        setNewTck(''); setNewNm(''); setShowManageModal(false); showAlert('종목이 추가되었습니다!');
      };

      const handleVirtualEditSubmit = async (e) => {
        e.preventDefault(); const np = parseInt(newVirtualPrice, 10); if(isNaN(np) || np < 0) return;
        await db.ref(`economy_stocks/${editVirtualModal.id}`).update({ prevPrice: editVirtualModal.currentPrice, currentPrice: np, lastUpdated: Date.now() });
        setEditVirtualModal(null); setNewVirtualPrice(''); showAlert('주가가 조작되었습니다.');
      };

      const runSync = async () => {
        setModal('sync'); syncRef.current = { isPaused: false, isCancelled: false }; setSyncState({ status: 'running', progress: 0, text: '시트 연결 중...' });
        if(!dbData.settings.googleSheetUrl) { setSyncState({ status: 'done', progress: 0, text: '설정 탭에서 구글 시트 링크를 먼저 넣어주세요.' }); return; }
        const targetUrl = convertGoogleSheetUrl(dbData.settings.googleSheetUrl);
        try {
          const res = await fetch(targetUrl); const txt = await res.text(); const rows = txt.split('\n').map(r=>r.replace(/\r/g,'').split(','));
          const updates = {}; const now = Date.now(); let updatedCount = 0;
          for(let i=0; i<dbData.stocks.length; i++) {

            while(syncRef.current.isPaused) { await new Promise(r=>setTimeout(r, 500)); if(syncRef.current.isCancelled) return; }
            const st = dbData.stocks[i]; if(st.isVirtual) continue;
            setSyncState({ status: 'running', progress: Math.floor((i/dbData.stocks.length)*100), text: `${i+1}/${dbData.stocks.length} 업데이트 중: ${st.name}` });
            await new Promise(r=>setTimeout(r, 400)); 
            const match = rows.find(r=>r[0]&&r[0].replace(/"/g,'').trim()===st.ticker);
            if(match && match[1]) {
               const parsedCurrent = parseFloat(match[1].replace(/"/g,'')); const parsedPrev = match[2] ? parseFloat(match[2].replace(/"/g,'')) : parsedCurrent;
               if (!isNaN(parsedCurrent)) { updates[`economy_stocks/${st.id}/currentPrice`] = applyConversion(parsedCurrent, dbData.settings); updates[`economy_stocks/${st.id}/prevPrice`] = applyConversion(parsedPrev, dbData.settings); updates[`economy_stocks/${st.id}/lastUpdated`] = now; updatedCount++; }
            }
          }
          if(Object.keys(updates).length > 0) { updates[`economy_settings/stockLastUpdated`] = now; await db.ref('/').update(updates); }
          setSyncState({ status: 'done', progress: 100, text: `${updatedCount}개 종목 업데이트 완료!` }); setTimeout(()=>setModal(null), 2000);
        } catch(e) { setSyncState({ status: 'done', progress: 0, text: `오류 발생: 연결 실패` }); }
      };

      const renderIcon = (iconStr) => iconStr?.startsWith('http') ? <img src={iconStr} className="w-10 h-10 object-cover rounded-full shadow-sm" alt="icon"/> : <span>{iconStr}</span>;

      return (
        <div className="animate-fade-in space-y-8">
          <Modal isOpen={modal==='buy'} title="매수 주문" iconStr="fa-solid fa-arrow-trend-up" color="purple" onClose={()=>setModal(null)}>
            <form onSubmit={executeBuy} className="space-y-6">
              <p className="font-bold text-center text-lg">{selStock?.name} <span className="text-purple-600">({formatMoney(selStock?.currentPrice)})</span></p>
              <input type="number" required autoFocus placeholder="매수할 수량 (주)" className="w-full p-4 bg-white border-2 border-purple-200 rounded-xl font-black text-center text-2xl outline-none focus:border-purple-500 shadow-inner" value={qty} onChange={e=>setQty(e.target.value)}/>
              <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 text-white p-4 rounded-xl font-black shadow-lg transition-colors">주문 확정 (예상: {formatMoney(parseInt(qty||0)*selStock?.currentPrice)})</button>
            </form>
          </Modal>

          <Modal isOpen={modal==='sell'} title="매도 주문" iconStr="fa-solid fa-arrow-trend-down" color="fuchsia" onClose={()=>setModal(null)}>
            <div className="space-y-4">
               <p className="font-bold text-center mb-6 text-lg">{selStock?.name} 보유량: {assets.portfolio?.[selStock?.id]?.qty || 0}주</p>
               <div className="grid grid-cols-2 gap-3">
                 {[1, 5, 10, 'all'].map(q => {
                   const actualQ = q === 'all' ? assets.portfolio?.[selStock?.id]?.qty : q; if(!actualQ) return null;
                   return <button type="button" key={q} onClick={()=>executeSell(actualQ)} className="p-4 bg-fuchsia-50 hover:bg-fuchsia-600 hover:text-white text-fuchsia-900 font-black rounded-xl border-2 border-fuchsia-200 transition-colors shadow-sm">{q==='all'?'전부':`${q}주`} 팔기</button>
                 })}
               </div>
            </div>
          </Modal>

          <Modal isOpen={modal==='sync'} title="구글 시트 동기화" iconStr="fa-solid fa-rotate" color="indigo" onClose={syncState.status==='done'||syncState.status==='cancelled'?()=>setModal(null):undefined}>
             <div className="flex flex-col items-center justify-center py-6 space-y-6">
                {syncState.status === 'done' ? <i className="fa-solid fa-circle-check text-6xl text-green-500 animate-zoom-in"></i> : <i className={`fa-solid fa-rotate text-6xl text-indigo-400 ${syncState.status==='running'?'fa-spin':''}`}></i>}
                <h3 className="text-xl font-black text-indigo-900 text-center">{syncState.text}</h3>
                <div className="w-full bg-indigo-100 rounded-full h-4 overflow-hidden border border-indigo-200 shadow-inner"><div className="bg-gradient-to-r from-indigo-400 to-indigo-600 h-full transition-all duration-300" style={{width:`${syncState.progress}%`}}></div></div>
                {syncState.status !== 'done' && syncState.status !== 'cancelled' && (
                  <div className="flex gap-4 w-full mt-4">
                     <button type="button" onClick={()=>{syncRef.current.isCancelled=true; setSyncState({...syncState, status:'cancelled', text:'취소됨'}); setTimeout(()=>setModal(null), 1500);}} className="flex-1 bg-white border-2 border-red-200 text-red-600 hover:bg-red-50 py-3 rounded-xl font-black transition-colors">취소</button>
                     <button type="button" onClick={()=>{
                       const isP = syncRef.current.isPaused; syncRef.current.isPaused = !isP;
                       setSyncState({...syncState, status: !isP ? 'paused' : 'running', text: !isP ? '일시중지됨' : '재개됨...'});
                     }} className={`flex-1 text-white py-3 rounded-xl font-black shadow-md transition-colors ${syncState.status==='paused'?'bg-green-500 hover:bg-green-600':'bg-orange-500 hover:bg-orange-600'}`}>{syncState.status==='paused'?'재개':'일시중지'}</button>
                  </div>

            <div className="space-y-6">
              <ul className="space-y-3 max-h-40 overflow-y-auto pr-2 scrollbar-hide">
                {dbData.stocks.map(s => (
                  <li key={s.id} className="flex justify-between bg-slate-50 p-3 rounded-xl font-bold items-center border border-slate-200 shadow-sm">

                    <button type="button" onClick={()=>showConfirm('상장 폐지하시겠습니까?', async ()=>{ await db.ref(`economy_stocks/${s.id}`).remove(); showAlert('삭제 완료'); })} className="text-red-500 hover:bg-red-100 w-8 h-8 rounded-lg flex items-center justify-center transition-colors"><i className="fa-solid fa-trash"></i></button>

            <form onSubmit={handleVirtualEditSubmit} className="space-y-6">
              <p className="font-bold text-indigo-900 text-center">[{editVirtualModal?.name}]의 현재 주가는 {formatMoney(editVirtualModal?.currentPrice)} 입니다.</p>
              <input type="number" required autoFocus placeholder="새로운 주가 입력" className="w-full bg-white border-2 border-indigo-200 rounded-2xl px-5 py-4 outline-none font-bold text-center text-xl shadow-inner" value={newVirtualPrice} onChange={(e) => setNewVirtualPrice(e.target.value)} />
              <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-extrabold shadow-lg transition-colors">주가 반영하기</button>
            </form>

          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-indigo-100">
            <div>
              <h1 className="text-2xl sm:text-3xl font-black flex items-center gap-3"><div className="bg-indigo-100 p-2 rounded-xl"><i className="fa-solid fa-chart-line text-indigo-600"></i></div> 증권 거래소</h1>

            </div>
            {assets.role === 'admin' && (
              <div className="flex gap-2">
                <button onClick={runSync} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-4 rounded-2xl font-black flex items-center gap-2 shadow-lg transition-transform hover:-translate-y-1"><i className="fa-solid fa-rotate"></i> 수동 동기화</button>
                <button onClick={() => setShowManageModal(true)} className="bg-slate-800 hover:bg-slate-900 text-white px-5 py-4 rounded-2xl font-black shadow-lg transition-transform hover:-translate-y-1"><i className="fa-solid fa-plus"></i></button>

              const pVal = p ? Math.floor(p.qty * st.currentPrice) : 0; const ret = p ? pVal - p.totalInvested : 0;
              return (
                <div key={st.id} className="bg-white rounded-3xl border-2 border-indigo-50 shadow-md p-6 flex flex-col hover:-translate-y-1 transition-transform">

                     <div className="text-right"><div className={`text-2xl font-black tracking-tighter ${cColor}`}>{formatMoney(st.currentPrice)}</div><div className={`text-sm font-bold ${cColor}`}>{isUp?'▲':isDn?'▼':'-'} {Math.abs(diff)}</div></div>
                   </div>
                   <div className="bg-indigo-50/50 p-4 rounded-2xl text-sm font-bold space-y-2 mb-6 border border-indigo-50">
                     <div className="flex justify-between"><span className="text-indigo-400">보유 수량</span><span className="text-indigo-900">{p?.qty||0} 주</span></div>

                   )}
                </div>
              );
            })}
          </div>
        </div>
      );
