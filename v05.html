    function BankView({ assets, dbData, db, showAlert, showConfirm }) {
      const [modal, setModal] = useState(null);
      const [bName, setBName] = useState(''); const [bAmt, setBAmt] = useState(''); const [bSel, setBSel] = useState('');
      const [editProd, setEditProd] = useState(null); const [nNm, setNNm] = useState(''); const [nDay, setNDay] = useState(''); const [nHr, setNHr] = useState(''); const [nMin, setNMin] = useState(''); const [nSec, setNSec] = useState(''); const [nRat, setNRate] = useState('');
      const deposits = Object.values(dbData.deposits).filter(d=>d.userId===assets.id);

      const createDep = async (e) => {
        e.preventDefault(); const a = parseInt(bAmt, 10);
        if(!bSel || !bName || isNaN(a) || a<=0) return showAlert('올바른 값을 입력해주세요.');
        if(a > assets.cash) return showAlert('현금이 부족합니다.');
        const prod = dbData.bank.find(p=>p.id===bSel);
        const m = new Date(); m.setDate(m.getDate()+(prod.days||0)); m.setHours(m.getHours()+(prod.hours||0)); m.setMinutes(m.getMinutes()+(prod.minutes||0)); m.setSeconds(m.getSeconds()+(prod.seconds||0));
        
        const updates = {};
        updates[`economy_users/${assets.id}/cash`] = assets.cash-a; updates[`economy_users/${assets.id}/deposit`] = assets.deposit+a;
        const dRef = db.ref('economy_deposits').push().key; updates[`economy_deposits/${dRef}`] = { id: dRef, userId: assets.id, name: bName, productName: prod.name, principal: a, rate: prod.rate, maturityDate: m.toISOString(), createdAt: Date.now() };
        const tRef = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tRef}`] = { id: tRef, userId: assets.id, type: '예금 가입', desc: bName, amount: `-${formatMoney(a)}`, balance: formatMoney(assets.cash-a), isPositive: false, timestamp: Date.now() };
        await db.ref('/').update(updates); setModal(null); setBName(''); setBAmt(''); showAlert('예금 생성 완료!');
      };

      const processDep = (d, isM) => {
        const ret = isM ? Math.floor(d.principal * (1+d.rate)) : d.principal;
        showConfirm(isM?`만기 이자 포함 ${formatMoney(ret)} 수령할까요?`:'중도해지 시 이자는 포기됩니다. 진행할까요?', async () => {
          const updates = {}; updates[`economy_deposits/${d.id}`] = null; updates[`economy_users/${assets.id}/cash`] = assets.cash+ret; updates[`economy_users/${assets.id}/deposit`] = assets.deposit-d.principal;
          const tRef = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tRef}`] = { id: tRef, userId: assets.id, type: isM?'만기 수령':'중도 해지', desc: d.name, amount: `+${formatMoney(ret)}`, balance: formatMoney(assets.cash+ret), isPositive: true, timestamp: Date.now() };
          await db.ref('/').update(updates); showAlert('처리 완료!');
        });
      };

      const openEditForm = (p = null) => {
        if(p) { setEditProd(p); setNNm(p.name); setNDay(p.days||0); setNHr(p.hours||0); setNMin(p.minutes||0); setNSec(p.seconds||0); setNRate(p.rate*100); } 
        else { setEditProd(null); setNNm(''); setNDay(0); setNHr(0); setNMin(0); setNSec(0); setNRate(''); }
        setModal('editProd');
      }

      const handleSaveProd = async (e) => {
        e.preventDefault(); const id = editProd ? editProd.id : db.ref('economy_bank_products').push().key;
        await db.ref(`economy_bank_products/${id}`).set({ id, name: nNm, days: parseInt(nDay,10)||0, hours: parseInt(nHr,10)||0, minutes: parseInt(nMin,10)||0, seconds: parseInt(nSec,10)||0, rate: parseFloat(nRat)/100, rateText: `${parseFloat(nRat)}%` });
        setModal(null); setEditProd(null); showAlert('상품이 저장되었습니다.');
      };

      return (
        <div className="animate-fade-in space-y-8">
          <Modal isOpen={modal==='new'} title="새 예금 가입" iconStr="fa-solid fa-piggy-bank" color="purple" onClose={()=>setModal(null)}>
            <form onSubmit={createDep} className="space-y-6">
              <CustomDropdown options={dbData.bank.map(p=>({value:p.id, label:`${p.name} (${p.rateText})`}))} value={bSel} onChange={setBSel} placeholder="가입할 예금 상품을 선택하세요" />
              <input type="text" required autoFocus placeholder="내 예금 통장 이름 (예: 자동차 사기)" className="w-full p-4 bg-white border-2 border-purple-200 rounded-xl font-bold outline-none focus:border-purple-500" value={bName} onChange={e=>setBName(e.target.value)}/>
              <input type="number" required placeholder={`가입할 금액 (보유: ${formatMoney(assets.cash)})`} className="w-full p-4 bg-white border-2 border-purple-200 rounded-xl font-bold outline-none focus:border-purple-500 shadow-inner" value={bAmt} onChange={e=>setBAmt(e.target.value)}/>
              <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 text-white p-4 rounded-xl font-black shadow-lg transition-colors">가입 확정</button>
            </form>
          </Modal>

          <Modal isOpen={modal==='mng'} title="은행 상품 관리" iconStr="fa-solid fa-building-columns" color="indigo" onClose={()=>setModal(null)}>
            <div className="space-y-4">
              <button onClick={()=>openEditForm()} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-md hover:-translate-y-1 transition-transform mb-2"><i className="fa-solid fa-plus mr-2"></i>새 예금 상품 등록</button>
              {dbData.bank.map(p => (
                <div key={p.id} className="flex justify-between bg-white p-5 rounded-2xl font-bold items-center border-2 border-indigo-50 shadow-sm">
                  <div className="text-indigo-900">{p.name} <span className="text-xs text-indigo-500 block mt-1">{p.days}일 {p.hours}시간 {p.minutes}분 {p.seconds}초 / {p.rateText}</span></div>
                  <div className="flex gap-2"><button onClick={()=>openEditForm(p)} className="bg-slate-100 text-slate-700 hover:bg-slate-200 p-2.5 rounded-lg transition-colors"><i className="fa-solid fa-pen"></i></button><button onClick={()=>showConfirm('삭제하시겠습니까?', async ()=>{ await db.ref(`economy_bank_products/${p.id}`).remove(); showAlert('삭제됨'); })} className="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white p-2.5 rounded-lg transition-colors"><i className="fa-solid fa-trash"></i></button></div>
                </div>
              ))}
            </div>
          </Modal>

          <Modal isOpen={modal==='editProd'} title={editProd ? '상품 수정' : '새 예금 상품 등록'} color="indigo" onClose={()=>{setModal('mng'); setEditProd(null);}}>
            <form onSubmit={handleSaveProd} className="space-y-4">
              <input required autoFocus placeholder="상품명 (예: 단기 적금)" className="w-full p-4 bg-white border-2 border-indigo-100 rounded-xl font-bold outline-none" value={nNm} onChange={e=>setNNm(e.target.value)} />
              <div className="grid grid-cols-2 gap-3 bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                <div className="flex items-center gap-2 text-sm font-bold text-indigo-800"><input type="number" className="w-full p-3 rounded-lg outline-none border border-indigo-200 text-center" value={nDay} onChange={e=>setNDay(e.target.value)} />일</div>
                <div className="flex items-center gap-2 text-sm font-bold text-indigo-800"><input type="number" className="w-full p-3 rounded-lg outline-none border border-indigo-200 text-center" value={nHr} onChange={e=>setNHr(e.target.value)} />시</div>
                <div className="flex items-center gap-2 text-sm font-bold text-indigo-800"><input type="number" className="w-full p-3 rounded-lg outline-none border border-indigo-200 text-center" value={nMin} onChange={e=>setNMin(e.target.value)} />분</div>
                <div className="flex items-center gap-2 text-sm font-bold text-indigo-800"><input type="number" className="w-full p-3 rounded-lg outline-none border border-indigo-200 text-center" value={nSec} onChange={e=>setNSec(e.target.value)} />초</div>
              </div>
              <input type="number" step="0.1" required placeholder="이자율 (%)" className="w-full p-4 bg-white border-2 border-indigo-100 rounded-xl font-bold outline-none" value={nRat} onChange={e=>setNRate(e.target.value)} />
              <button type="submit" className="w-full bg-indigo-600 text-white p-4 rounded-xl font-black shadow-lg">저장하기</button>
            </form>
          </Modal>

          <div className="flex justify-between items-center bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-purple-100">
            <h1 className="text-3xl font-black flex items-center gap-4"><div className="bg-purple-100 p-3 rounded-2xl"><i className="fa-solid fa-building-columns text-purple-600"></i></div> HH 은행</h1>
            {assets.role === 'admin' ? <button onClick={()=>setModal('mng')} className="bg-purple-900 text-white px-6 py-4 rounded-2xl font-black shadow-lg hover:-translate-y-1 transition-transform">예금 상품 관리</button> : <button onClick={()=>setModal('new')} className="bg-purple-600 text-white px-6 py-4 rounded-2xl font-black shadow-lg hover:-translate-y-1 transition-transform">예금 가입</button>}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            {deposits.map(d => {
              const isM = Date.now() >= new Date(d.maturityDate).getTime();
              return (
                <div key={d.id} className={`bg-white p-6 rounded-3xl border-4 ${isM?'border-purple-400 shadow-xl':'border-purple-50 shadow-sm'} flex flex-col transition-all hover:-translate-y-1`}>
                  <h4 className="text-xl font-black mb-4 text-purple-950">{d.name}</h4>
                  <div className="bg-purple-50 p-4 rounded-2xl text-sm font-bold space-y-3 mb-6">
                     <div className="flex justify-between border-b border-purple-100 pb-2"><span className="text-purple-400">원금</span><span className="text-purple-900">{formatMoney(d.principal)}</span></div>
                     <div className="flex justify-between border-b border-purple-100 pb-2"><span className="text-purple-400">이자율</span><span className="text-purple-900">{d.rate*100}%</span></div>
                     <div className="flex justify-between"><span className="text-purple-400">만기일</span><span className="text-purple-900">{formatDate(d.maturityDate)}</span></div>
                  </div>
                  {assets.role !== 'admin' && <button onClick={()=>processDep(d, isM)} className={`w-full py-4 font-black rounded-xl transition-colors ${isM?'bg-purple-600 text-white shadow-md hover:bg-purple-700':'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>{isM?'만기 수령 (이자 포함)':'중도 해지 (원금만)'}</button>}
                </div>
              )
            })}
            {deposits.length === 0 && <div className="col-span-full py-16 bg-white rounded-3xl border-2 border-dashed border-purple-100 text-center font-bold text-purple-300 text-lg">가입된 예금이 없습니다.</div>}
          </div>
        </div>
      );
    }

    // --- [7] 상점 화면 ---
    function StoreView({ assets, dbData, db, showAlert, showConfirm }) {
      const [tab, setTab] = useState('store'); const [modal, setModal] = useState(null); 
      const [pId, setPId] = useState(''); const [pNm, setPNm] = useState(''); const [pIco, setPIco] = useState(''); const [pPri, setPPri] = useState(''); const [pStk, setPStk] = useState(''); const [pDesc, setPDesc] = useState(''); const [pRef, setPRef] = useState(true); const [pRefHr, setPRefHr] = useState(24); const [pPause, setPPause] = useState(false); const [pAllowU, setPAllowU] = useState(true);
      const [now, setNow] = useState(Date.now()); useEffect(() => { const timer = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(timer); }, []);
      const myInv = dbData.inventory.filter(i=>i.userId===assets.id); const allInv = dbData.inventory;

      const buy = async (p) => {
        if(p.stock<=0 || p.isPaused) return; if(assets.cash < p.price) return showAlert('현금이 부족합니다.');
        showConfirm(`'${p.name}' 환불 ${p.refundable?`${p.refundLimitHours}시간 내 가능`:'불가'} 상품입니다.\n구매할까요?`, async () => {
          const updates = {}; updates[`economy_users/${assets.id}/cash`] = assets.cash - p.price; updates[`economy_store_products/${p.id}/stock`] = p.stock - 1;
          const iId = db.ref('economy_inventory').push().key; updates[`economy_inventory/${iId}`] = { id: iId, userId: assets.id, productId: p.id, productName: p.name, icon: p.icon, price: p.price, purchasedAt: Date.now(), isRefundable: p.refundable, refundLimitHours: p.refundLimitHours, status: 'active' };
          const tId = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tId}`] = { id: tId, userId: assets.id, type: '상점 구매', desc: p.name, amount: `-${formatMoney(p.price)}`, balance: formatMoney(assets.cash-p.price), isPositive: false, timestamp: Date.now() };
          await db.ref('/').update(updates); showAlert('구매 완료!');
        });
      };

      const useItem = async (item, force = false) => {
        const prod = dbData.store.find(p=>p.id===item.productId); if(!force && prod && prod.isPaused && !prod.allowUseIfPaused) return showAlert('현재 사용이 제한된 상품입니다.');
        showConfirm(force?'강제로 사용 처리합니까?':'사용하시겠습니까?', async () => {
          const updates = {}; updates[`economy_inventory/${item.id}/status`] = 'used'; updates[`economy_inventory/${item.id}/usedAt`] = Date.now();
          const tId = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tId}`] = { id: tId, userId: item.userId, type: '아이템 사용', desc: `${item.productName} 1개 사용`, amount: '0G', balance: formatMoney(dbData.users[item.userId].cash), isPositive: false, timestamp: Date.now() };
          await db.ref('/').update(updates); showAlert('사용 완료!');
        });
      };

      const refundItem = async (item, force = false) => {
        if(!force && !item.isRefundable) return showAlert('환불 불가 상품입니다.'); if(!force && (Date.now()-item.purchasedAt)/3600000 > item.refundLimitHours) return showAlert('환불 기한이 지났습니다.');
        showConfirm(force?'강제로 환불시킵니까?':`${formatMoney(item.price)} 환불받을까요?`, async () => {
          const updates = {}; const u = dbData.users[item.userId]; updates[`economy_inventory/${item.id}`] = null; updates[`economy_users/${u.id}/cash`] = u.cash + item.price;
          const prod = dbData.store.find(p=>p.id===item.productId); if(prod) updates[`economy_store_products/${prod.id}/stock`] = prod.stock + 1;
          const tId = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tId}`] = { id: tId, userId: u.id, type: '아이템 환불', desc: item.productName, amount: `+${formatMoney(item.price)}`, balance: formatMoney(u.cash+item.price), isPositive: true, timestamp: Date.now() };
          await db.ref('/').update(updates); showAlert('환불 완료!');
        });
      };

      const donateItem = async (item) => {
        showConfirm('기부 센터 나눔 장터로 이 아이템을 기부할까요?\n(내 보관함에서는 사라집니다)', async () => {
          const updates = {}; updates[`economy_inventory/${item.id}`] = null;
          const dId = db.ref('economy_item_donations').push().key; updates[`economy_item_donations/${dId}`] = { id: dId, originalUserId: assets.id, donorName: assets.name, productId: item.productId, productName: item.productName, icon: item.icon, price: item.price, donatedAt: Date.now() };
          const tId = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tId}`] = { id: tId, userId: assets.id, type: '아이템 기부', desc: `나눔장터 기부: ${item.productName}`, amount: '0G', balance: formatMoney(assets.cash), isPositive: false, timestamp: Date.now() };
          await db.ref('/').update(updates); showAlert('나눔 장터에 기부되었습니다!');
        });
      };

      const saveProd = async (e) => {
        e.preventDefault(); const id = pId || db.ref('economy_store_products').push().key;
        await db.ref(`economy_store_products/${id}`).set({ id, name: pNm, icon: pIco||'🎁', price: parseInt(pPri,10), stock: parseInt(pStk,10), desc: pDesc, refundable: pRef, refundLimitHours: parseInt(pRefHr,10)||0, isPaused: pPause, allowUseIfPaused: pAllowU });
        setModal(null); showAlert('저장 완료!');
      };

      const openForm = (p=null) => {
        if(p) { setPId(p.id); setPNm(p.name); setPIco(p.icon); setPPri(p.price); setPStk(p.stock); setPDesc(p.desc); setPRef(p.refundable); setPRefHr(p.refundLimitHours); setPPause(p.isPaused||false); setPAllowU(p.allowUseIfPaused??true); }
        else { setPId(''); setPNm(''); setPIco('🎁'); setPPri(''); setPStk('99'); setPDesc(''); setPRef(true); setPRefHr(24); setPPause(false); setPAllowU(true); }
        setModal('editProd');
      };

      const renderIcon = (iconStr) => (iconStr?.startsWith('http') || iconStr?.startsWith('data:image')) ? <img src={iconStr} className="w-14 h-14 object-cover rounded-2xl shadow-sm mx-auto border border-fuchsia-100" alt="icon"/> : <div className="text-5xl">{iconStr}</div>;
      const formatTimeLeft = (ms) => {
        if(ms <= 0) return '기한 만료'; const d = Math.floor(ms / 86400000); const h = Math.floor((ms % 86400000) / 3600000); const m = Math.floor((ms % 3600000) / 60000); const s = Math.floor((ms % 60000) / 1000);
        return `${d}일 ${String(h).padStart(2,'0')}시간 ${String(m).padStart(2,'0')}분 ${String(s).padStart(2,'0')}초`;
      };

      return (
        <div className="animate-fade-in space-y-8">
          <Modal isOpen={modal==='editProd'} title={pId?'상품 수정':'새 상점 아이템 등록'} iconStr="fa-solid fa-store" color="fuchsia" onClose={()=>setModal(null)}>
            <form onSubmit={saveProd} className="space-y-4">
              <input required autoFocus placeholder="상품명" className="w-full p-4 bg-white border-2 border-fuchsia-100 rounded-xl font-bold outline-none" value={pNm} onChange={e=>setPNm(e.target.value)}/>
              <div className="flex gap-2 items-center"><input placeholder="아이콘 (이모지 또는 업로드)" className="flex-1 p-4 bg-white border-2 border-fuchsia-100 rounded-xl font-bold outline-none" value={pIco} onChange={e=>setPIco(e.target.value)}/><label className="bg-fuchsia-100 text-fuchsia-700 px-4 py-4 rounded-xl font-bold cursor-pointer whitespace-nowrap"><i className="fa-solid fa-image"></i> 사진 선택<input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageCompression(e, setPIco)} /></label></div>
              <div className="flex gap-2"><input required type="number" placeholder="가격(G)" className="w-full p-4 bg-white border-2 border-fuchsia-100 rounded-xl font-bold outline-none" value={pPri} onChange={e=>setPPri(e.target.value)}/><input required type="number" placeholder="초기 재고" className="w-full p-4 bg-white border-2 border-fuchsia-100 rounded-xl font-bold outline-none" value={pStk} onChange={e=>setPStk(e.target.value)}/></div>
              <input placeholder="상품 설명" className="w-full p-4 bg-white border-2 border-fuchsia-100 rounded-xl font-bold outline-none" value={pDesc} onChange={e=>setPDesc(e.target.value)}/>
              <div className="bg-fuchsia-50 p-5 rounded-2xl space-y-4 border border-fuchsia-100">
                 <label className="flex items-center gap-3 font-bold cursor-pointer text-fuchsia-900"><input type="checkbox" checked={pRef} onChange={e=>setPRef(e.target.checked)} className="w-5 h-5 accent-fuchsia-600"/> 환불 가능 여부 (기한: <input type="number" className="w-16 px-2 py-1 rounded-lg outline-none text-center" value={pRefHr} onChange={e=>setPRefHr(e.target.value)}/> 시간)</label>
                 <div className="border-t border-fuchsia-200 pt-4 space-y-3"><label className="flex items-center gap-3 font-bold text-rose-600 cursor-pointer"><input type="checkbox" checked={pPause} onChange={e=>setPPause(e.target.checked)} className="w-5 h-5 accent-rose-600"/> 임시 중지 (품절 처리)</label>{pPause && <label className="flex items-center gap-3 font-bold text-fuchsia-700 pl-8 cursor-pointer"><input type="checkbox" checked={pAllowU} onChange={e=>setPAllowU(e.target.checked)} className="w-5 h-5 accent-fuchsia-600"/> 기존 구매자는 사용 허용</label>}</div>
              </div>
              <button type="submit" className="w-full bg-fuchsia-600 hover:bg-fuchsia-700 text-white py-4 rounded-xl font-black">저장하기</button>
            </form>
          </Modal>

          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-fuchsia-100">
            <h1 className="text-3xl font-black flex items-center gap-4"><div className="bg-fuchsia-100 p-3 rounded-2xl"><i className="fa-solid fa-store text-fuchsia-600"></i></div> 상점 & 인벤토리</h1>
            <div className="flex bg-fuchsia-50 p-2 rounded-2xl border-2 border-fuchsia-100 overflow-x-auto w-full sm:w-auto scrollbar-hide">
              <button onClick={()=>setTab('store')} className={`whitespace-nowrap px-6 py-3 font-extrabold rounded-xl transition-all ${tab==='store'?'bg-white text-fuchsia-900 shadow-md':'text-fuchsia-500 hover:text-fuchsia-700'}`}>상점 구경</button>
              {assets.role!=='admin'&&<button onClick={()=>setTab('inv')} className={`whitespace-nowrap px-6 py-3 font-extrabold rounded-xl transition-all ${tab==='inv'?'bg-white text-fuchsia-900 shadow-md':'text-fuchsia-500 hover:text-fuchsia-700'}`}>내 보관함 ({myInv.length})</button>}
              {assets.role==='admin'&&<button onClick={()=>setTab('mng')} className={`whitespace-nowrap px-6 py-3 font-extrabold rounded-xl transition-all ${tab==='mng'?'bg-white text-fuchsia-900 shadow-md':'text-fuchsia-500 hover:text-fuchsia-700'}`}>상품 관리</button>}
              {assets.role==='admin'&&<button onClick={()=>setTab('allinv')} className={`whitespace-nowrap px-6 py-3 font-extrabold rounded-xl transition-all ${tab==='allinv'?'bg-white text-fuchsia-900 shadow-md':'text-fuchsia-500 hover:text-fuchsia-700'}`}>학생 보관함 검사</button>}
            </div>
          </div>

          {tab === 'store' && (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
              {dbData.store.map(p => (
                <div key={p.id} className={`bg-white p-6 rounded-[2rem] border-4 ${p.isPaused||p.stock<=0?'border-gray-200 grayscale opacity-70':'border-fuchsia-50 shadow-xl hover:-translate-y-2'} flex flex-col text-center transition-all relative`}>
                  {p.isPaused && <div className="absolute top-4 left-4 bg-gray-800 text-white text-xs font-black px-2 py-1 rounded-lg">판매중지</div>}
                  <div className="mb-4 flex items-center justify-center h-20">{renderIcon(p.icon)}</div>
                  <h4 className="font-black text-xl mb-2 text-fuchsia-950">{p.name}</h4>
                  <p className="text-xs font-bold text-gray-500 mb-4 h-10 overflow-hidden">{p.desc}</p>
                  <p className="font-black text-fuchsia-600 text-2xl mb-4 tracking-tight">{formatMoney(p.price)} <span className="text-xs text-gray-400 block mt-1">남은 수량: {p.stock}개</span></p>
                  {!p.refundable && <span className="text-[11px] bg-red-100 text-red-600 font-black px-2 py-1 rounded-lg mb-3 mx-auto shadow-sm">환불불가 상품</span>}
                  {assets.role!=='admin' && <button onClick={()=>buy(p)} disabled={p.stock<=0||p.isPaused} className="mt-auto w-full bg-fuchsia-600 text-white py-4 rounded-xl font-black shadow-md disabled:bg-gray-300 disabled:shadow-none hover:bg-fuchsia-700 transition-colors">{p.isPaused?'판매 중지':p.stock<=0?'품절':'구매하기'}</button>}
                </div>
              ))}
            </div>
          )}

          {tab === 'inv' && (
            <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
              {myInv.map(i => {
                const p = dbData.store.find(x=>x.id===i.productId); const isUsed = i.status === 'used'; const canUse = !isUsed && (!p?.isPaused || p?.allowUseIfPaused);
                const refundMs = i.purchasedAt + (i.refundLimitHours * 3600000) - now; const canRefund = i.isRefundable && refundMs > 0 && !isUsed;
                return (
                  <div key={i.id} className={`bg-white p-6 rounded-[2rem] border-4 ${isUsed?'border-gray-200 grayscale opacity-60':'border-fuchsia-100 shadow-lg'} flex flex-col transition-all`}>
                    <div className="flex items-center gap-4 mb-4"><div className="bg-fuchsia-50 w-16 h-16 flex items-center justify-center rounded-2xl border border-fuchsia-100">{renderIcon(i.icon)}</div><div className="font-black text-xl text-fuchsia-950 leading-tight">{i.productName}</div></div>
                    <div className="bg-fuchsia-50/50 p-4 rounded-2xl mb-4 space-y-2 border border-fuchsia-50">
                      <div className="text-xs font-bold text-gray-500 flex justify-between"><span>구매가</span><span className="text-fuchsia-900">{formatMoney(i.price)}</span></div>
                      <div className="text-xs font-bold text-gray-500 flex justify-between"><span>{isUsed?'사용일':'구매일'}</span><span className="text-fuchsia-900">{formatDate(isUsed?i.usedAt:i.purchasedAt)}</span></div>
                    </div>
                    {!isUsed ? (
                      <div className="mt-auto space-y-3">
                        {canRefund ? <div className="text-[11px] font-black text-rose-500 bg-rose-50 py-2 rounded-lg text-center border border-rose-100 animate-pulse">환불 기한: {formatTimeLeft(refundMs)}</div> : (i.isRefundable ? <div className="text-[11px] font-black text-gray-400 text-center py-2 bg-gray-50 rounded-lg">환불 기한이 지났습니다</div> : null)}
                        <div className="grid grid-cols-3 gap-2"><button onClick={()=>useItem(i)} disabled={!canUse} className="bg-fuchsia-600 text-white py-3 rounded-xl font-black disabled:bg-gray-400 shadow-md transition-transform hover:-translate-y-1 hover:bg-fuchsia-700">사용</button><button onClick={()=>donateItem(i)} className="bg-rose-50 text-rose-600 border border-rose-200 py-3 rounded-xl font-black hover:bg-rose-100 transition-colors">기부</button><button onClick={()=>refundItem(i)} disabled={!canRefund} className="bg-white border border-gray-200 text-gray-600 py-3 rounded-xl font-black disabled:opacity-50 hover:bg-gray-50 transition-colors">환불</button></div>
                      </div>
                    ) : <div className="mt-auto py-4 text-center font-black text-gray-500 bg-gray-100 rounded-xl shadow-inner border border-gray-200">사용 완료된 아이템</div>}
                  </div>
                );
              })}
              {myInv.length === 0 && <div className="col-span-full py-24 text-center font-bold text-fuchsia-300 text-xl border-2 border-dashed border-fuchsia-100 rounded-[2.5rem] bg-white">보관함이 텅 비어있습니다.</div>}
            </div>
          )}

          {tab === 'mng' && assets.role==='admin' && (
             <div className="space-y-6">
               <button onClick={()=>openForm()} className="bg-fuchsia-600 hover:bg-fuchsia-700 text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:-translate-y-1 transition-transform mb-2"><i className="fa-solid fa-plus mr-2"></i> 새 상점 아이템 등록</button>
               <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                 {dbData.store.map(p => (
                   <div key={p.id} className={`bg-white p-5 rounded-2xl border-2 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 font-bold shadow-sm ${p.isPaused?'border-gray-200 bg-gray-50':'border-fuchsia-100'}`}>
                     <div className="flex items-center gap-4"><div className="w-12 h-12 flex items-center justify-center bg-white rounded-xl border border-gray-100 shadow-sm">{renderIcon(p.icon)}</div><div><h4 className="text-lg text-fuchsia-950 flex items-center gap-2">{p.name} {p.isPaused&&<Badge type="negative">판매중지</Badge>}</h4><p className="text-sm text-fuchsia-600">{formatMoney(p.price)} / 재고: {p.stock}개</p></div></div>
                     <div className="flex gap-2 w-full sm:w-auto"><button onClick={()=>openForm(p)} className="flex-1 sm:flex-none bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-2.5 rounded-xl transition-colors">수정</button></div>
                   </div>
                 ))}
               </div>
             </div>
          )}

          {tab === 'allinv' && assets.role==='admin' && (
            <div className="space-y-4">
              <div className="bg-white p-6 rounded-3xl border-2 border-fuchsia-100 shadow-md max-h-[600px] overflow-y-auto pr-2 scrollbar-hide">
                <table className="w-full text-left text-sm font-bold">
                   <thead className="text-fuchsia-500 border-b-2 border-fuchsia-50"><tr><th className="pb-3">소유자</th><th className="pb-3">아이템명</th><th className="pb-3">상태/구매일</th><th className="pb-3 text-right">강제 액션</th></tr></thead>
                   <tbody className="divide-y divide-fuchsia-50 text-fuchsia-900">
                     {allInv.map(i => (
                       <tr key={i.id} className={`${i.status==='used'?'opacity-50 grayscale bg-gray-50/50':''} transition-colors hover:bg-fuchsia-50/30`}>
                         <td className="py-4 px-2">[{dbData.users[i.userId]?.name}]</td>
                         <td className="py-4 flex items-center gap-3"><div className="w-10 h-10 rounded-lg bg-white border border-fuchsia-50 flex items-center justify-center shadow-sm">{renderIcon(i.icon)}</div><span className="font-black text-base">{i.productName}</span></td>
                         <td className="py-4 text-xs text-gray-500">{i.status==='used'?`사용완료 (${formatDate(i.usedAt)})`:`활성 (${formatDate(i.purchasedAt)})`}</td>
                         <td className="py-4 text-right space-x-2">
                           {i.status !== 'used' && <button onClick={()=>useItem(i,true)} className="bg-purple-100 hover:bg-purple-200 text-purple-700 px-3 py-1.5 rounded-lg">강제사용</button>}
                           <button onClick={()=>refundItem(i,true)} className="bg-rose-100 hover:bg-rose-200 text-rose-700 px-3 py-1.5 rounded-lg">강제환불</button>
                           <button onClick={()=>{showConfirm('영구 삭제하시겠습니까?', async ()=>{ await db.ref(`economy_inventory/${i.id}`).remove(); showAlert('삭제 완료'); });}} className="bg-red-50 hover:bg-red-500 hover:text-white text-red-500 border border-red-100 px-3 py-1.5 rounded-lg">삭제</button>
                         </td>
                       </tr>
                     ))}
                     {allInv.length===0 && <tr><td colSpan={4} className="py-10 text-center text-fuchsia-300 font-bold">학생들이 구매한 아이템이 없습니다.</td></tr>}
                   </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- [8] 기부 센터 화면 ---
    function DonateView({ assets, dbData, db, showAlert, showConfirm }) {
      const [tab, setTab] = useState('donate'); const [modal, setModal] = useState(null); 
      const [dGoal, setDGoal] = useState('general'); const [dAmt, setDAmt] = useState(''); const [dMsg, setDMsg] = useState(''); const [dAnon, setDAnon] = useState(false);
      const [gId, setGId] = useState(''); const [gTitle, setGTitle] = useState(''); const [gDesc, setGDesc] = useState(''); const [gTarget, setGTarget] = useState('');
      const [selItem, setSelItem] = useState(null); const [giveTarget, setGiveTarget] = useState('');
      const [deleteGoalData, setDeleteGoalData] = useState(null); const [transferTargetId, setTransferTargetId] = useState('general');

      const executeDonate = async (e) => {
        e.preventDefault(); const amt = parseInt(dAmt, 10); if(isNaN(amt)||amt<=0) return; if(amt>assets.cash) return showAlert('현금 부족');
        const gName = dGoal==='general' ? '일반 기부' : dbData.goals.find(g=>g.id===dGoal)?.title;
        showConfirm(dGoal==='general'?'일반 기부는 목표 게이지에 반영되지 않습니다. 기부할까요?':`'${gName}'에 기부할까요?`, async () => {
          const updates = {}; updates[`economy_users/${assets.id}/cash`] = assets.cash - amt;
          if (dGoal === 'general') updates[`economy_users/${assets.id}/generalDonated`] = (assets.generalDonated || 0) + amt;
          else { const goal = dbData.goals.find(g=>g.id===dGoal); if(goal) updates[`economy_donation_goals/${dGoal}/current`] = (goal.current||0)+amt; }
          const dId = db.ref('economy_donations').push().key; updates[`economy_donations/${dId}`] = { id: dId, userId: assets.id, userName: dAnon?'익명 천사':assets.name, goalId: dGoal, goalName: gName, amount: amt, message: dMsg, timestamp: Date.now() };
          const tId = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tId}`] = { id: tId, userId: assets.id, type: '기부', desc: `기부: ${gName}`, amount: `-${formatMoney(amt)}`, balance: formatMoney(assets.cash-amt), isPositive: false, timestamp: Date.now() };
          await db.ref('/').update(updates); setDAmt(''); setDMsg(''); setDAnon(false); showAlert('기부 감사합니다!');
        });
      };

      const handleRefund = (don, force=false) => {
        if(!force && (Date.now()-don.timestamp)/3600000 > dbData.settings.donationRefundLimitHours) return showAlert('취소 기한 초과');
        showConfirm(force?'강제로 기부를 취소합니다.':'기부를 취소할까요?', async () => {
          const updates = {}; const u = dbData.users[don.userId]; updates[`economy_donations/${don.id}`] = null; updates[`economy_users/${u.id}/cash`] = u.cash+don.amount;
          if(don.goalId==='general') updates[`economy_users/${u.id}/generalDonated`] = Math.max(0,(u.generalDonated||0)-don.amount);
          else { const goal = dbData.goals.find(g=>g.id===don.goalId); if(goal) updates[`economy_donation_goals/${don.goalId}/current`] = Math.max(0, goal.current-don.amount); }
          const tId = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tId}`] = { id: tId, userId: u.id, type: '기부 취소', desc: `취소: ${don.goalName}`, amount: `+${formatMoney(don.amount)}`, balance: formatMoney(u.cash+don.amount), isPositive: true, timestamp: Date.now() };
          await db.ref('/').update(updates); showAlert('취소 완료');
        });
      };

      const saveGoal = async (e) => {
        e.preventDefault(); const id = gId || db.ref('economy_donation_goals').push().key;
        await db.ref(`economy_donation_goals/${id}`).set({ id, title: gTitle, desc: gDesc, target: parseInt(gTarget,10), current: gId?dbData.goals.find(g=>g.id===gId).current:0 });
        setModal(null); showAlert('저장 완료!');
      };

      const executeDeleteGoal = async (e) => {
        e.preventDefault(); if(!deleteGoalData) return;
        showConfirm(`[${deleteGoalData.title}] 삭제 및 금액 이동을 진행할까요?`, async () => {
          const updates = {}; updates[`economy_donation_goals/${deleteGoalData.id}`] = null;
          const dons = dbData.donations.filter(d=>d.goalId===deleteGoalData.id);
          if(transferTargetId==='vanish') dons.forEach(d => { updates[`economy_donations/${d.id}/goalId`] = 'vanished'; updates[`economy_donations/${d.id}/goalName`] = '(소멸)'; });
          else if(transferTargetId==='refund') dons.forEach(d => { updates[`economy_donations/${d.id}`] = null; const u = dbData.users[d.userId]; if(u) { updates[`economy_users/${u.id}/cash`] = (updates[`economy_users/${u.id}/cash`] || u.cash) + d.amount; const tId = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tId}`] = { id: tId, userId: u.id, type: '기부 환불', desc: `목표 삭제 자동 환불`, amount: `+${formatMoney(d.amount)}`, balance: formatMoney((updates[`economy_users/${u.id}/cash`])), isPositive: true, timestamp: Date.now() }; } });
          else if(transferTargetId==='general') dons.forEach(d => { updates[`economy_donations/${d.id}/goalId`] = 'general'; updates[`economy_donations/${d.id}/goalName`] = '일반 기부 (이동)'; const u = dbData.users[d.userId]; if(u) updates[`economy_users/${u.id}/generalDonated`] = (updates[`economy_users/${u.id}/generalDonated`] || u.generalDonated || 0) + d.amount; });
          else { const targetGoal = dbData.goals.find(g => g.id === transferTargetId); if(targetGoal) { updates[`economy_donation_goals/${transferTargetId}/current`] = (updates[`economy_donation_goals/${transferTargetId}/current`] || targetGoal.current || 0) + deleteGoalData.current; dons.forEach(d => { updates[`economy_donations/${d.id}/goalId`] = transferTargetId; updates[`economy_donations/${d.id}/goalName`] = targetGoal.title; }); } }
          await db.ref('/').update(updates); setDeleteGoalData(null); showAlert('완료되었습니다.');
        });
      };

      const assignItem = async (e) => {
        e.preventDefault(); if(!giveTarget) return;
        const updates = {}; updates[`economy_item_donations/${selItem.id}`] = null;
        const iId = db.ref('economy_inventory').push().key; updates[`economy_inventory/${iId}`] = { id: iId, userId: giveTarget, productId: selItem.productId, productName: selItem.productName, icon: selItem.icon, price: selItem.price, purchasedAt: Date.now(), isRefundable: false, refundLimitHours: 0, status: 'active' };
        const tId = db.ref('economy_transactions').push().key; updates[`economy_transactions/${tId}`] = { id: tId, userId: giveTarget, type: '기부품 수령', desc: `나눔 장터 수령: ${selItem.productName}`, amount: '0G', balance: formatMoney(dbData.users[giveTarget].cash), isPositive: true, timestamp: Date.now() };
        await db.ref('/').update(updates); setModal(null); setSelItem(null); showAlert('지급 완료!');
      };

      const renderIcon = (iconStr) => (iconStr?.startsWith('http') || iconStr?.startsWith('data:image')) ? <img src={iconStr} className="w-12 h-12 object-cover rounded-xl" alt="icon"/> : <span className="text-5xl">{iconStr}</span>;
      const uMap = {}; dbData.donations.forEach(d=>{uMap[d.userId]=(uMap[d.userId]||0)+d.amount;});
      const ranks = Object.values(dbData.users).filter(u=>u.role==='student').map(u=>({...u, amt:(u.generalDonated||0)+(uMap[u.id]||0)})).filter(u=>u.amt>0).sort((a,b)=>b.amt-a.amt);

      return (
        <div className="animate-fade-in space-y-8">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-rose-100">
            <div><h1 className="text-3xl font-black text-rose-950 flex items-center gap-4"><div className="bg-rose-100 p-3 rounded-2xl"><i className="fa-solid fa-hand-holding-heart text-rose-600"></i></div> 학급 기부 센터</h1><p className="text-rose-600 font-bold mt-4">여러분의 정성이 모여 큰 변화를 만듭니다.</p></div>
            <div className="flex bg-rose-50 p-2 rounded-2xl border-2 border-rose-100 overflow-x-auto max-w-full scrollbar-hide">
              <button onClick={()=>setTab('donate')} className={`whitespace-nowrap px-6 py-3 font-extrabold rounded-xl transition-all ${tab==='donate'?'bg-white text-rose-900 shadow-md':'text-rose-500 hover:text-rose-700'}`}>기부 현황 & 참여</button>
              <button onClick={()=>setTab('items')} className={`whitespace-nowrap px-6 py-3 font-extrabold rounded-xl transition-all ${tab==='items'?'bg-white text-rose-900 shadow-md':'text-rose-500 hover:text-rose-700'}`}>나눔 장터 (아이템)</button>
              {assets.role==='admin'&&<button onClick={()=>setTab('mng')} className={`whitespace-nowrap px-6 py-3 font-extrabold rounded-xl transition-all ${tab==='mng'?'bg-white text-rose-900 shadow-md':'text-rose-500 hover:text-rose-700'}`}>관리자 모드</button>}
            </div>
          </div>

          <Modal isOpen={modal==='goalForm'} title={gId?"목표 수정":"새 기부 목표 등록"} iconStr="fa-solid fa-flag" color="rose" onClose={()=>setModal(null)}>
            <form onSubmit={saveGoal} className="space-y-6">
              <input required autoFocus placeholder="목표 타이틀 (예: 반 전체 과자 파티)" className="w-full p-4 bg-white border-2 border-rose-100 rounded-xl font-bold outline-none" value={gTitle} onChange={e=>setGTitle(e.target.value)}/>
              <input required placeholder="설명 (무엇을 위한 기부인가요?)" className="w-full p-4 bg-white border-2 border-rose-100 rounded-xl font-bold outline-none" value={gDesc} onChange={e=>setGDesc(e.target.value)}/>
              <input required type="number" placeholder="목표 달성 금액 (G)" className="w-full p-4 bg-white border-2 border-rose-100 rounded-xl font-bold outline-none" value={gTarget} onChange={e=>setGTarget(e.target.value)}/>
              <button type="submit" className="w-full py-4 bg-rose-600 text-white rounded-xl font-black shadow-lg">저장하기</button>
            </form>
          </Modal>

          <Modal isOpen={!!deleteGoalData} title="목표 삭제 및 금액 정산" iconStr="fa-solid fa-triangle-exclamation" color="rose" onClose={()=>setDeleteGoalData(null)}>
            <form onSubmit={executeDeleteGoal} className="space-y-6">
              <div className="bg-rose-50 p-4 rounded-xl text-rose-900 font-bold text-center"><p className="text-xl font-black mb-2">[{deleteGoalData?.title}]</p><p>이 목표를 영구 삭제합니다.</p><p className="mt-2 text-rose-600">현재 모인 금액: <span className="font-black text-lg">{formatMoney(deleteGoalData?.current)}</span></p></div>
              <div className="space-y-2"><label className="block text-sm font-extrabold text-rose-900 mb-2">모인 금액을 어떻게 처리할까요?</label><CustomDropdown options={[{value:'refund', label:'학생들에게 전액 환불'},{value:'general', label:'일반 기부금으로 이동'},...(dbData.goals||[]).filter(g=>g.id!==deleteGoalData?.id).map(g=>({value:g.id, label:`[${g.title}] 목표로 이동`})),{value:'vanish', label:'공중 분해 (소멸)'}]} value={transferTargetId} onChange={setTransferTargetId} placeholder="처리 방식 선택"/></div>
              <button type="submit" className="w-full py-4 bg-red-600 text-white rounded-xl font-black shadow-lg">삭제 및 정산 실행</button>
            </form>
          </Modal>

          <Modal isOpen={modal==='giveItem'} title="나눔 아이템 지급" iconStr="fa-solid fa-gift" color="rose" onClose={()=>setModal(null)}>
            <form onSubmit={assignItem} className="space-y-6">
               <div className="text-center bg-rose-50 p-4 rounded-xl border border-rose-100"><div className="mb-2 flex justify-center">{renderIcon(selItem?.icon)}</div><h4 className="font-black text-lg text-rose-900">{selItem?.productName}</h4><p className="text-xs font-bold text-rose-500 mt-1">기부자: {selItem?.donorName}님</p></div>
               <div><label className="block text-sm font-extrabold text-rose-900 mb-2">누구에게 이 선물을 지급할까요?</label><CustomDropdown options={Object.values(dbData.users).filter(u=>u.role==='student').map(u=>({value:u.id, label:u.name}))} value={giveTarget} onChange={setGiveTarget} placeholder="학생 선택" /></div>
               <button type="submit" className="w-full bg-rose-600 text-white py-4 rounded-xl font-black shadow-lg">아이템 선물하기</button>
            </form>
          </Modal>

          {tab === 'donate' && (
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
               <div className="lg:col-span-8 space-y-8">
                 <section className="bg-white p-8 rounded-[2rem] shadow-xl border-2 border-rose-100">
                   <h3 className="text-2xl font-black text-rose-950 mb-6 flex items-center gap-3"><i className="fa-solid fa-bullseye text-rose-500"></i> 진행 중인 기부 목표</h3>
                   <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                     {(dbData.goals||[]).map(goal => {
                       const percent = Math.min(100, ((goal.current || 0) / goal.target) * 100);
                       return (
                         <div key={goal.id} className="bg-rose-50/50 p-6 rounded-2xl border-2 border-rose-100 flex flex-col hover:border-rose-300 transition-colors shadow-sm">

    function SettingsView({ assets, dbData, db, showAlert, showConfirm }) {
      const [pass, setPass] = useState(''); const [passConfirm, setPassConfirm] = useState('');
      const [profileUrl, setProfileUrl] = useState(assets.profileUrl || '');
      const [showPwdErrors, setShowPwdErrors] = useState(false);
      const [locked, setLocked] = useState(true); const [lockInput, setLockInput] = useState('');

      const checkLock = (e) => { e.preventDefault(); if (lockInput === String(assets.pass)) setLocked(false); else showAlert('비밀번호 불일치'); };

      const p1 = pass === String(assets.pass); const p2 = pass === passConfirm && pass.length > 0;
      const p3 = !/[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/.test(pass); const p4 = pass.length >= 4;
      const tTypes = (/[a-z]/.test(pass)?1:0) + (/[A-Z]/.test(pass)?1:0) + (/[0-9]/.test(pass)?1:0) + (/[^a-zA-Z0-9\s]/.test(pass)?1:0);
      const p5 = tTypes >= 2; const p6 = !/[\.#$\[\]]/.test(pass);
      const canSavePersonal = !showPwdErrors || pass.length === 0 || (p2 && p3 && p4 && p5 && p6);

      const savePersonal = async (e) => {
        e.preventDefault(); if (pass && !canSavePersonal) return showAlert('비밀번호 조건을 충족하세요.');
        const updates = {}; if (pass) updates[`economy_users/${assets.id}/pass`] = pass; updates[`economy_users/${assets.id}/profileUrl`] = profileUrl;
        await db.ref('/').update(updates); setPass(''); setPassConfirm(''); setShowPwdErrors(false); showAlert('내 정보 저장 완료!');
      };

      const [sKey, setSKey] = useState(dbData.settings?.googleSheetUrl || '');
      const [pText, setPText] = useState(dbData.settings?.providerText || 'Google Finance');
      const [sTrMin, setSTrMin] = useState(dbData.settings?.transferMin || 0); const [sTrMax, setSTrMax] = useState(dbData.settings?.transferMax || 0); const [sTrFee, setSTrFee] = useState(dbData.settings?.transferFee || 0); const [trNotice, setTrNotice] = useState(dbData.settings?.transferNotice || '');

      const [tabs, setTabs] = useState(dbData.settings?.tabs || DEFAULT_TABS);
      const [notices, setNotices] = useState(dbData.settings?.notices || []);
      const [nForm, setNForm] = useState({ id: '', title: '', content: '', start: '', end: '', color: '#9333ea', link: '' });
      const [showNForm, setShowNForm] = useState(false);

      const moveTab = (idx, dir) => {
        if (idx + dir < 0 || idx + dir >= tabs.length) return;
        const newTabs = [...tabs]; const temp = newTabs[idx]; newTabs[idx] = newTabs[idx + dir]; newTabs[idx + dir] = temp; setTabs(newTabs);
      };

      const saveAdminSettings = async (e) => {
        e.preventDefault(); const updates = {};
        updates['economy_settings'] = { ...dbData.settings, googleSheetUrl: sKey, providerText: pText, transferMin: parseInt(sTrMin)||0, transferMax: parseInt(sTrMax)||0, transferFee: parseInt(sTrFee)||0, transferNotice: trNotice, tabs: tabs.map((t, i) => ({ ...t, order: i+1 })), notices: notices };
        await db.ref('/').update(updates); showAlert('설정 저장 완료!');
      };

      const saveNotice = (e) => {
        e.preventDefault();
        const startMs = new Date(nForm.start).getTime(); const endMs = new Date(nForm.end).getTime();
        if(isNaN(startMs) || isNaN(endMs) || startMs >= endMs) return showAlert('시간을 올바르게 설정하세요.');
        let newNotices = [...notices];
        if (nForm.id) { const idx = newNotices.findIndex(n => n.id === nForm.id); if(idx !== -1) newNotices[idx] = { ...nForm, startMs, endMs }; } 
        else newNotices.push({ ...nForm, id: Date.now().toString(), startMs, endMs });
        setNotices(newNotices); setShowNForm(false);

        );

            <form onSubmit={savePersonal} className="space-y-6 max-w-2xl relative z-10">
              <div className="bg-purple-50/50 p-6 rounded-2xl border border-purple-50">

                     <input type="text" placeholder="https://..." className="w-full p-4 bg-white rounded-xl font-bold outline-none border border-purple-200 focus:border-purple-400" value={profileUrl} onChange={e=>setProfileUrl(e.target.value)} />

                   </div>
                </div>
              </div>

              <div className="bg-purple-50/50 p-6 rounded-2xl border border-purple-50 space-y-4">
                <div className="flex justify-between items-center"><label className="block text-sm font-extrabold text-purple-900">비밀번호 변경</label><button type="button" onClick={()=>setShowPwdErrors(!showPwdErrors)} className="text-xs bg-purple-200 text-purple-800 px-3 py-1.5 rounded-lg font-bold hover:bg-purple-300">변경하기</button></div>
                {showPwdErrors && (
                  <div className="space-y-4 mt-4">
                    <input type="password" placeholder="새로운 비밀번호" className="w-full p-4 bg-white rounded-xl font-bold tracking-widest text-lg border border-purple-200 focus:border-purple-400 outline-none" value={pass} onChange={e=>setPass(e.target.value)} />

                       <div className={p4?'text-green-600':'text-gray-400'}><i className={`fa-solid ${p4?'fa-check':'fa-xmark'} mr-1`}></i> 4자리 이상</div>
                       <div className={p3?'text-green-600':'text-red-500'}><i className={`fa-solid ${p3?'fa-check':'fa-xmark'} mr-1`}></i> 한글 사용 금지</div>
                       <div className={p6?'text-green-600':'text-red-500'}><i className={`fa-solid ${p6?'fa-check':'fa-xmark'} mr-1`}></i> 특수금지기호 차단 (. # $ [ ])</div>
                       <div className={`col-span-full ${p5?'text-green-600':'text-gray-400'}`}><i className={`fa-solid ${p5?'fa-check':'fa-xmark'} mr-1`}></i> 영소문/영대문/숫자/특수기호 중 2가지 조합 (현재 {tTypes}가지)</div>
                    </div>

              <button type="submit" className="bg-purple-600 hover:bg-purple-700 transition-colors text-white px-10 py-4 rounded-xl font-black w-full sm:w-auto shadow-lg">내 정보 저장하기</button>
            </form>

          {assets.role === 'admin' && (

               <h2 className="text-2xl font-black text-indigo-950 mb-6 flex items-center gap-3"><div className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i className="fa-solid fa-sliders"></i></div> 관리자 고급 설정</h2>

                 <div className="bg-blue-50 p-6 rounded-3xl border border-blue-200">

                         <input type="text" placeholder="공지 제목" className="w-full p-3 bg-blue-50 rounded-lg font-black outline-none border border-transparent focus:border-blue-300" value={nForm.title} onChange={e=>setNForm({...nForm, title:e.target.value})}/>
                         <textarea placeholder="공지 내용" className="w-full p-3 bg-blue-50 rounded-lg font-bold h-20 outline-none border border-transparent focus:border-blue-300" value={nForm.content} onChange={e=>setNForm({...nForm, content:e.target.value})}/>
                         <div className="grid grid-cols-2 gap-4"><div><label className="text-xs font-bold text-blue-800">게시 시작</label><input type="datetime-local" className="w-full p-3 bg-blue-50 rounded-lg font-bold text-sm border border-blue-100 outline-none" value={nForm.start} onChange={e=>setNForm({...nForm, start:e.target.value})}/></div><div><label className="text-xs font-bold text-blue-800">게시 종료</label><input type="datetime-local" className="w-full p-3 bg-blue-50 rounded-lg font-bold text-sm border border-blue-100 outline-none" value={nForm.end} onChange={e=>setNForm({...nForm, end:e.target.value})}/></div></div>
                         <div className="flex gap-4"><div className="flex-1"><label className="text-xs font-bold text-blue-800">배경 색상</label><input type="color" className="w-full h-12 rounded-lg cursor-pointer" value={nForm.color} onChange={e=>setNForm({...nForm, color:e.target.value})}/></div><div className="flex-[2]"><label className="text-xs font-bold text-blue-800">연결 링크(선택)</label><input type="text" placeholder="URL" className="w-full p-3 bg-blue-50 rounded-lg font-bold text-sm h-12 border border-blue-100 outline-none" value={nForm.link} onChange={e=>setNForm({...nForm, link:e.target.value})}/></div></div>
                         <div className="flex gap-2"><button type="button" onClick={saveNotice} className="flex-1 bg-blue-600 hover:bg-blue-700 transition-colors text-white py-3 rounded-xl font-black">저장</button><button type="button" onClick={()=>setShowNForm(false)} className="flex-1 bg-slate-200 hover:bg-slate-300 transition-colors text-slate-700 py-3 rounded-xl font-black">취소</button></div>
                      </div>
                    )}
                 </div>

                 <div className="bg-emerald-50 p-6 rounded-3xl border border-emerald-200 shadow-sm">
                   <h4 className="font-black text-emerald-950 text-xl mb-4 flex items-center gap-2"><i className="fa-solid fa-list-ul text-emerald-600"></i> 메뉴 탭 이름 및 순서 변경</h4>
                   <div className="space-y-2">
                     {tabs.map((t, idx) => (
                       <div key={t.id} className="flex items-center gap-3 bg-white p-3 rounded-xl border border-emerald-100 shadow-sm">
                         <div className="flex flex-col gap-1"><button type="button" onClick={()=>moveTab(idx, -1)} disabled={idx===0} className="text-emerald-400 hover:text-emerald-700 disabled:opacity-30"><i className="fa-solid fa-chevron-up"></i></button><button type="button" onClick={()=>moveTab(idx, 1)} disabled={idx===tabs.length-1} className="text-emerald-400 hover:text-emerald-700 disabled:opacity-30"><i className="fa-solid fa-chevron-down"></i></button></div>
                         <div className="bg-emerald-100 w-8 h-8 rounded-lg flex items-center justify-center font-black text-emerald-700">{idx+1}</div>
                         <div className="flex-1"><span className="text-[10px] font-black text-emerald-500 uppercase">{t.id}</span><input type="text" className="w-full p-2 bg-emerald-50 rounded-lg font-bold outline-none border border-transparent focus:border-emerald-300 text-sm" value={t.label} onChange={(e) => { const newTabs = [...tabs]; newTabs[idx].label = e.target.value; setTabs(newTabs); }} /></div>
                       </div>
                     ))}
                   </div>
                 </div>

                 <div className="bg-indigo-50 p-8 rounded-3xl border border-indigo-200 shadow-sm">
                   <h4 className="font-black text-indigo-950 text-xl mb-3 flex items-center gap-2"><i className="fa-solid fa-link text-indigo-600"></i> 구글 시트 연동 (주식)</h4>
                   <input type="text" placeholder="시트 공유 링크 입력" className="w-full p-5 bg-white rounded-xl font-bold text-sm mb-6 outline-none border border-indigo-100 focus:border-indigo-400" value={sKey} onChange={e=>setSKey(e.target.value)}/>
                   <div className="grid grid-cols-1 md:grid-cols-2 gap-4"><div className="flex flex-col gap-1 font-bold"><span className="text-indigo-800 text-sm">데이터 출처 텍스트</span><input type="text" className="p-3 bg-white rounded-lg outline-none border border-indigo-100 focus:border-indigo-400" value={pText} onChange={e=>setPText(e.target.value)}/></div></div>
                 </div>

                 <div className="bg-yellow-50 p-8 rounded-3xl border border-yellow-200 shadow-sm">
                   <h4 className="font-black text-yellow-950 text-xl mb-4 flex items-center gap-2"><i className="fa-solid fa-money-bill-transfer text-yellow-600"></i> 송금 규칙</h4>
                   <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-4">
                     <div className="flex flex-col gap-2"><span className="font-black text-sm text-yellow-800">최소 금액</span><input type="number" className="p-4 bg-white rounded-xl font-bold outline-none border border-yellow-200 focus:border-yellow-400" value={sTrMin} onChange={e=>setSTrMin(e.target.value)}/></div>
                     <div className="flex flex-col gap-2"><span className="font-black text-sm text-yellow-800">최대 금액</span><input type="number" className="p-4 bg-white rounded-xl font-bold outline-none border border-yellow-200 focus:border-yellow-400" value={sTrMax} onChange={e=>setSTrMax(e.target.value)}/></div>
                     <div className="flex flex-col gap-2"><span className="font-black text-sm text-yellow-800">수수료</span><input type="number" className="p-4 bg-white rounded-xl font-bold outline-none border border-yellow-200 focus:border-yellow-400" value={sTrFee} onChange={e=>setSTrFee(e.target.value)}/></div>
                   </div>
                   <div className="flex flex-col gap-2"><span className="font-black text-sm text-yellow-800">송금 창 별도 안내문</span><textarea className="p-4 bg-white rounded-xl font-bold outline-none border border-yellow-200 focus:border-yellow-400 h-20" value={trNotice} onChange={e=>setTrNotice(e.target.value)} /></div>
                 </div>
                 <button type="submit" className="w-full py-5 bg-indigo-600 hover:bg-indigo-700 transition-colors text-white font-black text-xl rounded-2xl shadow-xl">모든 관리자 설정 저장</button>
               </form>
               
               <div className="bg-red-50 p-8 rounded-3xl border-4 border-red-200 mt-12">
                 <h4 className="font-black text-red-950 text-2xl mb-6"><i className="fa-solid fa-triangle-exclamation text-red-600"></i> 데이터 초기화 구역</h4>
                 <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                   <button type="button" onClick={()=>{showConfirm('학생 자산을 모두 0으로 만듭니다. 실행할까요?', async ()=>{const updates = {}; Object.values(dbData.users).forEach(u=>{ updates[`economy_users/${u.id}/cash`] = 0; updates[`economy_users/${u.id}/deposit`] = 0; updates[`economy_users/${u.id}/generalDonated`] = 0; updates[`economy_users/${u.id}/portfolio`] = null; updates[`economy_users/${u.id}/jobChecklist`] = null; }); await db.ref('/').update(updates); showAlert('완료!');});}} className="w-full py-4 bg-red-600 hover:bg-red-700 text-white font-black rounded-xl shadow-lg transition-colors">1. 학생 자산 전체 0원</button>
                   <button type="button" onClick={()=>{showConfirm('모든 거래 내역을 삭제합니다. 실행할까요?', async ()=>{const updates = {}; dbData.txs.forEach(t=> updates[`economy_transactions/${t.id}`] = null); await db.ref('/').update(updates); showAlert('삭제 완료');});}} className="w-full py-4 bg-white hover:bg-red-100 text-red-700 font-black rounded-xl shadow-sm border border-red-200 transition-colors">2. 내역 전체 삭제</button>
                   <button type="button" onClick={()=>{showConfirm('상점 상품과 보관함을 모두 비웁니다. 실행할까요?', async ()=>{const updates = {}; dbData.store.forEach(s=> updates[`economy_store_products/${s.id}`] = null); dbData.inventory.forEach(i=> updates[`economy_inventory/${i.id}`] = null); await db.ref('/').update(updates); showAlert('비우기 완료');});}} className="w-full py-4 bg-white hover:bg-red-100 text-red-700 font-black rounded-xl shadow-sm border border-red-200 transition-colors">3. 상점/보관함 초기화</button>
                 </div>
               </div>
            </div>
          )}
        </div>
      );
    }

    // ============================================================================
    // [10] App 컴포넌트 렌더링 시작
    // ============================================================================
    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [isDBLoaded, setIsDBLoaded] = useState(false);
      const [bootProgress, setBootProgress] = useState(0);
      const [isBooting, setIsBooting] = useState(true);
      
      const [dbData, setDbData] = useState({ users: {}, deposits: {}, txs: [], bank: [], store: [], inventory: [], stocks: [], jobs: [], settings: INITIAL_SETTINGS, goals: [], donations: [], itemDonations: [] });
      const [view, setView] = useState('dashboard');
      const [showLoginNotice, setShowLoginNotice] = useState(true);
      
      const [alertMsg, setAlertMsg] = useState(null);
      const [confirmObj, setConfirmObj] = useState(null);

      const showAlert = (message) => setAlertMsg({ message });
      const showConfirm = (message, onConfirm) => setConfirmObj({ message, onConfirm });

      const [lastActionTime, setLastActionTime] = useState(Date.now());
      const [timeLeft, setTimeLeft] = useState(0);
      const [isSessionActive, setIsSessionActive] = useState(false); 

      useEffect(() => {
        let timer;
        if (isBooting) {
          timer = setInterval(() => {
            setBootProgress(p => {
              if (p >= 95) return 95;
              const next = p + Math.floor(Math.random() * 10) + 1;
              return next > 95 ? 95 : next;
            });
          }, 150);
        }
        return () => clearInterval(timer);
      }, [isBooting]);

      useEffect(() => {
        if (isDBLoaded) {
          setBootProgress(100);
          const t = setTimeout(() => setIsBooting(false), 800);
          return () => clearTimeout(t);
        }
      }, [isDBLoaded]);

      useEffect(() => {
        const rootRef = db.ref('/');
        const onDataChange = rootRef.on('value', (snap) => {
          const val = snap.val() || {};
          
          if (!val.economy_users) {
             const updates = {};
             INITIAL_USERS.forEach(u => { updates[`economy_users/${u.id}`] = { ...u, cash: 0, deposit: 0, level: 1, generalDonated: 0, portfolio: {}, jobId: '', jobChecklist: {} }; });
             INITIAL_BANK.forEach(p => updates[`economy_bank_products/${p.id}`] = p);
             INITIAL_STORE.forEach(s => updates[`economy_store_products/${s.id}`] = s);
             INITIAL_STOCKS.forEach(st => updates[`economy_stocks/${st.id}`] = st);
             INITIAL_DONATION_GOALS.forEach(g => updates[`economy_donation_goals/${g.id}`] = g);
             INITIAL_JOBS.forEach(j => updates[`economy_jobs/${j.id}`] = j);
             updates[`economy_settings`] = INITIAL_SETTINGS;
             db.ref().update(updates);
          }

          let currentTabs = val.economy_settings?.tabs || DEFAULT_TABS;
          if (!currentTabs.find(t => t.id === 'jobs')) currentTabs = [...currentTabs, { id: 'jobs', label: '직업', order: 2 }];
          if (!currentTabs.find(t => t.id === 'fines')) currentTabs = [...currentTabs, { id: 'fines', label: '벌금', order: 6 }];
          currentTabs.sort((a,b)=>a.order-b.order);

          setDbData({
            users: val.economy_users || {},
            deposits: val.economy_deposits || {},
            txs: val.economy_transactions ? Object.values(val.economy_transactions).sort((a,b) => b.timestamp - a.timestamp) : [],
            bank: val.economy_bank_products ? Object.values(val.economy_bank_products).sort((a,b) => a.days - b.days) : [],
            store: val.economy_store_products ? Object.values(val.economy_store_products) : [],
            inventory: val.economy_inventory ? Object.values(val.economy_inventory).sort((a,b) => b.purchasedAt - a.purchasedAt) : [],
            stocks: val.economy_stocks ? Object.values(val.economy_stocks) : [],
            jobs: val.economy_jobs ? Object.values(val.economy_jobs) : [],
            goals: val.economy_donation_goals ? Object.values(val.economy_donation_goals) : [],
            donations: val.economy_donations ? Object.values(val.economy_donations).sort((a,b) => b.timestamp - a.timestamp) : [],
            itemDonations: val.economy_item_donations ? Object.values(val.economy_item_donations) : [],
            settings: { ...INITIAL_SETTINGS, ...(val.economy_settings || {}), tabs: currentTabs }
          });
          setIsDBLoaded(true);
        });
        return () => rootRef.off('value', onDataChange);
      }, []);

      useEffect(() => {
        if (!currentUser || !isSessionActive) return;
        const maxMs = (dbData.settings.sessionTimeMin || 10) * 60000;
        const updateTime = () => setLastActionTime(Date.now());
        window.addEventListener('click', updateTime); window.addEventListener('keydown', updateTime); window.addEventListener('touchstart', updateTime);

        const timer = setInterval(() => {
          const remain = maxMs - (Date.now() - lastActionTime); setTimeLeft(remain);
          if (remain <= 0) { setCurrentUser(null); showAlert('보안을 위해 자동으로 로그아웃 되었습니다.'); }
        }, 1000);

        return () => { clearInterval(timer); window.removeEventListener('click', updateTime); window.removeEventListener('keydown', updateTime); window.removeEventListener('touchstart', updateTime); };
      }, [currentUser, lastActionTime, dbData.settings.sessionTimeMin, isSessionActive]);

      const handleLogin = (id, u, useAuto, useSession) => {
        setCurrentUser(id); setIsSessionActive(useSession); setLastActionTime(Date.now()); setView('dashboard'); setShowLoginNotice(true);
        if (useAuto) localStorage.setItem('hh_auto_login', id);
      };

      const handleLogout = () => { localStorage.removeItem('hh_auto_login'); setCurrentUser(null); setIsSessionActive(false); };

      useEffect(() => {
        const savedId = localStorage.getItem('hh_auto_login');
        if (savedId && dbData.users[savedId] && !currentUser && isDBLoaded) { setCurrentUser(savedId); setIsSessionActive(false); }
      }, [isDBLoaded]);

      const activeNotices = (dbData.settings.notices || []).filter(n => { const now = Date.now(); return now >= n.startMs && now <= n.endMs; });

      if (isBooting || !isDBLoaded || !currentUser) {
        return (
          <div className="relative min-h-screen bg-[#F5F3FF]">
            {isDBLoaded && <LoginView users={Object.values(dbData.users)} onLogin={handleLogin} showAlert={showAlert} />}
            {(isBooting || !isDBLoaded) && (
              <div className="fixed inset-0 z-[999] bg-purple-950/80 backdrop-blur-md flex flex-col items-center justify-center transition-opacity duration-500">
                <div className="flex flex-col items-center animate-in slide-in-from-bottom-8 fade-in duration-1000"><i className="fa-solid fa-graduation-cap text-6xl text-white mb-6 animate-bounce"></i><h1 className="text-2xl sm:text-3xl font-black text-white text-center tracking-tight mb-2">HH 경제교실에 오신 것을 환영합니다!</h1><p className="text-lg text-purple-300 font-bold mb-12">무결성 검증 및 실시간 연결을 시도합니다...</p></div>
                <div className="flex flex-col items-center animate-in fade-in zoom-in duration-700 delay-300 fill-mode-both"><i className="fa-solid fa-circle-notch fa-spin text-4xl text-fuchsia-400 mb-6"></i><div className="w-64 bg-purple-900 rounded-full h-3 mb-4 overflow-hidden border border-purple-700 shadow-inner"><div className="bg-gradient-to-r from-fuchsia-500 to-purple-500 h-full rounded-full transition-all duration-300 ease-out" style={{ width: `${bootProgress}%` }}></div></div><p className="text-xl text-purple-200 font-extrabold tracking-widest">Loading {bootProgress}%...</p></div>
              </div>
            )}
            <Modal isOpen={!!alertMsg} title="알림" iconStr="fa-solid fa-circle-exclamation" color="purple" onClose={() => setAlertMsg(null)}><form onSubmit={(e) => { e.preventDefault(); setAlertMsg(null); }}><p className="text-purple-800 font-bold text-center leading-relaxed whitespace-pre-wrap mb-8 text-lg">{alertMsg?.message}</p><button type="submit" autoFocus className="w-full bg-purple-600 hover:bg-purple-700 text-white font-black py-4 rounded-2xl shadow-lg">확인</button></form></Modal>
          </div>
        );
      }

      const myUser = dbData.users[currentUser];
      const realStockValue = Object.entries(myUser.portfolio || {}).reduce((acc, [sId, pData]) => { const st = dbData.stocks.find(s => s.id === sId); return acc + (pData.qty * (st?.currentPrice || pData.avgPrice)); }, 0);
      const myTotalAssets = (myUser.cash || 0) + (myUser.deposit || 0) + realStockValue;
      const warnMin = dbData.settings.sessionWarnMin || 2; const isWarn = isSessionActive && timeLeft > 0 && timeLeft <= warnMin * 60000;
      const navItems = [...dbData.settings.tabs].sort((a,b)=>a.order-b.order);

      return (
        <div className="min-h-screen bg-[#F5F3FF] text-purple-950 font-sans pb-24">
          <Modal isOpen={!!alertMsg} title="알림" iconStr="fa-solid fa-circle-exclamation" color="purple" onClose={() => setAlertMsg(null)}><form onSubmit={(e) => { e.preventDefault(); setAlertMsg(null); }}><p className="text-purple-800 font-bold text-center leading-relaxed whitespace-pre-wrap mb-8 text-lg">{alertMsg?.message}</p><button type="submit" autoFocus className="w-full bg-purple-600 hover:bg-purple-700 text-white font-black py-4 rounded-2xl shadow-lg">확인</button></form></Modal>
          <Modal isOpen={!!confirmObj} title="확인이 필요합니다" iconStr="fa-solid fa-circle-question" color="fuchsia" onClose={() => setConfirmObj(null)}><form onSubmit={(e) => { e.preventDefault(); confirmObj.onConfirm(); setConfirmObj(null); }}><p className="text-fuchsia-900 font-bold text-center leading-relaxed whitespace-pre-wrap mb-8 text-lg">{confirmObj?.message}</p><div className="flex gap-4"><button type="submit" autoFocus className="flex-1 bg-fuchsia-600 hover:bg-fuchsia-700 text-white font-black py-4 rounded-2xl shadow-lg">진행</button><button type="button" onClick={() => setConfirmObj(null)} className="flex-1 bg-white border-2 border-fuchsia-200 text-fuchsia-700 font-black py-4 rounded-2xl hover:bg-fuchsia-50">취소</button></div></form></Modal>
          <Modal isOpen={showLoginNotice && activeNotices.length > 0} title="새로운 공지사항" iconStr="fa-solid fa-bullhorn" color="indigo" onClose={() => setShowLoginNotice(false)}><div className="space-y-4">{activeNotices.map((n, idx) => (<a key={idx} href={n.link||'#'} target={n.link?"_blank":""} className="block p-5 rounded-2xl shadow-sm text-white hover:scale-[1.02] transition-transform" style={{background: n.color}}><h4 className="font-black text-xl mb-2 drop-shadow-md">{n.title}</h4><p className="font-bold whitespace-pre-wrap opacity-90">{n.content}</p></a>))}<button type="button" onClick={()=>setShowLoginNotice(false)} autoFocus className="w-full mt-4 bg-indigo-100 text-indigo-800 font-black py-4 rounded-2xl hover:bg-indigo-200">확인했습니다</button></div></Modal>

          {activeNotices.length > 0 && (
             <div className="w-full bg-indigo-600 text-white font-bold text-sm py-2 shadow-md marquee-container cursor-pointer z-50 relative" onClick={() => setShowLoginNotice(true)}>
               <div className="marquee-content">{activeNotices.map((n, i) => (<span key={i} className="mx-8"><i className="fa-solid fa-bell text-yellow-300 mr-2"></i>[{n.title}] {n.content.replace(/\n/g, ' ')}</span>))}{activeNotices.map((n, i) => (<span key={i+'_clone'} className="mx-8"><i className="fa-solid fa-bell text-yellow-300 mr-2"></i>[{n.title}] {n.content.replace(/\n/g, ' ')}</span>))}</div>
             </div>
          )}

          <header className="sticky top-0 z-40 bg-white/90 backdrop-blur-xl border-b-2 border-purple-100 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center gap-6">
                <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('dashboard')}>
                  <div className="w-10 h-10 bg-gradient-to-br from-purple-600 to-fuchsia-600 rounded-xl flex items-center justify-center shadow-lg"><i className="fa-solid fa-graduation-cap text-white text-lg"></i></div>
                  <span className="text-xl sm:text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-purple-800 to-fuchsia-700 hidden sm:block">HH 경제교실</span>
                </div>
                <nav className="hidden md:flex gap-2">
                  {navItems.map(item => (<button key={item.id} onClick={() => setView(item.id)} className={`px-4 py-2 font-extrabold rounded-xl transition-all ${view === item.id ? 'bg-purple-600 text-white shadow-md' : 'text-purple-600 hover:bg-purple-100'}`}>{item.label}</button>))}
                  <button onClick={() => setView('settings')} className={`px-4 py-2 font-extrabold rounded-xl transition-all ${view === 'settings' ? 'bg-purple-600 text-white shadow-md' : 'text-purple-600 hover:bg-purple-100'}`}><i className="fa-solid fa-gear"></i> 설정</button>
                </nav>
              </div>
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-3">
                   {myUser.profileUrl ? <img src={myUser.profileUrl} alt="profile" className="w-10 h-10 rounded-full object-cover shadow-sm border border-purple-200 hidden sm:block"/> : <div className="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center text-purple-600 shadow-sm border border-purple-200 hidden sm:block"><i className="fa-solid fa-user"></i></div>}
                   <div className="text-right hidden sm:block">
                     <p className="text-sm font-black text-purple-900">{myUser.name}</p>
                     {isSessionActive && <p className={`text-xs font-bold flex items-center gap-1 justify-end mt-0.5 ${isWarn ? 'text-red-500 animate-pulse' : 'text-purple-400'}`}><i className="fa-solid fa-lock text-[10px]"></i>{Math.floor(timeLeft/60000)}:{String(Math.floor((timeLeft%60000)/1000)).padStart(2,'0')}{isWarn && <button onClick={() => setLastActionTime(Date.now())} className="ml-1 bg-red-100 text-red-600 px-1.5 py-0.5 rounded text-[10px] hover:bg-red-200">연장</button>}</p>}
                   </div>
                </div>
                <button onClick={handleLogout} className="p-2.5 text-purple-400 hover:text-white bg-purple-50 hover:bg-rose-500 rounded-xl transition-colors"><i className="fa-solid fa-arrow-right-from-bracket text-lg"></i></button>
              </div>
            </div>
            <div className="md:hidden flex overflow-x-auto p-2 gap-2 bg-purple-50 border-t border-purple-100 scrollbar-hide">
              {navItems.map(item => (<button key={item.id} onClick={() => setView(item.id)} className={`whitespace-nowrap px-4 py-2 text-sm font-extrabold rounded-xl ${view === item.id ? 'bg-purple-600 text-white' : 'text-purple-600'}`}>{item.label}</button>))}
              <button onClick={() => setView('settings')} className={`whitespace-nowrap px-4 py-2 text-sm font-extrabold rounded-xl ${view === 'settings' ? 'bg-purple-600 text-white' : 'text-purple-600'}`}>설정</button>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-8 space-y-8 relative z-10">
            {view === 'dashboard' && (
              <div className="relative bg-gradient-to-br from-purple-700 via-purple-600 to-fuchsia-600 rounded-[2.5rem] p-8 sm:p-10 text-white shadow-2xl overflow-hidden animate-in zoom-in-95">
                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-10 rounded-full blur-3xl -mr-16 -mt-16"></div>
                <div className="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-8">
                  <div>
                    <div className="flex items-center gap-3 mb-4"><p className="text-2xl font-bold opacity-90">{myUser.name}의 자산</p>{myUser.role === 'student' && <div className="bg-white/20 backdrop-blur-md px-3 py-1 rounded-full text-sm font-black flex items-center gap-1"><i className="fa-solid fa-trophy text-yellow-300"></i> 레벨 {myUser.level || 1}</div>}</div>
                    <h2 className="text-5xl sm:text-7xl font-black tracking-tighter mb-2 drop-shadow-lg">{formatMoney(myTotalAssets)}</h2>
                    <p className="text-purple-200 font-bold">총 자산 평가금액</p>
                  </div>
                  <div className="grid grid-cols-3 gap-3 w-full md:w-auto">
                    {[{l:'현금', v:myUser.cash, i:'fa-wallet'}, {l:'예금', v:myUser.deposit, i:'fa-piggy-bank'}, {l:'증권', v:realStockValue, i:'fa-chart-line'}].map(a => (
                      <div key={a.l} className="bg-white/10 backdrop-blur-md border border-white/20 p-4 rounded-3xl text-center md:text-left md:min-w-[120px]"><p className="text-xs font-extrabold text-purple-100 flex items-center justify-center md:justify-start gap-1 mb-2"><i className={`fa-solid ${a.i}`}></i> {a.l}</p><p className="text-lg md:text-xl font-black">{formatMoney(a.v)}</p></div>
                    ))}
                  </div>
                </div>
              </div>
            )}
            {view === 'dashboard' && <DashboardView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} setGlobalView={setView} />}
            {view === 'jobs' && <JobsView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
            {view === 'fines' && <FinesView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
            {view === 'invest' && <InvestView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
            {view === 'bank' && <BankView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
            {view === 'store' && <StoreView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
            {view === 'donate' && <DonateView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
            {view === 'settings' && <SettingsView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
