<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HH 경제교실</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase Compat (v10) - RTDB 전용 -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }
    
    /* 로그인 배경 은은한 그라데이션 */
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-gradient {
      background-size: 200% 200%;
      animation: gradientBG 15s ease infinite;
    }
  </style>
</head>
<body class="bg-[#F5F3FF] text-purple-950 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ============================================================================
    // [1] Firebase 설정 및 초기화 (RTDB 전용)
    // ============================================================================
    const firebaseConfig = {
      databaseURL: "https://class-chat-6-7-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ============================================================================
    // [2] 초기 데이터 모음
    // ============================================================================
    const INITIAL_SETTINGS = {
      googleSheetUrl: '', stockLastUpdated: 0,
      updateInterval: { days: 0, hours: 1, minutes: 0 },
      conversion: { divideBy: 100, roundMode: 'round', decimals: 0 },
      providerText: 'Google Finance',
      sessionTimeMin: 10, sessionWarnMin: 2,
      transferMin: 0, transferMax: 0, transferFee: 0,
      isStatsPublic: true,
      tabNames: { dashboard: '대시보드', invest: '투자(주식)', bank: '은행', store: '상점/보관함', donate: '기부 센터' }
    };

    const INITIAL_USERS = [
      { id: '1', name: '강유주', pass: '6701', role: 'student', canFine: false, profileUrl: '' },
      { id: '2', name: '고윤서', pass: '6702', role: 'student', canFine: false, profileUrl: '' },
      { id: '3', name: '공윤호', pass: '6703', role: 'student', canFine: false, profileUrl: '' },
      { id: 'admin', name: '관리자', pass: '1111', role: 'admin', canFine: true, profileUrl: '' }
    ];

    const INITIAL_STOCKS = [
      { id: 's_samsung', ticker: 'KRX:005930', name: '삼성전자', icon: '📱', isVirtual: false, currentPrice: 800, prevPrice: 800, lastUpdated: 0 },
      { id: 's_apple', ticker: 'AAPL', name: '애플', icon: '🍎', isVirtual: false, currentPrice: 2000, prevPrice: 2000, lastUpdated: 0 },
      { id: 's_virtual', ticker: 'CLASS', name: '6학년3반컴퍼니', icon: '🏫', isVirtual: true, currentPrice: 1000, prevPrice: 1000, lastUpdated: 0 }
    ];

    const INITIAL_BANK = [
      { id: 'test', name: '테스트용 (1분)', days: 0, hours: 0, minutes: 1, seconds: 0, rate: 0.01, rateText: '1.0%' }
    ];

    const INITIAL_STORE = [
      { id: 's1', name: '간식', desc: '마가렛트', price: 2000, stock: 26, icon: '🍪', refundable: true, refundLimitHours: 24, isPaused: false, allowUseIfPaused: true }
    ];

    const INITIAL_DONATION_GOALS = [
      { id: 'g1', title: '도비는 자유예요', desc: '1시간 자유시간 획득', current: 0, target: 100000 }
    ];

    // ============================================================================
    // [3] 유틸리티 함수
    // ============================================================================
    const formatMoney = (num) => new Intl.NumberFormat('ko-KR').format(Math.floor(num || 0)) + 'G';
    const formatDate = (dateInput) => {
      const date = new Date(dateInput);
      const y = date.getFullYear(), m = String(date.getMonth() + 1).padStart(2, '0'), d = String(date.getDate()).padStart(2, '0');
      const h = String(date.getHours()).padStart(2, '0'), mn = String(date.getMinutes()).padStart(2, '0');
      return `${y}-${m}-${d} ${h}:${mn}`;
    };
    const parseAmount = (str) => parseInt(String(str).replace(/[^0-9-]/g, ''), 10) || 0;

    const applyConversion = (rawPrice, settings) => {
      if (!settings) return rawPrice;
      let price = rawPrice / (settings.divideBy || 100);
      const mult = Math.pow(10, settings.decimals || 0);
      if (settings.roundMode === 'round') price = Math.round(price * mult) / mult;
      else if (settings.roundMode === 'ceil') price = Math.ceil(price * mult) / mult;
      else if (settings.roundMode === 'floor') price = Math.floor(price * mult) / mult;
      return price;
    };

    // ============================================================================
    // [4] 공통 UI 컴포넌트
    // ============================================================================
    const Badge = ({ children, type }) => {
      const styles = { positive: 'bg-green-100 text-green-700', negative: 'bg-red-100 text-red-700', neutral: 'bg-slate-100 text-slate-700' };
      return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold ${styles[type]}`}>{children}</span>;
    };

    const Modal = ({ isOpen, title, children, onClose, iconStr, color = 'purple' }) => {
      if (!isOpen) return null;
      const colorMap = {
        purple: 'border-purple-100 text-purple-900 bg-purple-50 text-purple-600',
        rose: 'border-rose-100 text-rose-900 bg-rose-50 text-rose-600',
        indigo: 'border-indigo-100 text-indigo-900 bg-indigo-50 text-indigo-600',
        red: 'border-red-100 text-red-900 bg-red-50 text-red-600'
      };
      const c = colorMap[color] || colorMap.purple;
      
      return (
        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-purple-950/60 backdrop-blur-sm p-4 animate-fade-in">
          <div className={`bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden border-2 ${c.split(' ')[0]} flex flex-col max-h-[90vh] animate-zoom-in`}>
            <div className={`p-5 border-b-2 flex justify-between items-center ${c.split(' ')[2]}`}>
              <h3 className={`text-xl font-black flex items-center gap-3 ${c.split(' ')[1]}`}>
                {iconStr && <div className={`w-8 h-8 rounded-lg bg-white shadow-sm flex items-center justify-center ${c.split(' ')[3]}`}><i className={iconStr}></i></div>}
                {title}
              </h3>
              {onClose && <button type="button" onClick={onClose} className="text-gray-400 hover:text-gray-700 transition-colors"><i className="fa-solid fa-xmark text-xl"></i></button>}
            </div>
            <div className="p-6 overflow-y-auto flex-1 scrollbar-hide">{children}</div>
          </div>
        </div>
      );
    };

    const CustomDropdown = ({ options, value, onChange, placeholder }) => {
      return (
        <select className="w-full bg-purple-50 border-2 border-purple-100 text-purple-900 rounded-2xl px-5 py-4 font-bold outline-none" value={value} onChange={e=>onChange(e.target.value)}>
          <option value="" disabled>{placeholder}</option>
          {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      );
    };

    // ============================================================================
    // [5] 뷰 컴포넌트들
    // ============================================================================
    
    // --- [로그인 화면] ---
    function LoginView({ onLogin, users, showAlert }) {
      const [selectedUser, setSelectedUser] = useState(null);
      const [password, setPassword] = useState('');
      const [useAuto, setUseAuto] = useState(false);
      const [useSession, setUseSession] = useState(true);
      const [isLoggingIn, setIsLoggingIn] = useState(false);
      const [isUserModalOpen, setIsUserModalOpen] = useState(false);
      const sortedUsers = [...users].sort((a, b) => (a.role === 'admin' ? 1 : b.role === 'admin' ? -1 : a.name.localeCompare(b.name)));

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!selectedUser) return showAlert('이름을 선택해주세요.');
        if (!password) return showAlert('비밀번호를 입력해주세요.');
        if (String(selectedUser.pass) !== String(password)) return showAlert('비밀번호가 일치하지 않습니다.');
        
        setIsLoggingIn(true);
        setTimeout(() => {
          onLogin(selectedUser.id, selectedUser, useAuto, useSession);
        }, 800);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 relative z-0 bg-gradient-to-br from-purple-900 via-indigo-900 to-purple-950 animate-gradient">
          <div className="bg-white rounded-[2.5rem] p-8 sm:p-10 shadow-2xl relative overflow-hidden border-4 border-purple-200/50 w-full max-w-md animate-zoom-in">
            <div className="flex flex-col items-center mb-8">
              <div className="w-20 h-20 bg-gradient-to-tr from-fuchsia-600 to-purple-600 rounded-3xl flex items-center justify-center shadow-xl mb-4 text-white">
                <i className="fa-solid fa-graduation-cap text-4xl"></i>
              </div>
              <h1 className="text-3xl font-black text-purple-950 text-center tracking-tight">HH 경제교실</h1>
              <p className="text-purple-500 font-bold text-center mt-2">이름을 선택하고 로그인하세요.</p>
            </div>

            {!selectedUser ? (
              <div className="animate-fade-in">
                 <button onClick={() => setIsUserModalOpen(true)} className="w-full bg-white border-2 border-purple-200 text-purple-900 text-xl font-black py-5 rounded-2xl shadow-sm hover:border-purple-500 transition-colors flex justify-between items-center px-6">
                    <span>내 이름 선택하기</span>
                    <i className="fa-solid fa-users text-purple-400"></i>
                 </button>
              </div>
            ) : (
              <form onSubmit={handleSubmit} className="space-y-6 animate-fade-in">
                <div className="flex items-center gap-4 bg-purple-50 p-4 rounded-2xl border-2 border-purple-100">
                  <div className="flex-1">
                    <span className="text-xs font-bold text-purple-500">선택된 사용자</span>
                    <p className="text-xl font-black text-purple-900">{selectedUser.name} <span className="text-sm font-bold text-purple-400">({selectedUser.role === 'admin' ? '관리자' : '학생'})</span></p>
                  </div>
                  <button type="button" onClick={() => {setSelectedUser(null); setPassword('');}} className="bg-white border-2 border-purple-200 text-purple-600 px-4 py-2 rounded-xl font-bold text-sm hover:bg-purple-100">변경</button>
                </div>
                
                <input type="password" autoFocus placeholder="비밀번호 입력" className="w-full bg-white border-2 border-purple-200 text-purple-900 text-center text-2xl tracking-widest rounded-2xl px-5 py-4 outline-none focus:border-purple-600 font-black shadow-inner" value={password} onChange={(e) => setPassword(e.target.value)} />
                
                <div className="bg-slate-50 p-4 rounded-2xl space-y-3 border border-slate-200">
                  <label className="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked={useAuto} onChange={e=>setUseAuto(e.target.checked)} className="w-5 h-5 accent-purple-600 rounded" />
                    <span className="font-bold text-slate-700 text-sm">자동 로그인 <span className="text-red-500 text-xs">(공용 PC 금지, 비번 변경시 해제)</span></span>
                  </label>
                  {selectedUser.role !== 'admin' && (
                    <label className="flex items-center gap-3 cursor-pointer">
                      <input type="checkbox" checked={useSession} onChange={e=>setUseSession(e.target.checked)} className="w-5 h-5 accent-purple-600 rounded" />
                      <span className="font-bold text-slate-700 text-sm">보안 세션 켜기 (미조작시 자동 로그아웃)</span>
                    </label>
                  )}
                </div>

                <button type="submit" disabled={isLoggingIn} className="w-full bg-purple-600 hover:bg-purple-700 text-white font-black text-lg py-5 rounded-2xl shadow-lg transition-all flex justify-center items-center gap-2 disabled:bg-purple-400">
                  {isLoggingIn ? <><i className="fa-solid fa-circle-notch fa-spin"></i> 접속 중...</> : '로그인'}
                </button>
              </form>
            )}
          </div>

          <Modal isOpen={isUserModalOpen} title="이름 선택" iconStr="fa-solid fa-users" onClose={() => setIsUserModalOpen(false)}>
             <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
               {sortedUsers.map(u => (
                 <button key={u.id} onClick={() => {setSelectedUser(u); setPassword(''); setIsUserModalOpen(false);}} className={`p-4 rounded-2xl font-black text-sm transition-transform hover:-translate-y-1 border-2 shadow-sm ${u.role === 'admin' ? 'bg-indigo-50 border-indigo-200 text-indigo-800' : 'bg-purple-50 border-purple-100 text-purple-800'}`}>
                   {u.name}
                 </button>
               ))}
             </div>
          </Modal>
        </div>
      );
    }

    // --- [대시보드 화면] ---
    function DashboardView({ assets, dbData, db, showAlert, showConfirm, setGlobalView }) {
      const [modal, setModal] = useState(null);
      const [selectedTxs, setSelectedTxs] = useState([]);
      
      const [tTarget, setTTarget] = useState(''); const [tAmount, setTAmt] = useState('');
      const [aIds, setAIds] = useState([]); const [aType, setAType] = useState('add'); const [aAmt, setAAmt] = useState(''); const [aReason, setAReason] = useState('');
      const [fIds, setFIds] = useState([]); const [fAmt, setFAmt] = useState(''); const [fReason, setFReason] = useState('');
      
      const usersList = Object.values(dbData.users).filter(u => u.role === 'student');

      const executeTransfer = async (e) => {
        e.preventDefault();
        const amt = parseInt(tAmount, 10);
        if (!tTarget || isNaN(amt) || amt <= 0) return;
        
        const trMin = dbData.settings?.transferMin || 0;
        const trMax = dbData.settings?.transferMax || 0;
        const trFee = dbData.settings?.transferFee || 0;
        const totalCost = amt + trFee;

        if (trMin > 0 && amt < trMin) return showAlert(`최소 송금액은 ${formatMoney(trMin)}입니다.`);
        if (trMax > 0 && amt > trMax) return showAlert(`최대 송금액은 ${formatMoney(trMax)}입니다.`);
        if (totalCost > assets.cash) return showAlert(`현금이 부족합니다. (수수료 포함 필요액: ${formatMoney(totalCost)})`);

        const targetUser = dbData.users[tTarget];
        const hasRecent = (dbData.txs || []).some(tx => tx.userId === assets.id && tx.type === '송금' && tx.desc.includes(targetUser.name) && Date.now() - tx.timestamp < 7*24*3600000);
        
        showConfirm(hasRecent ? `정말 ${targetUser.name}님에게 ${formatMoney(amt)}을 송금하시겠습니까?` : `⚠️ 주의: 최근 1주일 내 송금 기록이 없습니다.\n사기 피해에 주의하세요. 정말 송금할까요?`, async () => {
          const updates = {};
          updates[`economy_users/${assets.id}/cash`] = assets.cash - totalCost;
          updates[`economy_users/${tTarget}/cash`] = targetUser.cash + amt;
          
          const tx1 = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${tx1}`] = { id: tx1, userId: assets.id, type: '송금', desc: `${targetUser.name}에게 이체`, amount: `-${formatMoney(amt)}`, balance: formatMoney(assets.cash-amt), isPositive: false, timestamp: Date.now() };
          
          if (trFee > 0) {
            const txFee = db.ref('economy_transactions').push().key;
            updates[`economy_transactions/${txFee}`] = { id: txFee, userId: assets.id, type: '수수료', desc: `송금 수수료`, amount: `-${formatMoney(trFee)}`, balance: formatMoney(assets.cash-totalCost), isPositive: false, timestamp: Date.now()+1 };
          }

          const tx2 = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${tx2}`] = { id: tx2, userId: tTarget, type: '입금', desc: `${assets.name}으로부터 입금`, amount: `+${formatMoney(amt)}`, balance: formatMoney(targetUser.cash+amt), isPositive: true, timestamp: Date.now()+2 };
          
          await db.ref('/').update(updates);
          setModal(null); setTTarget(''); setTAmt(''); showAlert('송금을 완료했습니다.');
        });
      };

      const executeAdminAction = async (e) => {
        e.preventDefault();
        const amt = parseInt(aAmt, 10);
        if (aIds.length === 0 || isNaN(amt) || amt <= 0) return;
        const updates = {};
        aIds.forEach((id, idx) => {
          const u = dbData.users[id];
          const newCash = aType === 'add' ? u.cash + amt : u.cash - amt;
          updates[`economy_users/${id}/cash`] = newCash;
          const txRef = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${txRef}`] = { id: txRef, userId: id, type: aType==='add'?'시스템 지급':'시스템 차감', desc: aReason||'관리자 반영', amount: (aType==='add'?'+':'-')+formatMoney(amt), balance: formatMoney(newCash), isPositive: aType==='add', timestamp: Date.now()+idx };
        });
        await db.ref('/').update(updates); setModal(null); setAIds([]); setAAmt(''); setAReason(''); showAlert('자산 변경 완료!');
      };

      const executeFine = async (e) => {
        e.preventDefault();
        const amt = parseInt(fAmt, 10);
        if (fIds.length === 0 || isNaN(amt) || amt <= 0) return;
        const updates = {};
        fIds.forEach((id, idx) => {
          const u = dbData.users[id];
          const newCash = u.cash - amt;
          updates[`economy_users/${id}/cash`] = newCash;
          const txRef = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${txRef}`] = { id: txRef, userId: id, type: '벌금 부과', desc: `${fReason} (부과자: ${assets.name})`, amount: `-${formatMoney(amt)}`, balance: formatMoney(newCash), isPositive: false, timestamp: Date.now()+idx };
        });
        await db.ref('/').update(updates); setModal(null); setFIds([]); setFAmt(''); setFReason(''); showAlert('벌금 부과 완료!');
      };

      const deleteTxs = (restore) => {
        if(selectedTxs.length === 0) return;
        showConfirm(`선택한 ${selectedTxs.length}개의 내역을 삭제${restore?'하고 금액을 복원':''}할까요?`, async () => {
          const updates = {};
          selectedTxs.forEach((txId, idx) => {
            const tx = dbData.txs.find(t => t.id === txId);
            if(!tx) return;
            updates[`economy_transactions/${txId}`] = null;
            if(restore && dbData.users[tx.userId]) {
              const u = dbData.users[tx.userId];
              const pAmt = parseAmount(tx.amount);
              const newCash = tx.isPositive ? u.cash - pAmt : u.cash + pAmt;
              updates[`economy_users/${tx.userId}/cash`] = newCash;
              const cRef = db.ref('economy_transactions').push().key;
              updates[`economy_transactions/${cRef}`] = { id: cRef, userId: tx.userId, type: '내역 취소', desc: `복구: ${tx.desc}`, amount: tx.isPositive ? `-${formatMoney(pAmt)}` : `+${formatMoney(pAmt)}`, balance: formatMoney(newCash), isPositive: !tx.isPositive, timestamp: Date.now()+idx };
            }
          });
          await db.ref('/').update(updates); setModal(null); setSelectedTxs([]); showAlert('삭제 완료!');
        });
      };

      const displayTxs = assets.role === 'admin' ? dbData.txs : dbData.txs.filter(t => t.userId === assets.id);
      
      const today = new Date().setHours(0,0,0,0);
      const [statDate, setStatDate] = useState(today);
      const txDates = [...new Set(dbData.txs.map(t => new Date(t.timestamp).setHours(0,0,0,0)))].sort((a,b) => b - a);

      let stats = { m:0, f:0, s:0, t:0, d:0 };
      dbData.txs.filter(t => new Date(t.timestamp).setHours(0,0,0,0) === statDate).forEach(t => {
        const num = parseAmount(t.amount);
        if (t.type === '시스템 지급') stats.m += num;
        if (t.type === '시스템 차감' || t.type === '벌금 부과') stats.f += num;
        if (t.type === '상점 구매') stats.s += num;
        if (t.type === '송금' && !t.isPositive) stats.t += num;
        if (t.type === '기부' && !t.isPositive) stats.d += num;
      });

      const trMin = dbData.settings?.transferMin || 0;
      const trMax = dbData.settings?.transferMax || 0;
      const trFee = dbData.settings?.transferFee || 0;
      const hasTrRule = trMin > 0 || trMax > 0 || trFee > 0;

      return (
        <div className="animate-fade-in space-y-8">
          <Modal isOpen={modal==='transfer'} title="송금하기" iconStr="fa-solid fa-paper-plane" onClose={()=>setModal(null)}>
            <form onSubmit={executeTransfer} className="space-y-6">
              <div><label className="block text-sm font-extrabold mb-2">대상 선택</label><select autoFocus className="w-full p-4 bg-purple-50 rounded-xl font-bold outline-none" value={tTarget} onChange={e=>setTTarget(e.target.value)}><option value="">선택</option>{usersList.filter(u=>u.id!==assets.id).map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
              <div><label className="block text-sm font-extrabold mb-2">금액 (보유: {formatMoney(assets.cash)})</label><input type="number" required className="w-full p-4 bg-purple-50 rounded-xl font-bold outline-none" value={tAmount} onChange={e=>setTAmt(e.target.value)}/></div>
              {hasTrRule && (
                <div className="bg-yellow-50 border border-yellow-200 p-4 rounded-xl text-yellow-800 text-sm font-bold space-y-1">
                  {trMin > 0 && <p>• 최소 송금액: {formatMoney(trMin)}</p>}
                  {trMax > 0 && <p>• 최대 송금액: {formatMoney(trMax)}</p>}
                  {trFee > 0 && <p>• 송금 수수료: {formatMoney(trFee)} (발송자 부담)</p>}
                </div>
              )}
              <button type="submit" className="w-full bg-purple-600 text-white p-4 rounded-xl font-black shadow-lg">보내기</button>
            </form>
          </Modal>

          <Modal isOpen={modal==='adminAction'} title="학생 자산 일괄 관리" iconStr="fa-solid fa-coins" color="fuchsia" onClose={()=>setModal(null)}>
             <form onSubmit={executeAdminAction} className="space-y-6">
               <select multiple autoFocus className="w-full p-4 bg-purple-50 rounded-xl font-bold h-32 outline-none border border-purple-200" value={aIds} onChange={e=>setAIds(Array.from(e.target.selectedOptions, o=>o.value))}>{usersList.map(u=><option key={u.id} value={u.id}>{u.name} ({formatMoney(u.cash)})</option>)}</select>
               <p className="text-xs text-purple-500 font-bold">※ Ctrl(Cmd) 키를 누르고 클릭하면 다중 선택 가능</p>
               <div className="flex gap-4"><label className="flex-1 p-3 bg-purple-50 rounded-xl flex items-center justify-center gap-2 font-bold cursor-pointer"><input type="radio" checked={aType==='add'} onChange={()=>setAType('add')} className="w-5 h-5 accent-purple-600"/> 지급(+)</label><label className="flex-1 p-3 bg-fuchsia-50 rounded-xl flex items-center justify-center gap-2 font-bold cursor-pointer"><input type="radio" checked={aType==='sub'} onChange={()=>setAType('sub')} className="w-5 h-5 accent-fuchsia-600"/> 차감(-)</label></div>
               <input type="number" required placeholder="금액" className="w-full p-4 bg-purple-50 rounded-xl font-bold outline-none" value={aAmt} onChange={(e) => setAAmt(e.target.value)} />
               <input type="text" placeholder="사유 (예: 월급)" className="w-full p-4 bg-purple-50 rounded-xl font-bold outline-none" value={aReason} onChange={(e) => setAReason(e.target.value)} />
               <button type="submit" className="w-full bg-purple-900 text-white py-4 rounded-2xl font-extrabold shadow-lg">실행</button>
             </form>
          </Modal>

          <Modal isOpen={modal==='fine'} title="벌금 부과하기" iconStr="fa-solid fa-gavel" color="red" onClose={()=>setModal(null)}>
             <form onSubmit={executeFine} className="space-y-6">
               <select multiple autoFocus className="w-full p-4 bg-red-50 rounded-xl font-bold h-32 outline-none border border-red-200" value={fIds} onChange={e=>setFIds(Array.from(e.target.selectedOptions, o=>o.value))}>{usersList.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select>
               <p className="text-xs text-red-500 font-bold">※ 다중 선택 가능</p>
               <input type="number" required placeholder="벌금액 (마이너스 통장 허용됨)" className="w-full p-4 bg-red-50 rounded-xl font-bold outline-none" value={fAmt} onChange={(e) => setFAmt(e.target.value)} />
               <input type="text" required placeholder="사유 (필수, 예: 지각)" className="w-full p-4 bg-red-50 rounded-xl font-bold outline-none" value={fReason} onChange={(e) => setFReason(e.target.value)} />
               <button type="submit" className="w-full bg-red-600 text-white py-4 rounded-2xl font-extrabold shadow-lg">벌금 부과</button>
             </form>
          </Modal>

          <Modal isOpen={modal==='txDelete'} title="내역 다중 삭제" iconStr="fa-solid fa-trash-can" color="rose" onClose={()=>setModal(null)}>
             <div className="space-y-6">
               <p className="font-bold text-rose-900 text-center leading-relaxed">선택한 {selectedTxs.length}개의 내역을 삭제합니다.<br/>삭제 방식(금액 복구 여부)을 선택해주세요.</p>
               <div className="space-y-3">
                 <button type="button" onClick={()=>deleteTxs(false)} className="w-full py-4 bg-rose-100 text-rose-900 font-black rounded-xl hover:bg-rose-200">내역만 지우기 (금액 변동 없음)</button>
                 <button type="button" onClick={()=>deleteTxs(true)} className="w-full py-4 bg-red-600 text-white font-black rounded-xl shadow-lg hover:bg-red-700">지우고 금액도 함께 복원하기</button>
               </div>
             </div>
          </Modal>

          {/* 퀵 액션 바둑판 */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            <button onClick={()=>setModal('transfer')} className="bg-white p-5 rounded-[2rem] shadow-md border-2 border-purple-50 hover:border-purple-200 flex flex-col items-center justify-center gap-3 transition-transform hover:-translate-y-1">
              <div className="w-14 h-14 bg-purple-100 rounded-2xl flex items-center justify-center text-purple-600 text-2xl"><i className="fa-solid fa-paper-plane"></i></div><span className="font-black text-purple-900">송금하기</span>
            </button>
            <button onClick={()=>setGlobalView('donate')} className="bg-white p-5 rounded-[2rem] shadow-md border-2 border-rose-50 hover:border-rose-200 flex flex-col items-center justify-center gap-3 transition-transform hover:-translate-y-1">
              <div className="w-14 h-14 bg-rose-100 rounded-2xl flex items-center justify-center text-rose-600 text-2xl"><i className="fa-solid fa-heart"></i></div><span className="font-black text-rose-900">기부 센터</span>
            </button>
            {(assets.role === 'admin' || assets.canFine) && (
              <button onClick={()=>setModal('fine')} className="bg-white p-5 rounded-[2rem] shadow-md border-2 border-red-50 hover:border-red-200 flex flex-col items-center justify-center gap-3 transition-transform hover:-translate-y-1">
                <div className="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center text-red-600 text-2xl"><i className="fa-solid fa-gavel"></i></div><span className="font-black text-red-900">벌금 부과</span>
              </button>
            )}
            {assets.role === 'admin' && (
              <button onClick={()=>setModal('adminAction')} className="bg-purple-900 p-5 rounded-[2rem] shadow-md border-2 border-purple-800 flex flex-col items-center justify-center gap-3 transition-transform hover:-translate-y-1">
                <div className="w-14 h-14 bg-purple-800 rounded-2xl flex items-center justify-center text-white text-2xl"><i className="fa-solid fa-coins"></i></div><span className="font-black text-white">자산 관리</span>
              </button>
            )}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <section className="lg:col-span-2 bg-white rounded-[2.5rem] shadow-xl border-2 border-purple-100 overflow-hidden">
              <div className="p-6 border-b-2 border-purple-50 bg-purple-50/30 flex justify-between items-center">
                <h2 className="text-xl font-black flex items-center gap-3"><i className="fa-solid fa-clock-rotate-left text-purple-600"></i> {assets.role === 'admin' ? '반 전체 내역' : '내 거래 내역'}</h2>
                {assets.role === 'admin' && selectedTxs.length > 0 && <button onClick={()=>setModal('txDelete')} className="bg-red-500 text-white font-black px-4 py-2 rounded-xl shadow-md text-sm transition-transform hover:scale-105">선택 삭제 ({selectedTxs.length})</button>}
              </div>
              <div className="overflow-x-auto p-2 max-h-[500px] overflow-y-auto scrollbar-hide">
                <table className="w-full text-sm text-left">
                  <thead className="text-purple-400 font-extrabold border-b border-purple-50">
                    <tr>
                      {assets.role === 'admin' && <th className="p-3 w-10"><input type="checkbox" onChange={e=>setSelectedTxs(e.target.checked?displayTxs.map(t=>t.id):[])} checked={displayTxs.length>0&&selectedTxs.length===displayTxs.length} className="w-4 h-4 accent-purple-600"/></th>}
                      <th className="p-3">일시</th>{assets.role==='admin'&&<th className="p-3">사용자</th>}<th className="p-3">유형</th><th className="p-3">내용</th><th className="p-3 text-right">증감</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-purple-50">
                    {displayTxs.map(tx => (
                      <tr key={tx.id} className="hover:bg-purple-50/50 transition-colors">
                        {assets.role === 'admin' && <td className="p-3 text-center"><input type="checkbox" checked={selectedTxs.includes(tx.id)} onChange={e=>{if(e.target.checked) setSelectedTxs([...selectedTxs,tx.id]); else setSelectedTxs(selectedTxs.filter(id=>id!==tx.id));}} className="w-4 h-4 accent-purple-600"/></td>}
                        <td className="p-3 text-gray-500 font-bold whitespace-nowrap">{formatDate(tx.timestamp)}</td>
                        {assets.role === 'admin' && <td className="p-3 font-black text-purple-950">{dbData.users[tx.userId]?.name || '알수없음'}</td>}
                        <td className="p-3"><Badge type={tx.isPositive?'positive':tx.type.includes('사용')||tx.type.includes('선물')?'neutral':'negative'}>{tx.type}</Badge></td>
                        <td className="p-3 font-bold text-purple-900">{tx.desc}</td>
                        <td className={`p-3 text-right font-black whitespace-nowrap text-lg ${tx.isPositive?'text-purple-600':tx.type.includes('사용')?'text-gray-500':'text-fuchsia-600'}`}>{tx.amount}</td>
                      </tr>
                    ))}
                    {displayTxs.length===0 && <tr><td colSpan={6} className="p-10 text-center text-purple-300 font-bold text-lg">내역이 없습니다.</td></tr>}
                  </tbody>
                </table>
              </div>
            </section>

            <section className="bg-white rounded-[2.5rem] shadow-xl border-2 border-purple-100 p-8 flex flex-col">
              <div className="flex justify-between items-center mb-6">
                 <h3 className="text-xl font-black flex items-center gap-3"><i className="fa-solid fa-chart-pie text-purple-600"></i> 학급 통계</h3>
                 <select className="bg-purple-50 border border-purple-100 text-purple-900 text-sm font-bold py-1 px-2 rounded-lg outline-none" value={statDate} onChange={e=>setStatDate(Number(e.target.value))}>
                    <option value={today}>오늘</option>
                    {txDates.filter(d=>d!==today).map(d=><option key={d} value={d}>{formatDate(d).split(' ')[0]}</option>)}
                 </select>
              </div>
              <div className="space-y-3 flex-1">
                {[{l:'발행액',v:stats.m,c:'text-purple-600'},{l:'차감/벌금',v:stats.f,c:'text-red-600'},{l:'상점소비',v:stats.s,c:'text-fuchsia-600'},{l:'학생송금',v:stats.t,c:'text-indigo-600'},{l:'전체기부',v:stats.d,c:'text-rose-600'}].map((s,i)=>(
                  <div key={i} className="flex justify-between items-center p-4 bg-purple-50/50 rounded-2xl border border-purple-50">
                    <span className="font-extrabold text-purple-800 text-sm">{s.l}</span><span className={`font-black text-lg ${s.c}`}>{formatMoney(s.v)}</span>
                  </div>
                ))}
              </div>
            </section>
          </div>
        </div>
      );
    }

    // --- [투자(주식) 화면] ---
    function InvestView({ assets, dbData, db, showAlert, showConfirm }) {
      const [modal, setModal] = useState(null); // 'buy', 'sell', 'sync'
      const [selStock, setSelStock] = useState(null);
      const [qty, setQty] = useState('');
      const syncRef = useRef({ isPaused: false, isCancelled: false });
      const [syncState, setSyncState] = useState({ status: 'idle', progress: 0, text: '' });
      const [showManageModal, setShowManageModal] = useState(false);
      
      const [newTck, setNewTck] = useState(''); const [newNm, setNewNm] = useState('');
      const [newIco, setNewIco] = useState('📈'); const [newVirt, setNewVirt] = useState(false);
      const [editVirtualModal, setEditVirtualModal] = useState(null);
      const [newVirtualPrice, setNewVirtualPrice] = useState('');

      const executeBuy = async (e) => {
        e.preventDefault();
        const q = parseInt(qty, 10);
        if(isNaN(q) || q<=0) return showAlert('자연수(주) 단위로만 입력 가능합니다.');
        const cost = q * selStock.currentPrice;
        if(assets.cash < cost) return showAlert(`현금이 부족합니다. (필요: ${formatMoney(cost)})`);
        
        showConfirm(`${selStock.name} ${q}주를 ${formatMoney(cost)}에 매수할까요?`, async () => {
          const updates = {};
          const p = assets.portfolio?.[selStock.id] || { qty:0, totalInvested:0 };
          const nQty = p.qty + q; const nInv = p.totalInvested + cost;
          updates[`economy_users/${assets.id}/cash`] = assets.cash - cost;
          updates[`economy_users/${assets.id}/portfolio/${selStock.id}`] = { qty: nQty, totalInvested: nInv, avgPrice: nInv/nQty };
          const txRef = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${txRef}`] = { id: txRef, userId: assets.id, type: '주식 매수', desc: `${selStock.name} ${q}주 매수`, amount: `-${formatMoney(cost)}`, balance: formatMoney(assets.cash-cost), isPositive: false, timestamp: Date.now() };
          await db.ref('/').update(updates); setModal(null); setQty(''); showAlert('매수 완료!');
        });
      };

      const executeSell = (q) => {
        const p = assets.portfolio?.[selStock.id];
        if(!p || p.qty < q) return showAlert('보유 주식이 부족합니다.');
        const rev = q * selStock.currentPrice;
        showConfirm(`${q}주를 매도하여 ${formatMoney(rev)}를 받을까요?`, async () => {
          const updates = {};
          const nQty = p.qty - q; const nInv = p.totalInvested * (nQty/p.qty);
          updates[`economy_users/${assets.id}/cash`] = assets.cash + rev;
          if(nQty <= 0) updates[`economy_users/${assets.id}/portfolio/${selStock.id}`] = null;
          else updates[`economy_users/${assets.id}/portfolio/${selStock.id}`] = { qty: nQty, totalInvested: nInv, avgPrice: p.avgPrice };
          const txRef = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${txRef}`] = { id: txRef, userId: assets.id, type: '주식 매도', desc: `${selStock.name} ${q}주 매도`, amount: `+${formatMoney(rev)}`, balance: formatMoney(assets.cash+rev), isPositive: true, timestamp: Date.now() };
          await db.ref('/').update(updates); setModal(null); showAlert('매도 완료!');
        });
      };

      const handleAddStock = async (e) => {
        e.preventDefault();
        const id = db.ref('economy_stocks').push().key;
        await db.ref(`economy_stocks/${id}`).set({ id, ticker: newTck, name: newNm, icon: newIco, isVirtual: newVirt, currentPrice: 1000, prevPrice: 1000, lastUpdated: 0 });
        setNewTck(''); setNewNm(''); setShowManageModal(false); showAlert('종목이 추가되었습니다!');
      };

      const handleVirtualEditSubmit = async (e) => {
        e.preventDefault();
        const np = parseInt(newVirtualPrice, 10);
        if(isNaN(np) || np < 0) return;
        await db.ref(`economy_stocks/${editVirtualModal.id}`).update({ prevPrice: editVirtualModal.currentPrice, currentPrice: np, lastUpdated: Date.now() });
        setEditVirtualModal(null); setNewVirtualPrice(''); showAlert('주가가 조작되었습니다.');
      };

      const runSync = async () => {
        setModal('sync'); syncRef.current = { isPaused: false, isCancelled: false };
        setSyncState({ status: 'running', progress: 0, text: '시트 연결 중...' });
        
        if(!dbData.settings.googleSheetUrl) {
          setSyncState({ status: 'done', progress: 0, text: '설정 탭에서 구글 시트 링크를 먼저 넣어주세요.' }); return;
        }
        try {
          const res = await fetch(dbData.settings.googleSheetUrl);
          const txt = await res.text();
          const rows = txt.split('\n').map(r=>r.replace(/\r/g,'').split(','));
          const updates = {}; const now = Date.now();
          
          let updatedCount = 0;
          for(let i=0; i<dbData.stocks.length; i++) {
            if(syncRef.current.isCancelled) { setSyncState({ status: 'cancelled', progress: 0, text: '동기화가 취소되었습니다.' }); return; }
            while(syncRef.current.isPaused) { await new Promise(r=>setTimeout(r, 500)); if(syncRef.current.isCancelled) return; }
            
            const st = dbData.stocks[i];
            if(st.isVirtual) continue;
            
            setSyncState({ status: 'running', progress: Math.floor((i/dbData.stocks.length)*100), text: `${i+1}/${dbData.stocks.length} 업데이트 중: ${st.name}` });
            await new Promise(r=>setTimeout(r, 400)); 
            
            const match = rows.find(r=>r[0]&&r[0].trim()===st.ticker);
            if(match && match[1] && !isNaN(parseFloat(match[1]))) {
               updates[`economy_stocks/${st.id}/currentPrice`] = applyConversion(parseFloat(match[1]), dbData.settings);
               updates[`economy_stocks/${st.id}/prevPrice`] = applyConversion(match[2]?parseFloat(match[2]):parseFloat(match[1]), dbData.settings);
               updates[`economy_stocks/${st.id}/lastUpdated`] = now;
               updatedCount++;
            }
          }
          
          if(Object.keys(updates).length > 0) {
            updates[`economy_settings/stockLastUpdated`] = now;
            await db.ref('/').update(updates);
          }
          setSyncState({ status: 'done', progress: 100, text: `${updatedCount}개 종목 업데이트 완료!` });
          setTimeout(()=>setModal(null), 2000);
        } catch(e) {
          setSyncState({ status: 'done', progress: 0, text: `오류 발생: 연결 실패` });
        }
      };

      const renderIcon = (iconStr) => iconStr?.startsWith('http') ? <img src={iconStr} className="w-10 h-10 object-cover rounded-full shadow-sm" alt="icon"/> : <span>{iconStr}</span>;

      return (
        <div className="animate-fade-in space-y-8">
          <Modal isOpen={modal==='buy'} title="매수 주문" iconStr="fa-solid fa-arrow-trend-up" color="purple" onClose={()=>setModal(null)}>
            <form onSubmit={executeBuy} className="space-y-6">
              <p className="font-bold text-center text-lg">{selStock?.name} <span className="text-purple-600">({formatMoney(selStock?.currentPrice)})</span></p>
              <input type="number" required autoFocus placeholder="매수할 수량 (주)" className="w-full p-4 bg-white border-2 border-purple-200 rounded-xl font-black text-center text-2xl outline-none focus:border-purple-500 shadow-inner" value={qty} onChange={e=>setQty(e.target.value)}/>
              <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 text-white p-4 rounded-xl font-black shadow-lg transition-colors">주문 확정 (예상: {formatMoney(parseInt(qty||0)*selStock?.currentPrice)})</button>
            </form>
          </Modal>

          <Modal isOpen={modal==='sell'} title="매도 주문" iconStr="fa-solid fa-arrow-trend-down" color="fuchsia" onClose={()=>setModal(null)}>
            <div className="space-y-4">
               <p className="font-bold text-center mb-6 text-lg">{selStock?.name} 보유량: {assets.portfolio?.[selStock?.id]?.qty || 0}주</p>
               <div className="grid grid-cols-2 gap-3">
                 {[1, 5, 10, 'all'].map(q => {
                   const actualQ = q === 'all' ? assets.portfolio?.[selStock?.id]?.qty : q;
                   if(!actualQ) return null;
                   return <button type="button" key={q} onClick={()=>executeSell(actualQ)} className="p-4 bg-fuchsia-50 hover:bg-fuchsia-600 hover:text-white text-fuchsia-900 font-black rounded-xl border-2 border-fuchsia-200 transition-colors shadow-sm">{q==='all'?'전부':`${q}주`} 팔기</button>
                 })}
               </div>
            </div>
          </Modal>

          <Modal isOpen={modal==='sync'} title="구글 시트 동기화" iconStr="fa-solid fa-rotate" color="indigo" onClose={syncState.status==='done'||syncState.status==='cancelled'?()=>setModal(null):undefined}>
             <div className="flex flex-col items-center justify-center py-6 space-y-6">
                {syncState.status === 'done' ? <i className="fa-solid fa-circle-check text-6xl text-green-500 animate-zoom-in"></i> : <i className={`fa-solid fa-rotate text-6xl text-indigo-400 ${syncState.status==='running'?'fa-spin':''}`}></i>}
                <h3 className="text-xl font-black text-indigo-900 text-center">{syncState.text}</h3>
                <div className="w-full bg-indigo-100 rounded-full h-4 overflow-hidden border border-indigo-200 shadow-inner"><div className="bg-gradient-to-r from-indigo-400 to-indigo-600 h-full transition-all duration-300" style={{width:`${syncState.progress}%`}}></div></div>
                {syncState.status !== 'done' && syncState.status !== 'cancelled' && (
                  <div className="flex gap-4 w-full mt-4">
                     <button type="button" onClick={()=>{syncRef.current.isCancelled=true; setSyncState({...syncState, status:'cancelled', text:'취소됨'}); setTimeout(()=>setModal(null), 1500);}} className="flex-1 bg-white border-2 border-red-200 text-red-600 hover:bg-red-50 py-3 rounded-xl font-black transition-colors">취소</button>
                     <button type="button" onClick={()=>{
                       const isP = syncRef.current.isPaused;
                       syncRef.current.isPaused = !isP;
                       setSyncState({...syncState, status: !isP ? 'paused' : 'running', text: !isP ? '일시중지됨' : '재개됨...'});
                     }} className={`flex-1 text-white py-3 rounded-xl font-black shadow-md transition-colors ${syncState.status==='paused'?'bg-green-500 hover:bg-green-600':'bg-orange-500 hover:bg-orange-600'}`}>{syncState.status==='paused'?'재개':'일시중지'}</button>
                  </div>
                )}
             </div>
          </Modal>

    // --- [은행 화면] --- 
    function BankView({ assets, dbData, db, showAlert, showConfirm }) {
      const [modal, setModal] = useState(null);
      const [bName, setBName] = useState(''); const [bAmt, setBAmt] = useState(''); const [bSel, setBSel] = useState('');
      
      const [editProd, setEditProd] = useState(null);
      const [nNm, setNNm] = useState(''); const [nDay, setNDay] = useState(''); 
      const [nHr, setNHr] = useState(''); const [nMin, setNMin] = useState(''); const [nSec, setNSec] = useState('');
      const [nRat, setNRate] = useState('');

      const deposits = Object.values(dbData.deposits).filter(d=>d.userId===assets.id);

      const createDep = async (e) => {
        e.preventDefault();
        const a = parseInt(bAmt, 10);
        if(!bSel || !bName || isNaN(a) || a<=0) return showAlert('올바른 값을 입력해주세요.');
        if(a > assets.cash) return showAlert('현금이 부족합니다.');
        const prod = dbData.bank.find(p=>p.id===bSel);
        
        const m = new Date();
        m.setDate(m.getDate()+(prod.days||0)); m.setHours(m.getHours()+(prod.hours||0)); m.setMinutes(m.getMinutes()+(prod.minutes||0)); m.setSeconds(m.getSeconds()+(prod.seconds||0));
        
        const updates = {};
        updates[`economy_users/${assets.id}/cash`] = assets.cash-a;
        updates[`economy_users/${assets.id}/deposit`] = assets.deposit+a;
        const dRef = db.ref('economy_deposits').push().key;
        updates[`economy_deposits/${dRef}`] = { id: dRef, userId: assets.id, name: bName, productName: prod.name, principal: a, rate: prod.rate, maturityDate: m.toISOString(), createdAt: Date.now() };
        const tRef = db.ref('economy_transactions').push().key;
        updates[`economy_transactions/${tRef}`] = { id: tRef, userId: assets.id, type: '예금 가입', desc: bName, amount: `-${formatMoney(a)}`, balance: formatMoney(assets.cash-a), isPositive: false, timestamp: Date.now() };
        await db.ref('/').update(updates); setModal(null); setBName(''); setBAmt(''); showAlert('예금 생성 완료!');
      };

      const processDep = (d, isM) => {
        const ret = isM ? Math.floor(d.principal * (1+d.rate)) : d.principal;
        showConfirm(isM?`만기 이자 포함 ${formatMoney(ret)} 수령할까요?`:'중도해지 시 이자는 포기됩니다. 진행할까요?', async () => {
          const updates = {};
          updates[`economy_deposits/${d.id}`] = null;
          updates[`economy_users/${assets.id}/cash`] = assets.cash+ret;
          updates[`economy_users/${assets.id}/deposit`] = assets.deposit-d.principal;
          const tRef = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${tRef}`] = { id: tRef, userId: assets.id, type: isM?'만기 수령':'중도 해지', desc: d.name, amount: `+${formatMoney(ret)}`, balance: formatMoney(assets.cash+ret), isPositive: true, timestamp: Date.now() };
          await db.ref('/').update(updates); showAlert('처리 완료!');
        });
      };

      const openEditForm = (p = null) => {
        if(p) {
          setEditProd(p); setNNm(p.name); setNDay(p.days||0); setNHr(p.hours||0); setNMin(p.minutes||0); setNSec(p.seconds||0); setNRate(p.rate*100);
        } else {
          setEditProd(null); setNNm(''); setNDay(0); setNHr(0); setNMin(0); setNSec(0); setNRate('');
        }
        setModal('editProd');
      }

      const handleSaveProd = async (e) => {
        e.preventDefault();
        const id = editProd ? editProd.id : db.ref('economy_bank_products').push().key;
        await db.ref(`economy_bank_products/${id}`).set({ 
          id, name: nNm, days: parseInt(nDay,10)||0, hours: parseInt(nHr,10)||0, minutes: parseInt(nMin,10)||0, seconds: parseInt(nSec,10)||0,
          rate: parseFloat(nRat)/100, rateText: `${parseFloat(nRat)}%` 
        });
        setModal(null); setEditProd(null); showAlert('상품이 저장되었습니다.');
      };

      return (
        <div className="animate-fade-in space-y-8">
          <Modal isOpen={modal==='new'} title="새 예금 가입" iconStr="fa-solid fa-piggy-bank" color="purple" onClose={()=>setModal(null)}>
            <form onSubmit={createDep} className="space-y-6">
              <CustomDropdown options={dbData.bank.map(p=>({value:p.id, label:`${p.name} (${p.rateText})`}))} value={bSel} onChange={setBSel} placeholder="가입할 예금 상품을 선택하세요" />
              <input type="text" required autoFocus placeholder="내 예금 통장 이름 (예: 자동차 사기)" className="w-full p-4 bg-white border-2 border-purple-200 rounded-xl font-bold outline-none focus:border-purple-500" value={bName} onChange={e=>setBName(e.target.value)}/>
              <input type="number" required placeholder={`가입할 금액 (보유: ${formatMoney(assets.cash)})`} className="w-full p-4 bg-white border-2 border-purple-200 rounded-xl font-bold outline-none focus:border-purple-500 shadow-inner" value={bAmt} onChange={e=>setBAmt(e.target.value)}/>
              <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 text-white p-4 rounded-xl font-black shadow-lg transition-colors">가입 확정</button>
            </form>
          </Modal>

          <Modal isOpen={modal==='mng'} title="은행 상품 관리" iconStr="fa-solid fa-building-columns" color="indigo" onClose={()=>setModal(null)}>
            <div className="space-y-4">
              <button onClick={()=>openEditForm()} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-md hover:-translate-y-1 transition-transform mb-2"><i className="fa-solid fa-plus mr-2"></i>새 예금 상품 등록</button>
              {dbData.bank.map(p => (
                <div key={p.id} className="flex justify-between bg-white p-5 rounded-2xl font-bold items-center border-2 border-indigo-50 shadow-sm">
                  <div className="text-indigo-900">{p.name} <span className="text-xs text-indigo-500 block mt-1">{p.days}일 {p.hours}시간 {p.minutes}분 {p.seconds}초 / {p.rateText}</span></div>
                  <div className="flex gap-2">
                    <button onClick={()=>openEditForm(p)} className="bg-slate-100 text-slate-700 hover:bg-slate-200 p-2.5 rounded-lg transition-colors"><i className="fa-solid fa-pen"></i></button>
                    <button onClick={()=>showConfirm('삭제하시겠습니까?', async ()=>{ await db.ref(`economy_bank_products/${p.id}`).remove(); showAlert('삭제됨'); })} className="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white p-2.5 rounded-lg transition-colors"><i className="fa-solid fa-trash"></i></button>
                  </div>
                </div>
              ))}
            </div>
          </Modal>

          <Modal isOpen={modal==='editProd'} title={editProd ? '상품 수정' : '새 예금 상품 등록'} color="indigo" onClose={()=>{setModal('mng'); setEditProd(null);}}>
            <form onSubmit={handleSaveProd} className="space-y-4">
              <input required autoFocus placeholder="상품명 (예: 단기 적금)" className="w-full p-4 bg-white border-2 border-indigo-100 rounded-xl font-bold outline-none" value={nNm} onChange={e=>setNNm(e.target.value)} />
              <div className="grid grid-cols-2 gap-3 bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                <div className="flex items-center gap-2 text-sm font-bold text-indigo-800"><input type="number" className="w-full p-3 rounded-lg outline-none border border-indigo-200 text-center" value={nDay} onChange={e=>setNDay(e.target.value)} />일</div>
                <div className="flex items-center gap-2 text-sm font-bold text-indigo-800"><input type="number" className="w-full p-3 rounded-lg outline-none border border-indigo-200 text-center" value={nHr} onChange={e=>setNHr(e.target.value)} />시</div>
                <div className="flex items-center gap-2 text-sm font-bold text-indigo-800"><input type="number" className="w-full p-3 rounded-lg outline-none border border-indigo-200 text-center" value={nMin} onChange={e=>setNMin(e.target.value)} />분</div>
                <div className="flex items-center gap-2 text-sm font-bold text-indigo-800"><input type="number" className="w-full p-3 rounded-lg outline-none border border-indigo-200 text-center" value={nSec} onChange={e=>setNSec(e.target.value)} />초</div>
              </div>
              <input type="number" step="0.1" required placeholder="이자율 (%)" className="w-full p-4 bg-white border-2 border-indigo-100 rounded-xl font-bold outline-none" value={nRat} onChange={e=>setNRate(e.target.value)} />
              <button type="submit" className="w-full bg-indigo-600 text-white p-4 rounded-xl font-black shadow-lg">저장하기</button>
            </form>
          </Modal>

          <div className="flex justify-between items-center bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-purple-100">
            <h1 className="text-3xl font-black flex items-center gap-4"><div className="bg-purple-100 p-3 rounded-2xl"><i className="fa-solid fa-building-columns text-purple-600"></i></div> HH 은행</h1>
            {assets.role === 'admin' ? (
               <button onClick={()=>setModal('mng')} className="bg-purple-900 text-white px-6 py-4 rounded-2xl font-black shadow-lg hover:-translate-y-1 transition-transform">예금 상품 관리</button>
            ) : (
               <button onClick={()=>setModal('new')} className="bg-purple-600 text-white px-6 py-4 rounded-2xl font-black shadow-lg hover:-translate-y-1 transition-transform">예금 가입</button>
            )}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            {deposits.map(d => {
              const isM = Date.now() >= new Date(d.maturityDate).getTime();
              return (
                <div key={d.id} className={`bg-white p-6 rounded-3xl border-4 ${isM?'border-purple-400 shadow-xl':'border-purple-50 shadow-sm'} flex flex-col transition-all hover:-translate-y-1`}>
                  <h4 className="text-xl font-black mb-4 text-purple-950">{d.name}</h4>
                  <div className="bg-purple-50 p-4 rounded-2xl text-sm font-bold space-y-3 mb-6">
                     <div className="flex justify-between border-b border-purple-100 pb-2"><span className="text-purple-400">원금</span><span className="text-purple-900">{formatMoney(d.principal)}</span></div>
                     <div className="flex justify-between border-b border-purple-100 pb-2"><span className="text-purple-400">이자율</span><span className="text-purple-900">{d.rate*100}%</span></div>
                     <div className="flex justify-between"><span className="text-purple-400">만기일</span><span className="text-purple-900">{formatDate(d.maturityDate)}</span></div>
                  </div>
                  {assets.role !== 'admin' && <button onClick={()=>processDep(d, isM)} className={`w-full py-4 font-black rounded-xl transition-colors ${isM?'bg-purple-600 text-white shadow-md hover:bg-purple-700':'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>{isM?'만기 수령 (이자 포함)':'중도 해지 (원금만)'}</button>}
                </div>
              )
            })}
            {deposits.length === 0 && <div className="col-span-full py-16 bg-white rounded-3xl border-2 border-dashed border-purple-100 text-center font-bold text-purple-300 text-lg">가입된 예금이 없습니다.</div>}
          </div>
        </div>
      );
    }

    // --- [상점 및 보관함 화면] ---
    function StoreView({ assets, dbData, db, showAlert, showConfirm }) {
      const [tab, setTab] = useState('store');
      const [modal, setModal] = useState(null); 
      const [pId, setPId] = useState(''); const [pNm, setPNm] = useState(''); const [pIco, setPIco] = useState(''); const [pPri, setPPri] = useState(''); const [pStk, setPStk] = useState(''); const [pDesc, setPDesc] = useState(''); const [pRef, setPRef] = useState(true); const [pRefHr, setPRefHr] = useState(24); const [pPause, setPPause] = useState(false); const [pAllowU, setPAllowU] = useState(true);
      
      const [now, setNow] = useState(Date.now());
      useEffect(() => { const timer = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(timer); }, []);

      const myInv = dbData.inventory.filter(i=>i.userId===assets.id);
      const allInv = dbData.inventory;

      const buy = async (p) => {
        if(p.stock<=0 || p.isPaused) return;
        if(assets.cash < p.price) return showAlert('현금이 부족합니다.');
        showConfirm(`'${p.name}' 환불 ${p.refundable?`${p.refundLimitHours}시간 내 가능`:'불가'} 상품입니다.\n구매할까요?`, async () => {
          const updates = {};
          updates[`economy_users/${assets.id}/cash`] = assets.cash - p.price;
          updates[`economy_store_products/${p.id}/stock`] = p.stock - 1;
          const iId = db.ref('economy_inventory').push().key;
          updates[`economy_inventory/${iId}`] = { id: iId, userId: assets.id, productId: p.id, productName: p.name, icon: p.icon, price: p.price, purchasedAt: Date.now(), isRefundable: p.refundable, refundLimitHours: p.refundLimitHours, status: 'active' };
          const tId = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${tId}`] = { id: tId, userId: assets.id, type: '상점 구매', desc: p.name, amount: `-${formatMoney(p.price)}`, balance: formatMoney(assets.cash-p.price), isPositive: false, timestamp: Date.now() };
          await db.ref('/').update(updates); showAlert('구매 완료!');
        });
      };

      const useItem = async (item, force = false) => {
        const prod = dbData.store.find(p=>p.id===item.productId);
        if(!force && prod && prod.isPaused && !prod.allowUseIfPaused) return showAlert('현재 사용이 제한된 상품입니다.');
        showConfirm(force?'강제로 사용 처리합니까?':'사용하시겠습니까?\n(사용 후에는 내역에 회색으로 남습니다)', async () => {
          const updates = {};
          updates[`economy_inventory/${item.id}/status`] = 'used';
          updates[`economy_inventory/${item.id}/usedAt`] = Date.now();
          const tId = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${tId}`] = { id: tId, userId: item.userId, type: '아이템 사용', desc: `${item.productName} 1개 사용`, amount: '0G', balance: formatMoney(dbData.users[item.userId].cash), isPositive: false, timestamp: Date.now() };
          await db.ref('/').update(updates); showAlert('사용 완료!');
        });

      const refundItem = async (item, force = false) => {

        showConfirm(force?'강제로 환불시킵니까?':`${formatMoney(item.price)} 환불받을까요?`, async () => {
          const updates = {};

          updates[`economy_inventory/${item.id}`] = null;

          const prod = dbData.store.find(p=>p.id===item.productId);
          if(prod) updates[`economy_store_products/${prod.id}/stock`] = prod.stock + 1;
          const tId = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${tId}`] = { id: tId, userId: u.id, type: '아이템 환불', desc: item.productName, amount: `+${formatMoney(item.price)}`, balance: formatMoney(u.cash+item.price), isPositive: true, timestamp: Date.now() };
          await db.ref('/').update(updates); showAlert('환불 완료!');

      const donateItem = async (item) => {
        showConfirm('기부 센터 나눔 장터로 이 아이템을 기부할까요?\n(기부 시 내 보관함에서는 사라집니다)', async () => {

                </div>

          {tab === 'inv' && (
            <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
              {myInv.map(i => {

                return (
                  <div key={i.id} className={`bg-white p-6 rounded-[2rem] border-4 ${isUsed?'border-gray-200 grayscale opacity-60':'border-fuchsia-100 shadow-lg'} flex flex-col transition-all`}>
                    <div className="flex items-center gap-4 mb-4"><div className="bg-fuchsia-50 w-16 h-16 flex items-center justify-center rounded-2xl border border-fuchsia-100">{renderIcon(i.icon)}</div><div className="font-black text-xl text-fuchsia-950 leading-tight">{i.productName}</div></div>
                    <div className="bg-fuchsia-50/50 p-4 rounded-2xl mb-4 space-y-2 border border-fuchsia-50">
                      <div className="text-xs font-bold text-gray-500 flex justify-between"><span>구매가</span><span className="text-fuchsia-900">{formatMoney(i.price)}</span></div>
                      <div className="text-xs font-bold text-gray-500 flex justify-between"><span>{isUsed?'사용일':'구매일'}</span><span className="text-fuchsia-900">{formatDate(isUsed?i.usedAt:i.purchasedAt)}</span></div>
                    </div>
                    {!isUsed ? (
                      <div className="mt-auto space-y-3">
                        {canRefund ? <div className="text-[11px] font-black text-rose-500 bg-rose-50 py-2 rounded-lg text-center border border-rose-100 animate-pulse">환불 기한: {formatTimeLeft(refundMs)}</div> : (i.isRefundable ? <div className="text-[11px] font-black text-gray-400 text-center py-2 bg-gray-50 rounded-lg">환불 기한이 지났습니다</div> : null)}
                        <div className="grid grid-cols-3 gap-2">

                          <button onClick={()=>donateItem(i)} className="bg-rose-50 text-rose-600 border border-rose-200 py-3 rounded-xl font-black hover:bg-rose-100 transition-colors">기부</button>
                          <button onClick={()=>refundItem(i)} disabled={!canRefund} className="bg-white border border-gray-200 text-gray-600 py-3 rounded-xl font-black disabled:opacity-50 hover:bg-gray-50 transition-colors">환불</button>
                        </div>

              })}
              {myInv.length === 0 && <div className="col-span-full py-24 text-center font-bold text-fuchsia-300 text-xl border-2 border-dashed border-fuchsia-100 rounded-[2.5rem] bg-white">보관함이 텅 비어있습니다.</div>}
            </div>
          )}

          {tab === 'mng' && assets.role==='admin' && (
             <div className="space-y-6">
               <button onClick={()=>openForm()} className="bg-fuchsia-600 hover:bg-fuchsia-700 text-white px-8 py-4 rounded-2xl font-black shadow-xl hover:-translate-y-1 transition-transform mb-2"><i className="fa-solid fa-plus mr-2"></i> 새 상점 아이템 등록</button>
               <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                 {dbData.store.map(p => (
                   <div key={p.id} className={`bg-white p-5 rounded-2xl border-2 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 font-bold shadow-sm ${p.isPaused?'border-gray-200 bg-gray-50':'border-fuchsia-100'}`}>

                     <div className="flex gap-2 w-full sm:w-auto">
                        <button onClick={()=>openForm(p)} className="flex-1 sm:flex-none bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-2.5 rounded-xl transition-colors">수정</button>
                     </div>
                   </div>
                 ))}
               </div>
             </div>
          )}

          {tab === 'allinv' && assets.role==='admin' && (
            <div className="space-y-4">
              <div className="bg-white p-6 rounded-3xl border-2 border-fuchsia-100 shadow-md max-h-[600px] overflow-y-auto pr-2 scrollbar-hide">
                <table className="w-full text-left text-sm font-bold">
                   <thead className="text-fuchsia-500 border-b-2 border-fuchsia-50"><tr><th className="pb-3">소유자</th><th className="pb-3">아이템명</th><th className="pb-3">상태 및 구매일</th><th className="pb-3 text-right">강제 액션</th></tr></thead>
                   <tbody className="divide-y divide-fuchsia-50 text-fuchsia-900">
                     {allInv.map(i => (
                       <tr key={i.id} className={`${i.status==='used'?'opacity-50 grayscale bg-gray-50/50':''} transition-colors hover:bg-fuchsia-50/30`}>
                         <td className="py-4 px-2">[{dbData.users[i.userId]?.name}]</td>
                         <td className="py-4 flex items-center gap-3"><div className="w-10 h-10 rounded-lg bg-white border border-fuchsia-50 flex items-center justify-center shadow-sm">{renderIcon(i.icon)}</div><span className="font-black text-base">{i.productName}</span></td>
                         <td className="py-4 text-xs text-gray-500">{i.status==='used'?`사용완료 (${formatDate(i.usedAt)})`:`활성 (${formatDate(i.purchasedAt)})`}</td>
                         <td className="py-4 text-right space-x-2">
                           {i.status !== 'used' && <button onClick={()=>useItem(i,true)} className="bg-purple-100 hover:bg-purple-200 text-purple-700 px-4 py-2 rounded-lg transition-colors font-black">강제사용</button>}
                           <button onClick={()=>refundItem(i,true)} className="bg-rose-100 hover:bg-rose-200 text-rose-700 px-4 py-2 rounded-lg transition-colors font-black">강제환불</button>

                             showConfirm('이 아이템을 흔적 없이 영구 삭제하시겠습니까?\n(학생에게 환불금이 지급되지 않습니다)', async ()=>{

    // --- [기부 센터 화면] ---
    function DonateView({ assets, dbData, db, showAlert, showConfirm }) {
      const [tab, setTab] = useState('donate');
      const [dGoal, setDGoal] = useState('general'); const [dAmt, setDAmt] = useState(''); const [dMsg, setDMsg] = useState(''); const [dAnon, setDAnon] = useState(false);
      const [modal, setModal] = useState(null); 
      const [gId, setGId] = useState(''); const [gTitle, setGTitle] = useState(''); const [gDesc, setGDesc] = useState(''); const [gTarget, setGTarget] = useState('');
      const [selItem, setSelItem] = useState(null); const [giveTarget, setGiveTarget] = useState('');
      const [deleteGoalData, setDeleteGoalData] = useState(null); const [transferTargetId, setTransferTargetId] = useState('general');

      const executeDonate = async (e) => {
        e.preventDefault();
        const amt = parseInt(dAmt, 10);
        if(isNaN(amt)||amt<=0) return;
        if(amt>assets.cash) return showAlert('현금이 부족합니다.');
        const gName = dGoal==='general' ? '일반 기부' : dbData.goals.find(g=>g.id===dGoal)?.title;
        
        showConfirm(dGoal==='general'?'일반 기부는 목표 달성 바에 누적되지 않습니다.\n그래도 기부하시겠습니까?':`'${gName}'에 기부할까요?`, async () => {
          const updates = {};
          updates[`economy_users/${assets.id}/cash`] = assets.cash - amt;
          if (dGoal === 'general') {
            updates[`economy_users/${assets.id}/generalDonated`] = (assets.generalDonated || 0) + amt;
          } else {
            const goal = dbData.goals.find(g=>g.id===dGoal);
            if(goal) updates[`economy_donation_goals/${dGoal}/current`] = (goal.current||0)+amt;
          }
          const dId = db.ref('economy_donations').push().key;
          updates[`economy_donations/${dId}`] = { id: dId, userId: assets.id, userName: dAnon?'익명 천사':assets.name, goalId: dGoal, goalName: gName, amount: amt, message: dMsg, timestamp: Date.now() };
          const tId = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${tId}`] = { id: tId, userId: assets.id, type: '기부', desc: `기부: ${gName}`, amount: `-${formatMoney(amt)}`, balance: formatMoney(assets.cash-amt), isPositive: false, timestamp: Date.now() };
          await db.ref('/').update(updates); setDAmt(''); setDMsg(''); setDAnon(false); showAlert('소중한 기부, 정말 감사합니다!');
        });
      };

      const handleRefund = (don, force=false) => {
        if(!force && (Date.now()-don.timestamp)/3600000 > dbData.settings.donationRefundLimitHours) return showAlert('취소 기한이 경과하여 환불할 수 없습니다.');
        showConfirm(force?'강제로 기부를 취소시킵니다.':'기부를 취소하고 금액을 환불받을까요?', async () => {
          const updates = {};
          const u = dbData.users[don.userId];
          updates[`economy_donations/${don.id}`] = null;
          updates[`economy_users/${u.id}/cash`] = u.cash+don.amount;
          if(don.goalId==='general') updates[`economy_users/${u.id}/generalDonated`] = Math.max(0,(u.generalDonated||0)-don.amount);
          else {
            const goal = dbData.goals.find(g=>g.id===don.goalId);
            if(goal) updates[`economy_donation_goals/${don.goalId}/current`] = Math.max(0, goal.current-don.amount);
          }
          const tId = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${tId}`] = { id: tId, userId: u.id, type: '기부 취소', desc: `취소: ${don.goalName}`, amount: `+${formatMoney(don.amount)}`, balance: formatMoney(u.cash+don.amount), isPositive: true, timestamp: Date.now() };
          await db.ref('/').update(updates); showAlert('기부가 취소되었습니다.');
        });
      };

      const saveGoal = async (e) => {
        e.preventDefault();
        const id = gId || db.ref('economy_donation_goals').push().key;
        await db.ref(`economy_donation_goals/${id}`).set({ id, title: gTitle, desc: gDesc, target: parseInt(gTarget,10), current: gId?dbData.goals.find(g=>g.id===gId).current:0 });

      const executeDeleteGoal = async (e) => {

        showConfirm(`마지막 확인입니다.\n[${deleteGoalData.title}] 목표를 완전히 삭제하고, 설정하신 대로 금액을 이동시킵니다.`, async () => {
          const updates = {};
          updates[`economy_donation_goals/${deleteGoalData.id}`] = null;
          const dons = dbData.donations.filter(d=>d.goalId===deleteGoalData.id);
          
          if(transferTargetId==='vanish') {
            dons.forEach(d => { updates[`economy_donations/${d.id}/goalId`] = 'vanished'; updates[`economy_donations/${d.id}/goalName`] = '(소멸된 목표)'; });
          } else if(transferTargetId==='refund') {
            dons.forEach(d => {
               updates[`economy_donations/${d.id}`] = null; 
               const u = dbData.users[d.userId];
               if(u) {
                 updates[`economy_users/${u.id}/cash`] = (updates[`economy_users/${u.id}/cash`] || u.cash) + d.amount;
                 const tId = db.ref('economy_transactions').push().key;
                 updates[`economy_transactions/${tId}`] = { id: tId, userId: u.id, type: '기부 환불', desc: `목표 삭제로 인한 자동 환불`, amount: `+${formatMoney(d.amount)}`, balance: formatMoney((updates[`economy_users/${u.id}/cash`])), isPositive: true, timestamp: Date.now() };
               }
            });
          } else if(transferTargetId==='general') {
            dons.forEach(d => {
              updates[`economy_donations/${d.id}/goalId`] = 'general'; updates[`economy_donations/${d.id}/goalName`] = '일반 기부 (강제 이동됨)';
              const u = dbData.users[d.userId];
              if(u) updates[`economy_users/${u.id}/generalDonated`] = (updates[`economy_users/${u.id}/generalDonated`] || u.generalDonated || 0) + d.amount;
            });
          } else {
            const targetGoal = dbData.goals.find(g => g.id === transferTargetId);
            if(targetGoal) {
              updates[`economy_donation_goals/${transferTargetId}/current`] = (updates[`economy_donation_goals/${transferTargetId}/current`] || targetGoal.current || 0) + deleteGoalData.current;
              dons.forEach(d => { updates[`economy_donations/${d.id}/goalId`] = transferTargetId; updates[`economy_donations/${d.id}/goalName`] = targetGoal.title; });
            }
          }
          await db.ref('/').update(updates); setDeleteGoalData(null); showAlert('삭제 및 정산이 완료되었습니다.');
        });
      };

      const assignItem = async (e) => {
        e.preventDefault();
        if(!giveTarget) return;
        const updates = {};
        updates[`economy_item_donations/${selItem.id}`] = null;
        const iId = db.ref('economy_inventory').push().key;
        updates[`economy_inventory/${iId}`] = { id: iId, userId: giveTarget, productId: selItem.productId, productName: selItem.productName, icon: selItem.icon, price: selItem.price, purchasedAt: Date.now(), isRefundable: false, refundLimitHours: 0, status: 'active' };

        updates[`economy_transactions/${tId}`] = { id: tId, userId: giveTarget, type: '기부품 수령', desc: `나눔 장터 수령: ${selItem.productName}`, amount: '0G', balance: formatMoney(dbData.users[giveTarget].cash), isPositive: true, timestamp: Date.now() };
        await db.ref('/').update(updates); setModal(null); setSelItem(null); showAlert('지급 완료!');

            </div>

              <button onClick={()=>setTab('donate')} className={`whitespace-nowrap px-6 py-3 font-extrabold rounded-xl transition-all ${tab==='donate'?'bg-white text-rose-900 shadow-md':'text-rose-500 hover:text-rose-700'}`}>기부 현황 & 참여</button>

                 </section>

                 <section className="bg-white p-8 rounded-[2rem] shadow-xl border-2 border-rose-100 flex flex-col md:flex-row gap-8 items-center">

    // --- [설정 화면 (SettingsView)] ---
    function SettingsView({ assets, dbData, db, showAlert, showConfirm }) {
      // 1. 개인 설정 (학생, 관리자 공통)
      const [pass, setPass] = useState(assets.pass || '');
      const [profileUrl, setProfileUrl] = useState(assets.profileUrl || '');

      const savePersonal = async (e) => {
        e.preventDefault();
        await db.ref(`economy_users/${assets.id}`).update({ pass, profileUrl });
        showAlert('개인 정보가 저장되었습니다.\n(비밀번호를 변경했다면 다음번 로그인 시 새 비밀번호를 사용하세요.)');

      // 2. 관리자 고급 설정
      const [deepAuth, setDeepAuth] = useState(false);
      const [pwInput, setPwInput] = useState('');
      
      const [sKey, setSKey] = useState(dbData.settings?.googleSheetUrl || '');
      const [pText, setPText] = useState(dbData.settings?.providerText || 'Google Finance');
      const [sDiv, setSDiv] = useState(dbData.settings?.conversion?.divideBy || 100);
      const [sRound, setSRound] = useState(dbData.settings?.conversion?.roundMode || 'round');
      const [sDec, setSDec] = useState(dbData.settings?.conversion?.decimals || 0);

      const [sTrMin, setSTrMin] = useState(dbData.settings?.transferMin || 0);
      const [sTrMax, setSTrMax] = useState(dbData.settings?.transferMax || 0);
      const [sTrFee, setSTrFee] = useState(dbData.settings?.transferFee || 0);

      const [tabNames, setTabNames] = useState(dbData.settings?.tabNames || {
        dashboard: '대시보드', invest: '투자(주식)', bank: '은행', store: '상점/보관함', donate: '기부 센터'
      });

      const checkDeepAuth = (e) => {
        e.preventDefault();
        if(pwInput === String(assets.pass)) setDeepAuth(true); else showAlert('비밀번호가 일치하지 않습니다.');
      };

      const handleDeepSettingsSave = async (e) => {
        e.preventDefault();
        const updates = {};
        updates['economy_settings'] = {
          ...dbData.settings, 
          googleSheetUrl: sKey, 
          providerText: pText,
          tabNames: tabNames,
          conversion: { ...dbData.settings.conversion, divideBy: parseFloat(sDiv)||1, roundMode: sRound, decimals: parseInt(sDec,10)||0 },
          transferMin: parseInt(sTrMin)||0, transferMax: parseInt(sTrMax)||0, transferFee: parseInt(sTrFee)||0
        };

        showAlert('관리자 설정이 모두 저장되었습니다.');
