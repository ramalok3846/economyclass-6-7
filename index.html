      return (
        <div className="animate-fade-in space-y-8">
          {/* 내 정보 설정 (모두) */}
          <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-purple-100">
            <h2 className="text-2xl font-black text-purple-950 mb-6 flex items-center gap-3"><div className="bg-purple-100 p-2 rounded-xl text-purple-600"><i className="fa-solid fa-user-gear"></i></div> 내 정보 설정</h2>
            <form onSubmit={savePersonal} className="space-y-6 max-w-xl">
              <div>
                <label className="block text-sm font-extrabold mb-2 text-purple-800">프로필 사진 (이미지 인터넷 주소 URL)</label>
                <input type="text" placeholder="https://..." className="w-full p-4 bg-purple-50 rounded-xl font-bold outline-none focus:border-purple-400 border-2 border-transparent transition-colors" value={profileUrl} onChange={e=>setProfileUrl(e.target.value)} />
              </div>
              <div>
                <label className="block text-sm font-extrabold mb-2 text-purple-800">접속 비밀번호 변경 (4자리 숫자 권장)</label>
                <input type="text" placeholder="새 비밀번호 입력" className="w-full p-4 bg-purple-50 rounded-xl font-bold outline-none focus:border-purple-400 border-2 border-transparent tracking-widest text-lg transition-colors" value={pass} onChange={e=>setPass(e.target.value)} />
              </div>
              <button type="submit" className="bg-purple-600 hover:bg-purple-700 text-white px-8 py-4 rounded-xl font-black shadow-lg hover:-translate-y-1 transition-all">내 정보 저장하기</button>
            </form>
          </div>

          {/* 관리자 고급 설정 (선생님 전용) */}
          {assets.role === 'admin' && (
            <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-indigo-100">
              <h2 className="text-2xl font-black text-indigo-950 mb-6 flex items-center gap-3"><div className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i className="fa-solid fa-sliders"></i></div> 관리자 고급 설정</h2>
              
              {!deepAuth ? (
                <form onSubmit={checkDeepAuth} className="max-w-md bg-indigo-50 p-6 rounded-3xl border border-indigo-200">
                   <p className="font-bold text-center mb-6 text-indigo-800">이곳은 민감한 전체 설정 구역입니다.<br/>선생님 비밀번호를 다시 입력하세요.</p>
                   <input type="password" autoFocus className="w-full p-4 bg-white border-2 border-indigo-200 rounded-xl text-center text-xl font-black tracking-widest outline-none focus:border-indigo-500 mb-6 shadow-inner" value={pwInput} onChange={e=>setPwInput(e.target.value)}/>
                   <button type="submit" className="w-full p-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-black shadow-md transition-colors">접근 권한 인증</button>
                </form>
              ) : (
                <div className="space-y-8 animate-fade-in">
                   <form onSubmit={handleDeepSettingsSave} className="space-y-8">
                     {/* 구글 시트 섹션 (가장 잘 보이게 배치) */}
                     <div className="bg-indigo-50 p-8 rounded-3xl border-2 border-indigo-200 shadow-sm relative overflow-hidden">
                       <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-200 rounded-full blur-3xl opacity-50 -mr-10 -mt-10"></div>
                       <h4 className="font-black text-indigo-950 text-xl mb-3 flex items-center gap-2 relative z-10"><i className="fa-solid fa-link text-indigo-600"></i> 1. 주식 데이터 연동 (구글 스프레드시트)</h4>
                       <p className="text-sm font-bold text-indigo-700 mb-4 relative z-10">웹에 게시된 CSV 형태의 링크를 정확히 입력해야 실시간 주식 동기화가 작동합니다.</p>
                       <input type="text" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?output=csv" className="w-full p-5 bg-white rounded-xl font-bold text-sm mb-6 outline-none border-2 border-indigo-200 focus:border-indigo-500 shadow-inner relative z-10" value={sKey} onChange={e=>setSKey(e.target.value)}/>
                       
                       <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 relative z-10">
                         <div className="flex flex-col gap-1 font-bold">
                           <span className="text-indigo-800 text-sm">데이터 출처 명시 텍스트</span>
                           <input type="text" className="p-3 bg-white rounded-lg outline-none border border-indigo-200 focus:border-indigo-400" value={pText} onChange={e=>setPText(e.target.value)}/>
                         </div>
                         <div className="flex flex-col gap-1 font-bold">
                           <span className="text-indigo-800 text-sm">가격 나누기 (환율 등)</span>
                           <input type="number" className="p-3 bg-white rounded-lg outline-none border border-indigo-200 focus:border-indigo-400" value={sDiv} onChange={e=>setSDiv(e.target.value)}/>
                         </div>
                         <div className="flex flex-col gap-1 font-bold">
                           <span className="text-indigo-800 text-sm">소수점 처리 방식</span>
                           <select className="p-3 bg-white rounded-lg outline-none border border-indigo-200 focus:border-indigo-400" value={sRound} onChange={e=>setSRound(e.target.value)}><option value="round">반올림</option><option value="ceil">올림</option><option value="floor">버림</option></select>
                         </div>
                         <div className="flex flex-col gap-1 font-bold">
                           <span className="text-indigo-800 text-sm">표시할 소수점 자릿수</span>
                           <input type="number" className="p-3 bg-white rounded-lg outline-none border border-indigo-200 focus:border-indigo-400" value={sDec} onChange={e=>setSDec(e.target.value)}/>
                         </div>
                       </div>
                     </div>

                     {/* 탭 이름 변경 섹션 */}
                     <div className="bg-fuchsia-50 p-8 rounded-3xl border-2 border-fuchsia-100 shadow-sm">
                       <h4 className="font-black text-fuchsia-950 text-xl mb-4 flex items-center gap-2"><i className="fa-solid fa-bars text-fuchsia-600"></i> 2. 상단 메뉴 탭 이름 변경</h4>
                       <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                         {['dashboard', 'invest', 'bank', 'store', 'donate'].map(k => (
                           <div key={k} className="flex flex-col gap-1">
                             <span className="text-[10px] font-black text-fuchsia-500 uppercase">{k}</span>
                             <input type="text" className="w-full p-3 bg-white rounded-xl font-bold outline-none border-2 border-fuchsia-100 focus:border-fuchsia-400 text-sm" value={tabNames[k]} onChange={e => setTabNames({...tabNames, [k]: e.target.value})} />
                           </div>
                         ))}
                       </div>
                     </div>

                     {/* 송금 규칙 섹션 */}
                     <div className="bg-yellow-50 p-8 rounded-3xl border-2 border-yellow-200 shadow-sm">
                       <h4 className="font-black text-yellow-950 text-xl mb-4 flex items-center gap-2"><i className="fa-solid fa-money-bill-transfer text-yellow-600"></i> 3. 학생 간 송금 규칙 설정</h4>
                       <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                         <div className="flex flex-col gap-2"><span className="font-black text-sm text-yellow-800">최소 송금 가능액</span><input type="number" className="p-4 bg-white rounded-xl font-bold outline-none border-2 border-yellow-300 focus:border-yellow-500 text-lg shadow-inner" value={sTrMin} onChange={e=>setSTrMin(e.target.value)}/></div>
                         <div className="flex flex-col gap-2"><span className="font-black text-sm text-yellow-800">최대 송금 가능액</span><input type="number" className="p-4 bg-white rounded-xl font-bold outline-none border-2 border-yellow-300 focus:border-yellow-500 text-lg shadow-inner" value={sTrMax} onChange={e=>setSTrMax(e.target.value)}/></div>
                         <div className="flex flex-col gap-2"><span className="font-black text-sm text-yellow-800">송금 수수료 (발송자 부담)</span><input type="number" className="p-4 bg-white rounded-xl font-bold outline-none border-2 border-yellow-300 focus:border-yellow-500 text-lg shadow-inner" value={sTrFee} onChange={e=>setSTrFee(e.target.value)}/></div>
                       </div>
                     </div>
                     
                     <button type="submit" className="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xl rounded-2xl shadow-xl transition-transform hover:-translate-y-1">모든 관리자 설정 저장하기</button>
                   </form>
                   
                   {/* 위험 구역 */}
                   <div className="bg-red-50 p-8 rounded-3xl border-4 border-red-200 mt-12 relative overflow-hidden">
                     <div className="absolute -right-4 -bottom-4 text-[150px] text-red-100 opacity-50 select-none pointer-events-none"><i className="fa-solid fa-triangle-exclamation"></i></div>
                     <h4 className="font-black text-red-950 text-2xl mb-6 flex items-center gap-3 relative z-10"><i className="fa-solid fa-triangle-exclamation text-red-600"></i> 위험 구역 (초기화)</h4>
                     <p className="font-bold text-red-600 mb-6 relative z-10">이곳의 버튼을 누르면 데이터가 영구적으로 삭제되며 되돌릴 수 없습니다. 신중하게 선택하세요.</p>
                     
                     <div className="grid grid-cols-1 md:grid-cols-3 gap-4 relative z-10">
                       <button type="button" onClick={()=>{
                         showConfirm('모든 학생의 자산(현금, 예금, 증권, 일반 기부금)을 0으로 만듭니다.\n정말 초기화하시겠습니까?', async ()=>{
                           const updates = {};
                           Object.values(dbData.users).forEach(u=>{
                              updates[`economy_users/${u.id}/cash`] = 0; updates[`economy_users/${u.id}/deposit`] = 0; updates[`economy_users/${u.id}/generalDonated`] = 0; updates[`economy_users/${u.id}/portfolio`] = null;
                           });
                           await db.ref('/').update(updates); showAlert('학생 자산이 초기화되었습니다.');
                         });
                       }} className="w-full py-4 bg-red-600 hover:bg-red-700 text-white font-black rounded-xl shadow-lg transition-colors">1. 학생 자산 0으로 초기화</button>
                       
                       <button type="button" onClick={()=>{
                         showConfirm('모든 거래 내역 히스토리를 삭제합니다.\n(자산 금액에는 영향을 주지 않습니다)', async ()=>{
                           const updates = {};
                           dbData.txs.forEach(t=> updates[`economy_transactions/${t.id}`] = null);
                           await db.ref('/').update(updates); showAlert('내역이 전체 삭제되었습니다.');
                         });
                       }} className="w-full py-4 bg-white border-2 border-red-200 text-red-700 font-black rounded-xl hover:bg-red-50 transition-colors shadow-sm">2. 거래 내역 전체 삭제</button>
                       
                       <button type="button" onClick={()=>{
                         showConfirm('상점의 모든 등록 상품과 학생들의 보관함 아이템을 완전히 비웁니다.', async ()=>{
                           const updates = {};
                           dbData.store.forEach(s=> updates[`economy_store_products/${s.id}`] = null);
                           dbData.inventory.forEach(i=> updates[`economy_inventory/${i.id}`] = null);
                           await db.ref('/').update(updates); showAlert('상점 및 보관함이 비워졌습니다.');
                         });
                       }} className="w-full py-4 bg-white border-2 border-red-200 text-red-700 font-black rounded-xl hover:bg-red-50 transition-colors shadow-sm">3. 상점 및 보관함 비우기</button>
                     </div>
                   </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ============================================================================
    // [6] 메인 애플리케이션 컴포넌트 (App)
    // ============================================================================
    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [isDBLoaded, setIsDBLoaded] = useState(false);
      const [bootProgress, setBootProgress] = useState(0);
      const [isBooting, setIsBooting] = useState(true);
      
      const [dbData, setDbData] = useState({ users: {}, deposits: {}, txs: [], bank: [], store: [], inventory: [], stocks: [], settings: INITIAL_SETTINGS, goals: [], donations: [], itemDonations: [] });
      const [view, setView] = useState('dashboard');
      
      const [alertMsg, setAlertMsg] = useState(null);
      const [confirmObj, setConfirmObj] = useState(null);

      const showAlert = (message) => setAlertMsg({ message });
      const showConfirm = (message, onConfirm) => setConfirmObj({ message, onConfirm });

      // 세션 타이머
      const [lastActionTime, setLastActionTime] = useState(Date.now());
      const [timeLeft, setTimeLeft] = useState(0);
      const [isSessionActive, setIsSessionActive] = useState(false); 

      // 로딩 애니메이션
      useEffect(() => {
        let timer;
        if (isBooting) {
          timer = setInterval(() => {
            setBootProgress(p => {
              if (p >= 95) return 95;
              const next = p + Math.floor(Math.random() * 10) + 1;
              return next > 95 ? 95 : next;
            });
          }, 150);
        }
        return () => clearInterval(timer);
      }, [isBooting]);

      useEffect(() => {
        if (isDBLoaded) {
          setBootProgress(100);
          const t = setTimeout(() => setIsBooting(false), 800);
          return () => clearTimeout(t);
        }
      }, [isDBLoaded]);

      // Firebase 실시간 구독 (RTDB)
      useEffect(() => {
        const rootRef = db.ref('/');
        const onDataChange = rootRef.on('value', (snap) => {
          const val = snap.val() || {};
          
          if (!val.economy_users) {
             console.warn("데이터베이스가 비어있습니다. 초기화 진행");
             const updates = {};
             INITIAL_USERS.forEach(u => { updates[`economy_users/${u.id}`] = { ...u, cash: 0, deposit: 0, level: 1, generalDonated: 0, portfolio: {} }; });
             INITIAL_BANK.forEach(p => updates[`economy_bank_products/${p.id}`] = p);
             INITIAL_STORE.forEach(s => updates[`economy_store_products/${s.id}`] = s);
             INITIAL_STOCKS.forEach(st => updates[`economy_stocks/${st.id}`] = st);
             INITIAL_DONATION_GOALS.forEach(g => updates[`economy_donation_goals/${g.id}`] = g);
             updates[`economy_settings`] = INITIAL_SETTINGS;
             db.ref().update(updates);
          }

          setDbData({
            users: val.economy_users || {},
            deposits: val.economy_deposits || {},
            txs: val.economy_transactions ? Object.values(val.economy_transactions).sort((a,b) => b.timestamp - a.timestamp) : [],
            bank: val.economy_bank_products ? Object.values(val.economy_bank_products).sort((a,b) => a.days - b.days) : [],
            store: val.economy_store_products ? Object.values(val.economy_store_products) : [],
            inventory: val.economy_inventory ? Object.values(val.economy_inventory).sort((a,b) => b.purchasedAt - a.purchasedAt) : [],
            stocks: val.economy_stocks ? Object.values(val.economy_stocks) : [],
            goals: val.economy_donation_goals ? Object.values(val.economy_donation_goals) : [],
            donations: val.economy_donations ? Object.values(val.economy_donations).sort((a,b) => b.timestamp - a.timestamp) : [],
            itemDonations: val.economy_item_donations ? Object.values(val.economy_item_donations) : [],
            settings: val.economy_settings || INITIAL_SETTINGS
          });
          setIsDBLoaded(true);
        }, (error) => {
          console.error("Firebase Read Error:", error);
        });
        return () => rootRef.off('value', onDataChange);
      }, []);

      // 세션 타이머 처리
      useEffect(() => {
        if (!currentUser || !isSessionActive) return;
        const maxMs = (dbData.settings.sessionTimeMin || 10) * 60000;
        
        const updateTime = () => setLastActionTime(Date.now());
        window.addEventListener('click', updateTime);
        window.addEventListener('keydown', updateTime);
        window.addEventListener('touchstart', updateTime);

        const timer = setInterval(() => {
          const remain = maxMs - (Date.now() - lastActionTime);
          setTimeLeft(remain);
          if (remain <= 0) {
            setCurrentUser(null);
            showAlert('세션이 만료되어 안전하게 로그아웃 되었습니다.');
          }
        }, 1000);

        return () => {
          clearInterval(timer);
          window.removeEventListener('click', updateTime);
          window.removeEventListener('keydown', updateTime);
          window.removeEventListener('touchstart', updateTime);
        };
      }, [currentUser, lastActionTime, dbData.settings.sessionTimeMin, isSessionActive]);

      const handleLogin = (id, u, useAuto, useSession) => {
        setCurrentUser(id);
        setIsSessionActive(useSession);
        setLastActionTime(Date.now());
        setView('dashboard');
        if (useAuto) localStorage.setItem('hh_auto_login', id);
      };

      const handleLogout = () => {
        localStorage.removeItem('hh_auto_login');
        setCurrentUser(null);
        setIsSessionActive(false);
      };

      useEffect(() => {
        const savedId = localStorage.getItem('hh_auto_login');
        if (savedId && dbData.users[savedId] && !currentUser && isDBLoaded) {
          setCurrentUser(savedId);
          setIsSessionActive(false);
        }
      }, [isDBLoaded]);

      // --- 화면 렌더링 ---
      if (isBooting || !isDBLoaded || !currentUser) {
        return (
          <div className="relative min-h-screen bg-[#F5F3FF]">
            {isDBLoaded && <LoginView users={Object.values(dbData.users)} onLogin={handleLogin} showAlert={showAlert} />}
            
            {(isBooting || !isDBLoaded) && (
              <div className="fixed inset-0 z-[999] bg-purple-950/80 backdrop-blur-md flex flex-col items-center justify-center transition-opacity duration-500">
                <div className="flex flex-col items-center animate-in slide-in-from-bottom-8 fade-in duration-1000">
                  <i className="fa-solid fa-graduation-cap text-6xl text-white mb-6 animate-bounce"></i>
                  <h1 className="text-2xl sm:text-3xl font-black text-white text-center tracking-tight mb-2">HH 경제교실에 오신 것을 환영합니다!</h1>
                  <p className="text-lg text-purple-300 font-bold mb-12">무결성 검증 및 실시간 연결을 시도합니다...</p>
                </div>
                <div className="flex flex-col items-center animate-in fade-in zoom-in duration-700 delay-300 fill-mode-both">
                  <i className="fa-solid fa-circle-notch fa-spin text-4xl text-fuchsia-400 mb-6"></i>
                  <div className="w-64 bg-purple-900 rounded-full h-3 mb-4 overflow-hidden border border-purple-700 shadow-inner">
                    <div className="bg-gradient-to-r from-fuchsia-500 to-purple-500 h-full rounded-full transition-all duration-300 ease-out" style={{ width: `${bootProgress}%` }}></div>
                  </div>
                  <p className="text-xl text-purple-200 font-extrabold tracking-widest">Loading {bootProgress}%...</p>
                </div>
              </div>
            )}

            <Modal isOpen={!!alertMsg} title="알림" iconStr="fa-solid fa-circle-exclamation" color="purple" onClose={() => setAlertMsg(null)}>
              <form onSubmit={(e) => { e.preventDefault(); setAlertMsg(null); }}>
                <p className="text-purple-800 font-bold text-center leading-relaxed whitespace-pre-wrap mb-8 text-lg">{alertMsg?.message}</p>
                <button type="submit" autoFocus className="w-full bg-purple-600 hover:bg-purple-700 text-white font-black py-4 rounded-2xl shadow-lg">확인</button>
              </form>
            </Modal>
          </div>
        );
      }

      const myUser = dbData.users[currentUser];
      const realStockValue = Object.entries(myUser.portfolio || {}).reduce((acc, [sId, pData]) => {
        const st = dbData.stocks.find(s => s.id === sId);
        return acc + (pData.qty * (st?.currentPrice || pData.avgPrice));
      }, 0);
      const myTotalAssets = (myUser.cash || 0) + (myUser.deposit || 0) + realStockValue;

      const warnMin = dbData.settings.sessionWarnMin || 2;
      const isWarn = isSessionActive && timeLeft > 0 && timeLeft <= warnMin * 60000;

      // 탭 이름 (설정에서 변경한 이름 반영)
      const tNames = dbData.settings.tabNames || {
        dashboard: '대시보드', invest: '투자(주식)', bank: '은행', store: '상점/보관함', donate: '기부 센터'
      };

      const navItems = [
        { id: 'dashboard', label: tNames.dashboard || '대시보드' },
        { id: 'invest', label: tNames.invest || '투자(주식)' },
        { id: 'bank', label: tNames.bank || '은행' },
        { id: 'store', label: tNames.store || '상점/보관함' },
        { id: 'donate', label: tNames.donate || '기부' },
        { id: 'settings', label: '설정' }
      ];

      return (
        <div className="min-h-screen bg-[#F5F3FF] text-purple-950 font-sans pb-24">
          <Modal isOpen={!!alertMsg} title="알림" iconStr="fa-solid fa-circle-exclamation" color="purple" onClose={() => setAlertMsg(null)}>
            <form onSubmit={(e) => { e.preventDefault(); setAlertMsg(null); }}>
              <p className="text-purple-800 font-bold text-center leading-relaxed whitespace-pre-wrap mb-8 text-lg">{alertMsg?.message}</p>
              <button type="submit" autoFocus className="w-full bg-purple-600 hover:bg-purple-700 text-white font-black py-4 rounded-2xl shadow-lg">확인</button>
            </form>
          </Modal>

          <Modal isOpen={!!confirmObj} title="확인이 필요합니다" iconStr="fa-solid fa-circle-question" color="fuchsia" onClose={() => setConfirmObj(null)}>
            <form onSubmit={(e) => { e.preventDefault(); confirmObj.onConfirm(); setConfirmObj(null); }}>
              <p className="text-fuchsia-900 font-bold text-center leading-relaxed whitespace-pre-wrap mb-8 text-lg">{confirmObj?.message}</p>
              <div className="flex gap-4">
                <button type="submit" autoFocus className="flex-1 bg-fuchsia-600 hover:bg-fuchsia-700 text-white font-black py-4 rounded-2xl shadow-lg">진행</button>
                <button type="button" onClick={() => setConfirmObj(null)} className="flex-1 bg-white border-2 border-fuchsia-200 text-fuchsia-700 font-black py-4 rounded-2xl hover:bg-fuchsia-50">취소</button>
              </div>
            </form>
          </Modal>

          <header className="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b-2 border-purple-100 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center gap-6">
                <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('dashboard')}>
                  <div className="w-10 h-10 bg-gradient-to-br from-purple-600 to-fuchsia-600 rounded-xl flex items-center justify-center shadow-lg"><i className="fa-solid fa-graduation-cap text-white text-lg"></i></div>
                  <span className="text-xl sm:text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-purple-800 to-fuchsia-700 hidden sm:block">HH 경제교실</span>
                </div>
                <nav className="hidden md:flex gap-2">
                  {navItems.map(item => (
                    <button key={item.id} onClick={() => setView(item.id)} className={`px-4 py-2 font-extrabold rounded-xl transition-all ${view === item.id ? 'bg-purple-600 text-white shadow-md' : 'text-purple-600 hover:bg-purple-100'}`}>
                      {item.label}
                    </button>
                  ))}
                </nav>
              </div>
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-3">
                   {myUser.profileUrl ? (
                      <img src={myUser.profileUrl} alt="profile" className="w-10 h-10 rounded-full object-cover shadow-sm border border-purple-200 hidden sm:block"/>
                   ) : (
                      <div className="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center text-purple-600 shadow-sm border border-purple-200 hidden sm:block">
                         <i className="fa-solid fa-user"></i>
                      </div>
                   )}
                   <div className="text-right hidden sm:block">
                     <p className="text-sm font-black text-purple-900">{myUser.name}</p>
                     {isSessionActive && (
                       <p className={`text-xs font-bold flex items-center gap-1 justify-end mt-0.5 ${isWarn ? 'text-red-500 animate-pulse' : 'text-purple-400'}`}>
                         <i className="fa-solid fa-lock text-[10px]"></i>
                         {Math.floor(timeLeft/60000)}:{String(Math.floor((timeLeft%60000)/1000)).padStart(2,'0')}
                         {isWarn && <button onClick={() => setLastActionTime(Date.now())} className="ml-1 bg-red-100 text-red-600 px-1.5 py-0.5 rounded text-[10px] hover:bg-red-200">연장</button>}
                       </p>
                     )}
                   </div>
                </div>
                <button onClick={handleLogout} className="p-2.5 text-purple-400 hover:text-white bg-purple-50 hover:bg-rose-500 rounded-xl transition-colors"><i className="fa-solid fa-arrow-right-from-bracket text-lg"></i></button>
              </div>
            </div>
            <div className="md:hidden flex overflow-x-auto p-2 gap-2 bg-purple-50 border-t border-purple-100 scrollbar-hide">
              {navItems.map(item => (
                <button key={item.id} onClick={() => setView(item.id)} className={`whitespace-nowrap px-4 py-2 text-sm font-extrabold rounded-xl ${view === item.id ? 'bg-purple-600 text-white' : 'text-purple-600'}`}>
                   {item.label}
                </button>
              ))}
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-8 space-y-8">
            {view === 'dashboard' && (
              <div className="relative bg-gradient-to-br from-purple-700 via-purple-600 to-fuchsia-600 rounded-[2.5rem] p-8 sm:p-10 text-white shadow-2xl overflow-hidden animate-in zoom-in-95">
                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-10 rounded-full blur-3xl -mr-16 -mt-16"></div>
                <div className="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-8">
                  <div>
                    <div className="flex items-center gap-3 mb-4">
                      <p className="text-2xl font-bold opacity-90">{myUser.name}의 자산</p>
                      {myUser.role === 'student' && <div className="bg-white/20 backdrop-blur-md px-3 py-1 rounded-full text-sm font-black flex items-center gap-1"><i className="fa-solid fa-trophy text-yellow-300"></i> 레벨 {myUser.level || 1}</div>}
                    </div>
                    <h2 className="text-5xl sm:text-7xl font-black tracking-tighter mb-2 drop-shadow-lg">{formatMoney(myTotalAssets)}</h2>
                    <p className="text-purple-200 font-bold">총 자산 평가금액</p>
                  </div>
                  <div className="grid grid-cols-3 gap-3 w-full md:w-auto">
                    {[{l:'현금', v:myUser.cash, i:'fa-wallet'}, {l:'예금', v:myUser.deposit, i:'fa-piggy-bank'}, {l:'증권', v:realStockValue, i:'fa-chart-line'}].map(a => (
                      <div key={a.l} className="bg-white/10 backdrop-blur-md border border-white/20 p-4 rounded-3xl text-center md:text-left md:min-w-[120px]">
                        <p className="text-xs font-extrabold text-purple-100 flex items-center justify-center md:justify-start gap-1 mb-2"><i className={`fa-solid ${a.i}`}></i> {a.l}</p>
                        <p className="text-lg md:text-xl font-black">{formatMoney(a.v)}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {view === 'dashboard' && <DashboardView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} setGlobalView={setView} />}
            {view === 'invest' && <InvestView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
            {view === 'bank' && <BankView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
            {view === 'store' && <StoreView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
            {view === 'donate' && <DonateView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
            {view === 'settings' && <SettingsView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
          </main>
        </div>
      );
    }

    // ============================================================================
    // [7] React 렌더링 부착
    // ============================================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
