<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HH 경제교실</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase Compat (v10) - RTDB 전용 -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }
  </style>
</head>
<body class="bg-[#F5F3FF] text-purple-950 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ============================================================================
    // [1] Firebase 설정 및 초기화
    // ============================================================================
    const firebaseConfig = {
      databaseURL: "https://class-chat-6-7-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ============================================================================
    // [2] 초기 데이터 모음 (서버에 데이터가 없을 때 세팅용)
    // ============================================================================
    const INITIAL_SETTINGS = {
      finnhubKey: '', // 핀허브 API 키 (관리자가 설정)
      stockLastUpdated: 0,
      updateInterval: { days: 0, hours: 1, minutes: 0 }, // 갱신 주기
      conversion: { divideBy: 100, roundMode: 'round', decimals: 0 } // 환산율 설정
    };

    const INITIAL_STOCKS = [
      { id: 's_samsung', ticker: '005930.KS', name: '삼성전자', icon: '📱', isVirtual: false, currentPrice: 800, prevPrice: 800, lastUpdated: 0 },
      { id: 's_apple', ticker: 'AAPL', name: '애플', icon: '🍎', isVirtual: false, currentPrice: 2000, prevPrice: 2000, lastUpdated: 0 },
      { id: 's_virtual', ticker: 'CLASS', name: '6학년3반컴퍼니', icon: '🏫', isVirtual: true, currentPrice: 1000, prevPrice: 1000, lastUpdated: 0 }
    ];

    const INITIAL_BANK_PRODUCTS = [
      { id: 'test', name: '테스트용 (1분)', days: 0, rate: 0.01, rateText: '1.0%' },
      { id: 'short', name: '단기 적금 (7일)', days: 7, rate: 0.03, rateText: '3.0%' }
    ];

    const INITIAL_STORE_PRODUCTS = [
      { id: 's1', name: '간식', desc: '마가렛트', price: 2000, stock: 26, icon: '🍪', refundable: true, refundLimitHours: 24 },
      { id: 's2', name: '초콜릿', desc: '동전모양 초콜릿', price: 1500, stock: 10, icon: '🪙', refundable: true, refundLimitHours: 24 },
      { id: 'srv1', name: '글쓰기 면제권', desc: '오늘 글쓰기 패스!', price: 10000, stock: 5, icon: '📝', refundable: false, refundLimitHours: 0 }
    ];

    const USERS_DATA = [
      { id: '1', name: '강유주', pass: '6701', role: 'student' }, { id: '2', name: '고윤서', pass: '6702', role: 'student' },
      { id: '3', name: '공윤호', pass: '6703', role: 'student' }, { id: '4', name: '김성민', pass: '6704', role: 'student' },
      { id: 'admin', name: '관리자', pass: '1111', role: 'admin' }
    ];

    const donationGoals = [
      { title: '도비는 자유예요', desc: '1시간의 자유시간 획득', current: 0, target: 100000 },
      { title: '우리 반 과자파티!', desc: '과자파티를 엽니다.', current: 0, target: 200000 }
    ];

    // ============================================================================
    // [3] 유틸리티 함수 (돈 포맷팅, 환산 로직 등)
    // ============================================================================
    const formatMoney = (num) => new Intl.NumberFormat('ko-KR').format(Math.floor(num || 0)) + 'G';
    const formatDate = (date) => {
      const y = date.getFullYear(), m = String(date.getMonth() + 1).padStart(2, '0'), d = String(date.getDate()).padStart(2, '0');
      const h = String(date.getHours()).padStart(2, '0'), mn = String(date.getMinutes()).padStart(2, '0');
      return `${y}.${m}.${d} ${h}:${mn}`;
    };
    const parseAmount = (str) => parseInt(String(str).replace(/[^0-9]/g, ''), 10) || 0;

    // 관리자가 설정한 기준에 맞춰 실제 주가를 G로 변환
    const applyConversion = (rawPrice, settings) => {
      if (!settings) return rawPrice;
      let price = rawPrice / (settings.divideBy || 100);
      const mult = Math.pow(10, settings.decimals || 0);
      if (settings.roundMode === 'round') price = Math.round(price * mult) / mult;
      else if (settings.roundMode === 'ceil') price = Math.ceil(price * mult) / mult;
      else if (settings.roundMode === 'floor') price = Math.floor(price * mult) / mult;
      return price;
    };

    // 핀허브(Finnhub) API 호출하여 DB 업데이트
    const fetchAndStoreRealStocks = async (database, stocks, settings) => {
      if (!settings?.finnhubKey) return;
      const updates = {};
      const now = Date.now();
      
      for (const stock of stocks) {
        if (stock.isVirtual) continue; // 가상 주식은 연동 제외
        try {
          const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${stock.ticker}&token=${settings.finnhubKey}`);
          const data = await res.json();
          if (data && data.c > 0) {
            const curPrice = applyConversion(data.c, settings.conversion);
            const prePrice = applyConversion(data.pc, settings.conversion);
            updates[`economy_stocks/${stock.id}/currentPrice`] = curPrice;
            updates[`economy_stocks/${stock.id}/prevPrice`] = prePrice;
            updates[`economy_stocks/${stock.id}/lastUpdated`] = now;
          }
        } catch (e) {
          console.error(`Fetch failed for ${stock.ticker}`, e);
        }
      }
      
      if (Object.keys(updates).length > 0) {
        updates[`economy_settings/stockLastUpdated`] = now;
        await database.ref('/').update(updates);
      }
    };

    // ============================================================================
    // [4] 공통 UI 컴포넌트 (모달창, 드롭다운 등)
    // ============================================================================
    const Badge = ({ children, type }) => {
      const styles = { positive: 'bg-green-100 text-green-700', negative: 'bg-red-100 text-red-700', neutral: 'bg-slate-100 text-slate-700' };
      return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold ${styles[type]}`}>{children}</span>;
    };

    const Modal = ({ isOpen, title, children, onClose, icon }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[150] flex items-center justify-center bg-gray-900/60 backdrop-blur-sm p-4 animate-fade-in">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden animate-zoom-in border-2 border-purple-100 flex flex-col max-h-[90vh]">
            <div className="p-6 border-b-2 border-purple-50 flex justify-between items-center bg-purple-50/30">
              <h3 className="text-xl font-black text-purple-950 flex items-center gap-3">
                {icon && <div className="bg-purple-100 p-2 rounded-xl text-purple-600">{icon}</div>}{title}
              </h3>
              {onClose && <button onClick={onClose} className="text-purple-400 hover:text-purple-600"><i className="fa-solid fa-xmark text-xl"></i></button>}
            </div>
            <div className="p-6 overflow-y-auto scrollbar-hide flex-1">{children}</div>
          </div>
        </div>
      );
    };

    const CustomDropdown = ({ options, value, onChange, placeholder }) => {
      const [isOpen, setIsOpen] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        const out = (e) => { if (ref.current && !ref.current.contains(e.target)) setIsOpen(false); };
        document.addEventListener('mousedown', out); return () => document.removeEventListener('mousedown', out);
      }, []);
      return (
        <div className="relative w-full" ref={ref}>
          <div onClick={() => setIsOpen(!isOpen)} className="bg-purple-50 border-2 border-purple-100 hover:border-purple-300 text-purple-900 rounded-2xl px-5 py-4 cursor-pointer flex justify-between items-center font-bold">
            <span>{options.find(o => String(o.value) === String(value))?.label || placeholder}</span>
            <i className={`fa-solid fa-chevron-down text-purple-400 transition-transform ${isOpen ? 'rotate-180' : ''}`}></i>
          </div>
          {isOpen && (
            <div className="absolute top-full left-0 w-full bg-white border-2 border-purple-100 rounded-2xl shadow-xl z-50 max-h-60 overflow-y-auto mt-2 p-2 scrollbar-hide">
              {options.map(o => (
                <div key={o.value} onClick={() => { onChange(o.value); setIsOpen(false); }} className={`p-3 rounded-xl cursor-pointer font-bold ${String(value) === String(o.value) ? 'bg-purple-600 text-white' : 'hover:bg-purple-50'}`}>{o.label}</div>
              ))}
            </div>
          )}
        </div>
      );
    };

    const CustomMultiSelect = ({ options, selectedValues, onChange, placeholder }) => {
      const [isOpen, setIsOpen] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        const out = (e) => { if (ref.current && !ref.current.contains(e.target)) setIsOpen(false); };
        document.addEventListener('mousedown', out); return () => document.removeEventListener('mousedown', out);
      }, []);
      const toggle = (val) => selectedValues.includes(val) ? onChange(selectedValues.filter(v => v !== val)) : onChange([...selectedValues, val]);
      return (
        <div className="relative w-full" ref={ref}>
          <div onClick={() => setIsOpen(!isOpen)} className="bg-purple-50 border-2 border-purple-100 hover:border-purple-300 text-purple-900 rounded-2xl px-5 py-4 cursor-pointer flex justify-between items-center font-bold">
            <span className="truncate">{selectedValues.length > 0 ? `${selectedValues.length}명 선택됨` : placeholder}</span>
            <i className={`fa-solid fa-chevron-down text-purple-400 transition-transform ${isOpen ? 'rotate-180' : ''}`}></i>
          </div>
          {isOpen && (
            <div className="absolute top-full left-0 w-full bg-white border-2 border-purple-100 rounded-2xl shadow-xl z-50 max-h-72 overflow-y-auto mt-2 p-2 flex flex-col gap-1">
              <div onClick={() => selectedValues.length === options.length ? onChange([]) : onChange(options.map(o => o.value))} className="p-3 rounded-xl cursor-pointer font-bold text-center bg-purple-100 hover:bg-purple-200">전체 선택/해제</div>
              {options.map(o => (
                <div key={o.value} onClick={() => toggle(o.value)} className={`p-3 rounded-xl cursor-pointer font-bold flex items-center justify-between ${selectedValues.includes(o.value) ? 'bg-purple-50 text-purple-900' : 'hover:bg-purple-50'}`}>
                  {o.label}
                  <div className={`w-6 h-6 flex items-center justify-center rounded-md border-2 ${selectedValues.includes(o.value) ? 'bg-purple-600 border-purple-600 text-white' : 'bg-white border-purple-200'}`}>
                    {selectedValues.includes(o.value) && <i className="fa-solid fa-check text-xs"></i>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    // ============================================================================
    // [5] 뷰 컴포넌트 (LoginView, DashboardView, InvestView, BankView, StoreView)
    // ============================================================================
    function LoginView({ onLogin, users, showAlert }) {
      const [selectedUserId, setSelectedUserId] = useState('');
      const [password, setPassword] = useState('');
      const sortedUsers = [...users].sort((a, b) => (a.role === 'admin' ? 1 : b.role === 'admin' ? -1 : a.name.localeCompare(b.name)));

      const handleSubmit = (e) => {
        e.preventDefault();
        // 로그인 즉시 검증
        if (!selectedUserId) return showAlert('이름을 선택해주세요.');
        if (!password) return showAlert('비밀번호를 입력해주세요.');
        
        const u = users.find(user => user.id === selectedUserId);
        if (!u) return showAlert('명단에 없는 사용자입니다.');
        if (String(u.pass) !== String(password)) {
          return showAlert('비밀번호가 일치하지 않습니다.\n다시 확인해주세요.');
        }
        // 검증 성공 시 부모 컴포넌트로 전달 (성공 팝업은 App 컴포넌트에서 호출)
        onLogin(selectedUserId, u);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-purple-900 via-purple-950 to-indigo-950 flex items-center justify-center p-4 relative z-0">
          <div className="max-w-md w-full bg-white rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden border-4 border-purple-200/50">
            <div className="absolute top-0 right-0 -mr-16 -mt-16 w-48 h-48 bg-purple-600 opacity-20 blur-3xl rounded-full"></div>
            <div className="absolute bottom-0 left-0 -ml-16 -mb-16 w-48 h-48 bg-blue-600 opacity-20 blur-3xl rounded-full"></div>

            <div className="relative z-10">
              <div className="w-20 h-20 bg-gradient-to-br from-purple-600 to-fuchsia-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl">
                <i className="fa-solid fa-graduation-cap text-white text-3xl"></i>
              </div>
              <h1 className="text-3xl font-black text-purple-950 text-center mb-2 tracking-tight">HH 경제교실</h1>
              <p className="text-purple-600 font-bold text-center mb-10 text-sm">명단에서 이름을 선택하고 접속번호를 입력하세요.</p>

              <form onSubmit={handleSubmit} className="space-y-6">
                <div>
                  <label className="block text-sm font-extrabold text-purple-900 mb-2">내 이름 선택</label>
                  <CustomDropdown options={sortedUsers.map(u => ({ value: u.id, label: u.name + (u.role === 'admin' ? ' (선생님)' : '') }))} value={selectedUserId} onChange={setSelectedUserId} placeholder="명단에서 선택" />
                </div>
                <div>
                  <label className="block text-sm font-extrabold text-purple-900 mb-2">접속번호 (비밀번호)</label>
                  <input type="password" placeholder="비밀번호 4자리" className="w-full bg-purple-50 border-2 border-purple-100 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-purple-500 font-bold tracking-widest placeholder:tracking-normal" value={password} onChange={(e) => setPassword(e.target.value)} />
                </div>
                <button type="submit" className="w-full bg-gradient-to-r from-purple-600 to-fuchsia-600 text-white font-black text-lg py-4 rounded-2xl shadow-xl mt-6 hover:scale-[1.02] transition-transform">교실 입장하기</button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    function DashboardView({ assets, dbData, db, showAlert, showConfirm, showPrompt }) {
      const [isTransferModalOpen, setIsTransferModalOpen] = useState(false);
      const [isAdminActionModalOpen, setIsAdminActionModalOpen] = useState(false);
      const [isAdminSelfModalOpen, setIsAdminSelfModalOpen] = useState(false);
      const [isDonateModalOpen, setIsDonateModalOpen] = useState(false);
      const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
      const [showTxDeleteModal, setShowTxDeleteModal] = useState(false);
      
      const [transferTarget, setTransferTarget] = useState(''); const [transferAmount, setTransferAmount] = useState('');
      const [adminTargetIds, setAdminTargetIds] = useState([]); const [adminActionType, setAdminActionType] = useState('add');
      const [adminAmount, setAdminAmount] = useState(''); const [adminReason, setAdminReason] = useState('');
      const [adminSelfType, setAdminSelfType] = useState('add'); const [adminSelfAmount, setAdminSelfAmount] = useState('');
      const [donateAmount, setDonateAmount] = useState('');
      const [selectedTxs, setSelectedTxs] = useState([]);

      // 관리자 설정 상태
      const [sKey, setSKey] = useState(dbData.settings?.finnhubKey || '');
      const [sDays, setSDays] = useState(dbData.settings?.updateInterval?.days || 0);
      const [sHours, setSHours] = useState(dbData.settings?.updateInterval?.hours || 1);
      const [sMins, setSMins] = useState(dbData.settings?.updateInterval?.minutes || 0);
      const [sDiv, setSDiv] = useState(dbData.settings?.conversion?.divideBy || 100);
      const [sRound, setSRound] = useState(dbData.settings?.conversion?.roundMode || 'round');
      const [sDec, setSDec] = useState(dbData.settings?.conversion?.decimals || 0);

      const usersData = Object.values(dbData.users);
      const studentCandidates = usersData.filter(u => u.role === 'student');

      // 송금
      const executeTransfer = (e) => {
        e.preventDefault();
        const amt = parseInt(transferAmount, 10);
        if (!transferTarget || isNaN(amt) || amt <= 0) return;
        if (amt > assets.cash) return showAlert('현금이 부족합니다.');
        const updates = {};
        updates[`economy_users/${assets.id}/cash`] = assets.cash - amt;
        updates[`economy_users/${transferTarget}/cash`] = dbData.users[transferTarget].cash + amt;
        const tx1 = db.ref('economy_transactions').push().key;
        updates[`economy_transactions/${tx1}`] = { id: tx1, userId: assets.id, type: '송금', desc: `${dbData.users[transferTarget].name}에게 이체`, amount: `-${formatMoney(amt)}`, balance: formatMoney(assets.cash-amt), isPositive: false, timestamp: Date.now(), date: formatDate(new Date()) };
        const tx2 = db.ref('economy_transactions').push().key;
        updates[`economy_transactions/${tx2}`] = { id: tx2, userId: transferTarget, type: '입금', desc: `${assets.name}으로부터 입금`, amount: `+${formatMoney(amt)}`, balance: formatMoney(dbData.users[transferTarget].cash+amt), isPositive: true, timestamp: Date.now()+1, date: formatDate(new Date()) };
        db.ref().update(updates);
        setIsTransferModalOpen(false); setTransferAmount(''); setTransferTarget(''); showAlert('송금을 완료했습니다.');
      };

      // 관리자: 학생 자산 조작
      const executeAdminAction = (e) => {
        e.preventDefault();
        const amt = parseInt(adminAmount, 10);
        if (adminTargetIds.length === 0 || isNaN(amt) || amt <= 0) return;
        const updates = {};
        adminTargetIds.forEach((tid, idx) => {
          const u = dbData.users[tid];
          const newCash = adminActionType === 'add' ? u.cash + amt : Math.max(0, u.cash - amt);
          updates[`economy_users/${tid}/cash`] = newCash;
          const txRef = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${txRef}`] = { id: txRef, userId: tid, type: adminActionType==='add'?'시스템 지급':'시스템 차감', desc: `관리자: ${adminReason || '반영'}`, amount: (adminActionType==='add'?'+':'-')+formatMoney(amt), balance: formatMoney(newCash), isPositive: adminActionType==='add', timestamp: Date.now()+idx, date: formatDate(new Date()) };
        });
        db.ref().update(updates);
        setIsAdminActionModalOpen(false); setAdminTargetIds([]); setAdminAmount(''); setAdminReason(''); showAlert('자산 변경을 완료했습니다.');
      };

      // 관리자: 본인 자산 조작
      const executeAdminSelf = (e) => {
        e.preventDefault();
        const amt = parseInt(adminSelfAmount, 10);
        if (isNaN(amt) || amt <= 0) return;
        const newCash = adminSelfType === 'add' ? assets.cash + amt : Math.max(0, assets.cash - amt);
        const updates = {};
        updates[`economy_users/${assets.id}/cash`] = newCash;
        const txRef = db.ref('economy_transactions').push().key;
        updates[`economy_transactions/${txRef}`] = { id: txRef, userId: assets.id, type: '시스템 관리', desc: adminSelfType==='add'?'돈 채우기':'돈 버리기', amount: (adminSelfType==='add'?'+':'-')+formatMoney(amt), balance: formatMoney(newCash), isPositive: adminSelfType==='add', timestamp: Date.now(), date: formatDate(new Date()) };
        db.ref().update(updates);
        setIsAdminSelfModalOpen(false); setAdminSelfAmount(''); showAlert("자산이 업데이트되었습니다.");
      };

      // 기부
      const executeDonate = (e) => {
        e.preventDefault();
        const amt = parseInt(donateAmount, 10);
        if (isNaN(amt) || amt <= 0) return;
        if (amt > assets.cash) return showAlert('현금이 부족합니다.');
        const updates = {};
        updates[`economy_users/${assets.id}/cash`] = assets.cash - amt;
        updates[`economy_users/${assets.id}/donated`] = (assets.donated || 0) + amt;
        const txRef = db.ref('economy_transactions').push().key;
        updates[`economy_transactions/${txRef}`] = { id: txRef, userId: assets.id, type: '기부', desc: '학급 목표 기부', amount: `-${formatMoney(amt)}`, balance: formatMoney(assets.cash-amt), isPositive: false, timestamp: Date.now(), date: formatDate(new Date()) };
        db.ref().update(updates);
        setIsDonateModalOpen(false); setDonateAmount(''); showAlert('기부 완료! 감사합니다.');
      };

      // 시스템 설정 저장
      const saveSettings = (e) => {
        e.preventDefault();
        db.ref('economy_settings').set({
          finnhubKey: sKey, stockLastUpdated: dbData.settings?.stockLastUpdated || 0,
          updateInterval: { days: parseInt(sDays,10)||0, hours: parseInt(sHours,10)||0, minutes: parseInt(sMins,10)||0 },
          conversion: { divideBy: parseFloat(sDiv)||1, roundMode: sRound, decimals: parseInt(sDec,10)||0 }
        });
        setIsSettingsModalOpen(false); showAlert('시스템 설정이 저장되었습니다.');
      };

      // 거래 내역 삭제
      const deleteTxs = (restoreCash) => {
        if(selectedTxs.length === 0) return;
        showConfirm(`선택한 ${selectedTxs.length}개의 내역을 삭제하시겠습니까?`, () => {
          const updates = {};
          selectedTxs.forEach((txId, idx) => {
            const tx = dbData.txs.find(t => t.id === txId);
            if(!tx) return;
            updates[`economy_transactions/${txId}`] = null;
            if(restoreCash && dbData.users[tx.userId]) {
              const u = dbData.users[tx.userId];
              const pAmt = parseAmount(tx.amount);
              const newCash = tx.isPositive ? Math.max(0, u.cash - pAmt) : u.cash + pAmt;
              updates[`economy_users/${tx.userId}/cash`] = newCash;
              const cRef = db.ref('economy_transactions').push().key;
              updates[`economy_transactions/${cRef}`] = { id: cRef, userId: tx.userId, type: '내역 취소', desc: `복구: ${tx.desc}`, amount: tx.isPositive ? `-${formatMoney(pAmt)}` : `+${formatMoney(pAmt)}`, balance: formatMoney(newCash), isPositive: !tx.isPositive, timestamp: Date.now()+idx, date: formatDate(new Date()) };
            }
          });
          db.ref().update(updates); setShowTxDeleteModal(false); setSelectedTxs([]); showAlert('내역을 삭제했습니다.');
        });
      };

      // 거래 내역 데이터 정리
      const displayTxs = assets.role === 'admin' ? dbData.txs : dbData.txs.filter(tx => tx.userId === assets.id);
      const totalDonated = usersData.reduce((sum, u) => sum + (u.donated || 0), 0);
      const liveDonationRankings = usersData.filter(u => u.role === 'student' && u.donated > 0).sort((a, b) => b.donated - a.donated).slice(0, 5).map((u, i) => ({ rank: i + 1, name: u.name, amount: u.donated, color: i === 0 ? 'text-yellow-500' : i === 1 ? 'text-slate-400' : 'text-orange-500' }));
      const liveDonationGoals = donationGoals.map(g => ({ ...g, current: totalDonated }));
      
      const todayStart = new Date().setHours(0,0,0,0);
      let dMint = 0, dFine = 0, dStore = 0, dTrans = 0, dDon = 0;
      dbData.txs.filter(tx => tx.timestamp >= todayStart).forEach(tx => {
        const num = parseAmount(tx.amount);
        if (tx.type === '시스템 지급') dMint += num;
        if (tx.type === '시스템 차감') dFine += num;
        if (tx.type === '상점 구매') dStore += num;
        if (tx.type === '송금' && !tx.isPositive) dTrans += num;
        if (tx.type === '기부') dDon += num;
      });

      return (
        <div className="animate-fade-in space-y-8">
          <Modal isOpen={isTransferModalOpen} title="송금하기" icon={<i className="fa-solid fa-paper-plane text-purple-600"></i>} onClose={() => setIsTransferModalOpen(false)}>
            <form onSubmit={executeTransfer} className="space-y-6">
              <div><label className="block text-sm font-extrabold text-purple-900 mb-2">누구에게 보낼까요?</label><CustomDropdown options={usersData.filter(u => u.id !== assets.id).map(u => ({ value: u.id, label: u.name }))} value={transferTarget} onChange={setTransferTarget} placeholder="받을 대상 선택" /></div>
              <div><label className="block text-sm font-extrabold text-purple-900 mb-2">보낼 금액 (현금: {formatMoney(assets.cash)})</label><input type="number" required placeholder="금액을 입력하세요" className="w-full bg-purple-50 border-2 border-purple-100 hover:border-purple-300 text-purple-900 rounded-2xl px-5 py-4 outline-none font-bold" value={transferAmount} onChange={(e) => setTransferAmount(e.target.value)} /></div>
              <button type="submit" className="w-full bg-purple-600 text-white py-4 rounded-2xl font-extrabold shadow-lg">보내기</button>
            </form>
          </Modal>

          <Modal isOpen={isDonateModalOpen} title="학급 기부" icon={<i className="fa-solid fa-heart text-rose-600"></i>} onClose={() => setIsDonateModalOpen(false)}>
            <form onSubmit={executeDonate} className="space-y-6">
              <div><label className="block text-sm font-extrabold text-rose-900 mb-2">기부할 금액 (현금: {formatMoney(assets.cash)})</label><input type="number" required placeholder="따뜻한 마음을 입력하세요" className="w-full bg-rose-50 border-2 border-rose-100 rounded-2xl px-5 py-4 outline-none font-bold" value={donateAmount} onChange={(e) => setDonateAmount(e.target.value)} /></div>
              <button type="submit" className="w-full bg-rose-600 text-white py-4 rounded-2xl font-extrabold shadow-lg">기부하기</button>
            </form>
          </Modal>

          <Modal isOpen={isAdminActionModalOpen} title="학생 자산 일괄 관리" icon={<i className="fa-solid fa-coins text-purple-600"></i>} onClose={() => setIsAdminActionModalOpen(false)}>
            <form onSubmit={executeAdminAction} className="space-y-6">
              <CustomMultiSelect options={studentCandidates.map(u => ({ value: u.id, label: `${u.name} (${formatMoney(u.cash)})` }))} selectedValues={adminTargetIds} onChange={setAdminTargetIds} placeholder="학생들을 선택하세요" />
              <div className="flex gap-6 bg-purple-50 p-4 rounded-2xl border-2 border-purple-100">
                <label className="flex items-center gap-3 cursor-pointer flex-1"><input type="radio" name="action" value="add" checked={adminActionType === 'add'} onChange={() => setAdminActionType('add')} className="w-5 h-5 accent-purple-600" /><span className="font-extrabold text-purple-700">지급 (+)</span></label>
                <label className="flex items-center gap-3 cursor-pointer flex-1"><input type="radio" name="action" value="sub" checked={adminActionType === 'sub'} onChange={() => setAdminActionType('sub')} className="w-5 h-5 accent-fuchsia-600" /><span className="font-extrabold text-fuchsia-700">차감 (-)</span></label>
              </div>
              <input type="number" required placeholder="금액" className="w-full bg-purple-50 border-2 border-purple-100 text-purple-900 rounded-2xl px-5 py-4 outline-none font-bold" value={adminAmount} onChange={(e) => setAdminAmount(e.target.value)} />
              <input type="text" placeholder="사유 (예: 지각)" className="w-full bg-purple-50 border-2 border-purple-100 text-purple-900 rounded-2xl px-5 py-4 outline-none font-bold" value={adminReason} onChange={(e) => setAdminReason(e.target.value)} />
              <button type="submit" className="w-full bg-purple-900 text-white py-4 rounded-2xl font-extrabold shadow-lg">실행</button>
            </form>
          </Modal>

          <Modal isOpen={isAdminSelfModalOpen} title="선생님 자산 관리" icon={<i className="fa-solid fa-wallet text-indigo-700"></i>} onClose={() => setIsAdminSelfModalOpen(false)}>
            <form onSubmit={executeAdminSelf} className="space-y-6">
              <div className="flex gap-6 bg-indigo-50 p-4 rounded-2xl border-2 border-indigo-100">
                <label className="flex items-center gap-3 cursor-pointer flex-1"><input type="radio" name="selfAction" value="add" checked={adminSelfType === 'add'} onChange={() => setAdminSelfType('add')} className="w-5 h-5 accent-indigo-600" /><span className="font-extrabold text-indigo-700">돈 채우기 (+)</span></label>
                <label className="flex items-center gap-3 cursor-pointer flex-1"><input type="radio" name="selfAction" value="sub" checked={adminSelfType === 'sub'} onChange={() => setAdminSelfType('sub')} className="w-5 h-5 accent-rose-600" /><span className="font-extrabold text-rose-700">돈 버리기 (-)</span></label>
              </div>
              <input type="number" required placeholder="적용할 금액" className="w-full bg-indigo-50 border-2 border-indigo-100 text-indigo-900 rounded-2xl px-5 py-4 outline-none font-bold" value={adminSelfAmount} onChange={(e) => setAdminSelfAmount(e.target.value)} />
              <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-extrabold shadow-lg">실행</button>
            </form>
          </Modal>

          <Modal isOpen={isSettingsModalOpen} title="경제 시스템 마스터 설정" icon={<i className="fa-solid fa-sliders text-indigo-600"></i>} onClose={() => setIsSettingsModalOpen(false)}>
            <form onSubmit={saveSettings} className="space-y-6">
              <div className="bg-indigo-50 p-5 rounded-2xl border-2 border-indigo-100 space-y-4">
                <h4 className="font-black text-indigo-900">1. 주식 API 설정 (Finnhub)</h4>
                <input type="text" placeholder="API Key 입력" className="w-full bg-white border-2 border-indigo-200 rounded-xl px-4 py-3 font-bold text-sm outline-none" value={sKey} onChange={e => setSKey(e.target.value)} />
              </div>
              <div className="bg-fuchsia-50 p-5 rounded-2xl border-2 border-fuchsia-100 space-y-4">
                <h4 className="font-black text-fuchsia-900">2. 주가 업데이트 주기 설정</h4>
                <div className="flex gap-2 items-center">
                  <input type="number" className="w-16 bg-white border-2 border-fuchsia-200 rounded-xl px-3 py-2 text-center font-bold outline-none" value={sDays} onChange={e=>setSDays(e.target.value)} />일
                  <input type="number" className="w-16 bg-white border-2 border-fuchsia-200 rounded-xl px-3 py-2 text-center font-bold outline-none" value={sHours} onChange={e=>setSHours(e.target.value)} />시간
                  <input type="number" className="w-16 bg-white border-2 border-fuchsia-200 rounded-xl px-3 py-2 text-center font-bold outline-none" value={sMins} onChange={e=>setSMins(e.target.value)} />분
                </div>
              </div>
              <div className="bg-rose-50 p-5 rounded-2xl border-2 border-rose-100 space-y-4">
                <h4 className="font-black text-rose-900">3. 게임 화폐 환산율 설정</h4>
                <div className="flex items-center gap-3"><span className="font-bold text-sm">주가 나누기 값:</span><input type="number" step="0.1" className="w-24 bg-white border-2 border-rose-200 rounded-xl px-3 py-2 text-center font-bold outline-none" value={sDiv} onChange={e=>setSDiv(e.target.value)} /></div>
                <div className="flex items-center gap-3"><span className="font-bold text-sm">소수점 처리:</span><select className="bg-white border-2 border-rose-200 rounded-xl px-3 py-2 font-bold outline-none" value={sRound} onChange={e=>setSRound(e.target.value)}><option value="round">반올림</option><option value="ceil">올림</option><option value="floor">버림</option></select></div>
                <div className="flex items-center gap-3"><span className="font-bold text-sm">표시 자릿수:</span><input type="number" className="w-16 bg-white border-2 border-rose-200 rounded-xl px-3 py-2 text-center font-bold outline-none" value={sDec} onChange={e=>setSDec(e.target.value)} /></div>
              </div>
              <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-extrabold shadow-lg">설정 저장</button>
            </form>
          </Modal>

          <Modal isOpen={showTxDeleteModal} title="내역 다중 삭제" icon={<i className="fa-solid fa-trash-can text-rose-600"></i>} onClose={() => setShowTxDeleteModal(false)}>
            <div className="space-y-6">
              <p className="font-bold text-purple-800 text-center leading-relaxed">선택한 {selectedTxs.length}개의 내역을 삭제합니다.<br/>삭제 방식(금액 복구 여부)을 선택해주세요.</p>
              <div className="space-y-3">
                <button onClick={() => deleteTxs(false)} className="w-full py-4 bg-purple-100 text-purple-900 font-black rounded-2xl">내역만 지우기 (금액 변동 없음)</button>
                <button onClick={() => deleteTxs(true)} className="w-full py-4 bg-fuchsia-600 text-white font-black rounded-2xl shadow-lg">내역 지우고 금액도 함께 복원</button>
              </div>
            </div>
          </Modal>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div className="lg:col-span-2 space-y-8">
              {/* 퀵 액션 버튼 */}
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <button onClick={() => setIsTransferModalOpen(true)} className="w-full bg-white rounded-[2rem] p-7 shadow-xl border-2 border-purple-100 text-left flex items-center gap-5 hover:-translate-y-1 transition-transform">
                  <div className="w-16 h-16 bg-purple-100 rounded-2xl flex items-center justify-center text-purple-600"><i className="fa-solid fa-paper-plane text-2xl"></i></div><div><h3 className="text-xl font-black text-purple-950">내 자산 송금하기</h3><p className="text-sm text-purple-600 font-bold mt-1">친구에게 현금 이체</p></div>
                </button>

                {assets.role === 'admin' ? (
                  <div className="flex flex-col gap-3">
                    <button onClick={() => setIsAdminActionModalOpen(true)} className="w-full flex-1 bg-purple-950 rounded-3xl p-5 shadow-xl border-2 border-purple-800 text-left flex items-center gap-4 text-white hover:-translate-y-1 transition-transform">
                      <div className="w-12 h-12 bg-purple-900 rounded-xl flex items-center justify-center border border-purple-700"><i className="fa-solid fa-coins text-fuchsia-400 text-xl"></i></div><div><h3 className="text-lg font-black">학생 자산 관리</h3><p className="text-xs text-purple-300 font-bold mt-1">지급/차감 (복수선택)</p></div>
                    </button>
                    <button onClick={() => setIsAdminSelfModalOpen(true)} className="w-full flex-1 bg-indigo-50 rounded-3xl p-5 border-2 border-indigo-200 text-left flex items-center gap-4 text-indigo-900 hover:-translate-y-1 transition-transform">
                      <div className="w-12 h-12 bg-indigo-100 rounded-xl flex items-center justify-center border border-indigo-200"><i className="fa-solid fa-wallet text-indigo-600 text-xl"></i></div><div><h3 className="text-lg font-black">선생님 자산 관리</h3><p className="text-xs text-indigo-600 font-bold mt-1">내 돈 채우기/버리기</p></div>
                    </button>
                  </div>
                ) : (
                  <button onClick={() => setIsDonateModalOpen(true)} className="w-full bg-rose-50 rounded-[2rem] p-7 shadow-xl border-2 border-rose-200 text-left flex items-center gap-5 hover:-translate-y-1 transition-transform">
                    <div className="w-16 h-16 bg-rose-200 rounded-2xl flex items-center justify-center text-rose-600"><i className="fa-solid fa-heart text-2xl"></i></div><div><h3 className="text-xl font-black text-rose-950">기부하기</h3><p className="text-sm text-rose-600 font-bold mt-1">학급 목표 달성을 위해!</p></div>
                  </button>
                )}
              </div>

              {/* 기부 현황 컴포넌트 */}
              <section className="bg-white rounded-[2.5rem] shadow-xl border-2 border-rose-100 overflow-hidden">
                <div className="p-8 border-b-2 border-rose-50 bg-rose-50/30"><h2 className="text-2xl font-black text-rose-950 flex items-center gap-3"><div className="bg-rose-100 p-2 rounded-xl"><i className="fa-solid fa-bullseye text-rose-600"></i></div>학급 기부 현황</h2></div>
                <div className="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
                  <div>
                    <h3 className="font-extrabold text-rose-900 mb-4 flex items-center gap-2"><i className="fa-solid fa-medal text-amber-500"></i> 기부 랭킹 Top 5</h3>
                    <div className="space-y-3">
                      {liveDonationRankings.map((user, idx) => (
                        <div key={idx} className="flex justify-between items-center p-3.5 bg-rose-50/50 rounded-2xl border border-rose-100">
                          <div className="flex items-center gap-3"><span className={`font-black text-lg w-6 text-center ${user.color}`}>{user.rank}</span><span className="font-bold text-rose-900">{user.name}</span></div>
                          <span className="font-black text-rose-600">{formatMoney(user.amount)}</span>
                        </div>
                      ))}
                      {liveDonationRankings.length === 0 && <p className="text-sm text-rose-400 font-bold p-4 text-center">기부 내역이 없습니다.</p>}
                    </div>
                  </div>
                  <div>
                    <h3 className="font-extrabold text-rose-900 mb-4 flex items-center gap-2"><i className="fa-solid fa-bullseye text-rose-500"></i> 공동 목표</h3>
                    <div className="space-y-4">
                      {liveDonationGoals.map((goal, idx) => {
                        const percent = Math.min(100, (goal.current / goal.target) * 100);
                        return (
                          <div key={idx} className="bg-white p-4 rounded-2xl border-2 border-rose-100 shadow-sm">
                            <div className="flex justify-between items-center mb-2"><h4 className="font-black text-rose-900">{goal.title}</h4><span className="bg-rose-100 text-rose-700 text-xs font-black px-2 py-1 rounded-lg">{percent.toFixed(1)}%</span></div>
                            <div className="w-full bg-rose-100 rounded-full h-2 mb-2"><div className="bg-rose-500 h-2 rounded-full transition-all" style={{ width: `${percent}%` }}></div></div>
                            <div className="flex justify-between text-xs font-bold text-rose-500"><span>{formatMoney(goal.current)}</span><span>{formatMoney(goal.target)}</span></div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </section>

              {/* 거래 내역 컴포넌트 */}
              <section className="bg-white rounded-[2.5rem] shadow-xl border-2 border-purple-100 overflow-hidden">
                <div className="p-6 sm:p-8 border-b-2 border-purple-50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-purple-50/30">
                  <h2 className="text-2xl font-black text-purple-950 flex items-center gap-3"><div className="bg-purple-100 p-2 rounded-xl"><i className="fa-solid fa-clock-rotate-left text-purple-600"></i></div>{assets.role === 'admin' ? '반 전체 거래 내역' : '내 최근 거래 내역'}</h2>
                  {assets.role === 'admin' && selectedTxs.length > 0 && <button onClick={() => setShowTxDeleteModal(true)} className="bg-red-500 text-white font-black px-4 py-2 rounded-xl shadow-lg">선택 삭제 ({selectedTxs.length})</button>}
                </div>
                <div className="overflow-x-auto p-4 max-h-96 overflow-y-auto">
                  <table className="w-full text-sm text-left">
                    <thead className="text-purple-500 font-extrabold border-b-2 border-purple-100">
                      <tr>
                        {assets.role === 'admin' && <th className="px-4 py-5 w-10"><input type="checkbox" onChange={(e) => setSelectedTxs(e.target.checked ? displayTxs.map(t=>t.id) : [])} checked={displayTxs.length > 0 && selectedTxs.length === displayTxs.length} className="w-4 h-4 accent-purple-600" /></th>}
                        <th className="px-4 py-5">일시</th>
                        {assets.role === 'admin' && <th className="px-4 py-5">사용자</th>}
                        <th className="px-4 py-5">거래유형</th>
                        <th className="px-4 py-5">내용</th>
                        <th className="px-4 py-5 text-right">증감</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y-2 divide-purple-50">
                      {displayTxs.map(tx => (
                        <tr key={tx.id} className="hover:bg-purple-50/50">
                          {assets.role === 'admin' && <td className="px-4 py-5 text-center"><input type="checkbox" checked={selectedTxs.includes(tx.id)} onChange={(e) => { if(e.target.checked) setSelectedTxs([...selectedTxs, tx.id]); else setSelectedTxs(selectedTxs.filter(id => id !== tx.id)); }} className="w-4 h-4 accent-purple-600" /></td>}
                          <td className="px-4 py-5 text-purple-600 font-bold whitespace-nowrap">{tx.date}</td>
                          {assets.role === 'admin' && <td className="px-4 py-5 font-black text-purple-950">{usersData.find(u => u.id === tx.userId)?.name || '알수없음'}</td>}
                          <td className="px-4 py-5 whitespace-nowrap"><Badge type={tx.type.includes('사용')||tx.type.includes('선물')?'neutral':tx.isPositive?'positive':'negative'}>{tx.type}</Badge></td>
                          <td className="px-4 py-5 text-purple-900 font-extrabold">{tx.desc}</td>
                          <td className={`px-4 py-5 text-right font-black whitespace-nowrap text-lg ${tx.type.includes('사용')||tx.type.includes('선물')?'text-purple-400':tx.isPositive?'text-green-600':'text-red-600'}`}>{tx.amount}</td>
                        </tr>
                      ))}
                      {displayTxs.length === 0 && <tr><td colSpan={7} className="text-center py-10 font-bold text-purple-300">내역이 없습니다.</td></tr>}
                    </tbody>
                  </table>
                </div>
              </section>
            </div>

            {/* 오른쪽 사이드바 (통계 및 설정) */}
            <div className="space-y-8">
              <section className="bg-white p-8 rounded-[2rem] border-2 border-purple-100 shadow-sm">
                <h3 className="font-black text-xl text-purple-950 mb-6 flex items-center gap-3"><div className="bg-purple-100 p-2 rounded-xl"><i className="fa-solid fa-chart-simple text-purple-600"></i></div> 오늘의 통계</h3>
                <div className="space-y-4">
                  {[{l:'발행액', v:dMint, c:'text-purple-600', bg:'bg-purple-50'}, {l:'징수/벌금', v:dFine, c:'text-fuchsia-600', bg:'bg-fuchsia-50'}, {l:'상품 구매', v:dStore, c:'text-violet-600', bg:'bg-violet-50'}, {l:'학생 송금', v:dTrans, c:'text-indigo-600', bg:'bg-indigo-50'}].map((stat, idx) => (
                    <div key={idx} className={`flex justify-between items-center p-4 rounded-2xl border-2 border-transparent ${stat.bg}`}>
                      <span className="font-extrabold text-purple-900 text-sm">{stat.l}</span><span className={`text-lg font-black ${stat.c}`}>{formatMoney(stat.v)}</span>
                    </div>
                  ))}
                </div>
              </section>

              <section className="bg-white p-8 rounded-[2rem] border-2 border-purple-100 shadow-sm">
                <h3 className="font-black text-xl text-purple-950 mb-6 flex items-center gap-3"><div className="bg-purple-100 p-2 rounded-xl"><i className="fa-solid fa-gear text-purple-600"></i></div> 설정</h3>
                <div className="space-y-4">
                  {assets.role === 'admin' && (
                    <button onClick={() => setIsSettingsModalOpen(true)} className="w-full flex items-center gap-4 p-4 hover:bg-indigo-50 rounded-2xl transition-all border-2 border-indigo-100 text-left">
                      <div className="p-3 bg-indigo-100 rounded-xl"><i className="fa-solid fa-sliders text-indigo-600 text-xl"></i></div><div><div className="font-black text-indigo-900">경제 시스템 설정</div><div className="text-xs font-bold text-indigo-500 mt-1">주식 API, 환산율 제어</div></div>
                    </button>
                  )}
                  {assets.role === 'admin' && (
                    <button onClick={() => showConfirm('⚠️ 경고: [상점], [예금]을 제외한 학생들의 현금, 증권 등 모든 자산을 초기화하시겠습니까?', async () => {
                        const updates = {}; updates['economy_transactions'] = null; updates['economy_deposits'] = null; updates['economy_inventory'] = null;
                        Object.values(dbData.users).forEach(u => { updates[`economy_users/${u.id}/cash`] = 0; updates[`economy_users/${u.id}/deposit`] = 0; updates[`economy_users/${u.id}/portfolio`] = null; updates[`economy_users/${u.id}/donated`] = 0; });
                        await db.ref().update(updates); showAlert('리셋 완료!');
                      })} className="w-full flex items-center gap-4 p-4 hover:bg-red-50 rounded-2xl transition-all border-2 border-red-100 text-left">
                      <div className="p-3 bg-red-100 rounded-xl"><i className="fa-solid fa-triangle-exclamation text-red-600 text-xl"></i></div><div><div className="font-black text-red-900">자산 0으로 초기화</div><div className="text-xs font-bold text-red-500 mt-1">데이터 초기화 (위험)</div></div>
                    </button>
                  )}
                </div>
              </section>
            </div>
          </div>
        </div>
      );
    }

    // --- Invest View (주식 시장 화면) ---
    function InvestView({ assets, dbData, db, showAlert, showConfirm, onForceUpdateStocks }) {
      const [buyModal, setBuyModal] = useState(null);
      const [sellModal, setSellModal] = useState(null);
      const [amountStr, setAmountStr] = useState('');
      const [showManageModal, setShowManageModal] = useState(false);
      
      const [newTck, setNewTck] = useState(''); const [newNm, setNewNm] = useState('');
      const [newIco, setNewIco] = useState('📈'); const [newVirt, setNewVirt] = useState(false);

      const handleBuy = (e) => {
        e.preventDefault();
        const amt = parseInt(amountStr, 10);
        if (isNaN(amt) || amt <= 0) return showAlert("올바른 금액을 입력하세요.");
        if (amt > assets.cash) return showAlert("현금이 부족합니다.");
        const curPrice = buyModal.currentPrice;
        if (!curPrice) return showAlert("시세 데이터가 아직 없습니다.");

        const qty = amt / curPrice;
        const currentPortfolio = assets.portfolio?.[buyModal.id] || { qty: 0, totalInvested: 0 };
        const newTotalInvested = currentPortfolio.totalInvested + amt;
        const newQty = currentPortfolio.qty + qty;
        const newAvgPrice = newTotalInvested / newQty;

        const updates = {};
        updates[`economy_users/${assets.id}/cash`] = assets.cash - amt;
        updates[`economy_users/${assets.id}/portfolio/${buyModal.id}`] = { qty: newQty, totalInvested: newTotalInvested, avgPrice: newAvgPrice };
        const txRef = db.ref('economy_transactions').push().key;
        updates[`economy_transactions/${txRef}`] = { id: txRef, userId: assets.id, type: '주식 매수', desc: `${buyModal.name} 매수`, amount: `-${formatMoney(amt)}`, balance: formatMoney(assets.cash-amt), isPositive: false, timestamp: Date.now(), date: formatDate(new Date()) };
        db.ref().update(updates); setBuyModal(null); setAmountStr(''); showAlert(`${buyModal.name} ${formatMoney(amt)}어치 매수 완료!`);
      };

      const handleSell = (percent) => {
        const currentPortfolio = assets.portfolio?.[sellModal.id];
        if (!currentPortfolio || currentPortfolio.qty <= 0) return showAlert("보유한 주식이 없습니다.");
        const curPrice = sellModal.currentPrice;
        if (!curPrice) return showAlert("시세 데이터가 없습니다.");

        const sellQty = currentPortfolio.qty * (percent / 100);
        const revenue = Math.floor(sellQty * curPrice);
        const costBasis = currentPortfolio.totalInvested * (percent / 100);
        const newQty = currentPortfolio.qty - sellQty;
        const newTotalInvested = currentPortfolio.totalInvested - costBasis;

        showConfirm(`${percent}%를 매도하여 ${formatMoney(revenue)}를 받으시겠습니까?`, () => {
          const updates = {};
          updates[`economy_users/${assets.id}/cash`] = assets.cash + revenue;
          if (newQty < 0.000001) updates[`economy_users/${assets.id}/portfolio/${sellModal.id}`] = null;
          else updates[`economy_users/${assets.id}/portfolio/${sellModal.id}`] = { qty: newQty, totalInvested: newTotalInvested, avgPrice: currentPortfolio.avgPrice };
          const txRef = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${txRef}`] = { id: txRef, userId: assets.id, type: '주식 매도', desc: `${sellModal.name} 매도`, amount: `+${formatMoney(revenue)}`, balance: formatMoney(assets.cash+revenue), isPositive: true, timestamp: Date.now(), date: formatDate(new Date()) };
          db.ref().update(updates); setSellModal(null); showAlert(`${formatMoney(revenue)} 획득 완료!`);
        });
      };

      const handleAddStock = (e) => {
        e.preventDefault();
        // 한국, 미국 티커 입력 강제 정규식
        if (!newVirt && !/^[A-Za-z]+$/.test(newTck) && !/^\d{6}\.(KS|KQ)$/.test(newTck)) {
             return showAlert("티커 형식이 잘못되었습니다.\n(미국: 영문자만, 한국: 6자리숫자.KS 또는 .KQ)");
        }
        const id = db.ref('economy_stocks').push().key;
        db.ref(`economy_stocks/${id}`).set({ id, ticker: newTck, name: newNm, icon: newIco, isVirtual: newVirt, currentPrice: 1000, prevPrice: 1000, lastUpdated: 0 });
        setNewTck(''); setNewNm(''); setShowManageModal(false); showAlert('새로운 종목이 상장되었습니다!');
      };

      return (
        <div className="animate-fade-in space-y-6">
          <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-indigo-100 mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
              <h1 className="text-3xl font-black text-indigo-950 flex items-center gap-4"><div className="bg-indigo-100 p-3 rounded-2xl"><i className="fa-solid fa-chart-line text-indigo-600"></i></div> 증권 거래소</h1>
              <p className="text-indigo-600 font-bold mt-4">실제 현실의 주식 시세와 연동되는 시장입니다.</p>
              <p className="text-slate-400 font-bold text-xs mt-2">최근 API 업데이트: {dbData.settings?.stockLastUpdated ? formatDate(new Date(dbData.settings.stockLastUpdated)) : '없음'}</p>
            </div>
            {assets.role === 'admin' && (
              <div className="flex gap-2">
                <button onClick={onForceUpdateStocks} className="bg-indigo-600 hover:bg-indigo-700 text-white font-black px-6 py-4 rounded-xl shadow-lg transition-all"><i className="fa-solid fa-rotate-right mr-2"></i>수동 갱신</button>
                <button onClick={() => setShowManageModal(true)} className="bg-slate-800 text-white font-black px-6 py-4 rounded-xl shadow-lg"><i className="fa-solid fa-plus mr-2"></i>종목 관리</button>
              </div>
            )}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            {dbData.stocks.map(market => {
              const pData = assets.portfolio?.[market.id];
              const curPrice = market.currentPrice || 0;
              const prePrice = market.prevPrice || curPrice;
              const diff = curPrice - prePrice;
              const rateNum = prePrice > 0 ? ((diff / prePrice) * 100).toFixed(2) : 0;
              const isUp = diff > 0; const isDown = diff < 0;
              const priceColor = isUp ? 'text-green-500' : isDown ? 'text-red-500' : 'text-slate-500';
              const sign = isUp ? '▲' : isDown ? '▼' : '-';
              
              const currentVal = pData ? Math.floor(pData.qty * curPrice) : 0;
              const returnAmt = pData ? (currentVal - pData.totalInvested) : 0;
              const returnRate = pData && pData.totalInvested > 0 ? ((returnAmt / pData.totalInvested) * 100).toFixed(2) : 0;
              const returnColor = returnAmt > 0 ? 'text-green-500' : returnAmt < 0 ? 'text-red-500' : 'text-slate-500';

              return (
                <div key={market.id} className="bg-white rounded-[2rem] border-4 border-slate-100 shadow-xl overflow-hidden flex flex-col transition-all hover:-translate-y-1">
                  <div className="p-8 border-b-2 border-slate-50">
                    <div className="flex justify-between items-start mb-6">
                      <div className="flex items-center gap-3">
                        <div className="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center text-2xl">{market.icon}</div>
                        <div>
                          <h4 className="font-black text-xl text-slate-900 flex items-center gap-2">{market.name} {market.isVirtual && <Badge type="neutral">가상</Badge>}</h4>
                          <span className="text-xs font-bold text-slate-400">{market.ticker}</span>
                        </div>
                      </div>
                      <div className="text-right">
                        <div className={`text-2xl font-black tracking-tighter ${priceColor}`}>{formatMoney(curPrice)}</div>
                        <div className={`text-sm font-black ${priceColor}`}>{sign} {Math.abs(diff)}G ({rateNum}%)</div>
                      </div>
                    </div>
                    <div className="bg-slate-50 rounded-2xl p-4 space-y-2">
                      <div className="flex justify-between text-sm font-bold text-slate-500"><span>내 보유량</span><span className="text-slate-900">{pData ? pData.qty.toFixed(2) : 0} 주</span></div>
                      <div className="flex justify-between text-sm font-bold text-slate-500"><span>매수 평균가</span><span className="text-slate-900">{formatMoney(pData?.avgPrice)}</span></div>
                      <div className="flex justify-between text-sm font-bold text-slate-500 pt-2 border-t border-slate-200">
                        <span>현재 평가금</span>
                        <span className={`font-black flex gap-1 ${returnColor}`}>{formatMoney(currentVal)} <span className="text-xs opacity-80">({returnAmt>0?'+':''}{returnAmt}G / {returnRate}%)</span></span>
                      </div>
                    </div>
                  </div>
                  {assets.role !== 'admin' ? (
                    <div className="flex p-4 gap-3 bg-white">
                      <button onClick={() => setBuyModal(market)} className="flex-1 bg-green-50 text-green-600 hover:bg-green-500 hover:text-white py-3 rounded-xl font-black transition-all border-2 border-green-100">매수 (살래)</button>
                      <button onClick={() => setSellModal(market)} disabled={!pData || pData.qty <= 0} className="flex-1 bg-red-50 text-red-600 hover:bg-red-500 hover:text-white disabled:bg-slate-100 disabled:text-slate-400 disabled:border-slate-100 py-3 rounded-xl font-black transition-all border-2 border-red-100">매도 (팔래)</button>
                    </div>
                  ) : (
                    market.isVirtual && (
                      <div className="p-4 bg-white">
                        <button onClick={() => {
                          const p = prompt(`새로운 주가를 입력하세요 (기존: ${curPrice}G)`);
                          const np = parseInt(p, 10);
                          if(!isNaN(np) && np > 0) db.ref(`economy_stocks/${market.id}`).update({ prevPrice: curPrice, currentPrice: np, lastUpdated: Date.now() });
                        }} className="w-full bg-slate-800 text-white py-3 rounded-xl font-black">수동 가격 조작 (관리자)</button>
                      </div>
                    )
                  )}
                </div>
              );
            })}
          </div>

          {/* 주식 종목 관리 모달 (관리자용) */}
          <Modal isOpen={showManageModal} title="주식 종목 관리" icon={<i className="fa-solid fa-chart-pie text-indigo-600"></i>} onClose={() => setShowManageModal(false)}>
            <div className="space-y-6">
              <ul className="space-y-3">
                {dbData.stocks.map(s => (
                  <li key={s.id} className="flex justify-between bg-slate-50 p-3 rounded-xl font-bold items-center border-2 border-slate-100">
                    <span>{s.icon} {s.name} <span className="text-xs text-slate-400">({s.ticker})</span></span>
                    <button onClick={()=>showConfirm('상장 폐지하시겠습니까?', ()=>db.ref(`economy_stocks/${s.id}`).remove())} className="text-red-500 hover:bg-red-100 p-2 rounded-lg"><i className="fa-solid fa-trash"></i></button>
                  </li>
                ))}
              </ul>
              <form onSubmit={handleAddStock} className="bg-indigo-50 p-5 rounded-2xl border-2 border-indigo-100 space-y-4">
                 <h4 className="font-black text-indigo-900">새 종목 상장</h4>
                 <input type="text" required placeholder="종목명 (예: 애플)" className="w-full bg-white border-2 border-indigo-200 rounded-xl px-4 py-3 font-bold" value={newNm} onChange={e=>setNewNm(e.target.value)} />
                 <input type="text" required placeholder="티커 기호 (예: AAPL 또는 005930.KS)" className="w-full bg-white border-2 border-indigo-200 rounded-xl px-4 py-3 font-bold" value={newTck} onChange={e=>setNewTck(e.target.value)} />
                 <input type="text" required placeholder="아이콘 이모지" className="w-full bg-white border-2 border-indigo-200 rounded-xl px-4 py-3 font-bold" value={newIco} onChange={e=>setNewIco(e.target.value)} />
                 <label className="flex items-center gap-2 font-bold text-indigo-900 cursor-pointer">
                   <input type="checkbox" checked={newVirt} onChange={e=>setNewVirt(e.target.checked)} className="w-5 h-5 accent-indigo-600" /> API 연동 없이 수동 조작하는 '가상 주식'
                 </label>
                 <button type="submit" className="w-full bg-indigo-600 text-white font-black py-3 rounded-xl">상장하기</button>
              </form>
            </div>
          </Modal>

          <Modal isOpen={!!buyModal} title={`${buyModal?.name} 매수하기`} icon={<i className="fa-solid fa-arrow-trend-up text-green-600"></i>} onClose={() => {setBuyModal(null); setAmountStr('');}}>
            <form onSubmit={handleBuy} className="space-y-6">
              <div className="bg-slate-50 p-4 rounded-xl flex justify-between font-bold text-sm"><span className="text-slate-500">현재 1주당</span><span className="text-slate-900">{formatMoney(buyModal?.currentPrice)}</span></div>
              <div><label className="block text-sm font-extrabold text-slate-900 mb-2">투자할 금액 (보유: {formatMoney(assets.cash)})</label><input type="number" required placeholder="G 단위 입력" className="w-full bg-white border-2 border-slate-200 text-slate-900 rounded-2xl px-5 py-4 outline-none font-bold" value={amountStr} onChange={(e) => setAmountStr(e.target.value)} /></div>
              <button type="submit" className="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-2xl font-extrabold shadow-lg">매수 주문</button>
            </form>
          </Modal>

          <Modal isOpen={!!sellModal} title={`${sellModal?.name} 매도하기`} icon={<i className="fa-solid fa-arrow-trend-down text-red-600"></i>} onClose={() => setSellModal(null)}>
            <div className="space-y-6">
              <div className="bg-slate-50 p-4 rounded-xl flex justify-between font-bold text-sm"><span className="text-slate-500">현재 총 평가금</span><span className="text-slate-900">{formatMoney(assets.portfolio?.[sellModal?.id]?.qty * sellModal?.currentPrice)}</span></div>
              <label className="block text-sm font-extrabold text-slate-900 mb-2">보유량 중 얼마를 팔까요?</label>
              <div className="grid grid-cols-2 gap-3">
                {[10, 25, 50, 100].map(pct => (
                  <button type="button" key={pct} onClick={() => handleSell(pct)} className="bg-red-50 hover:bg-red-500 hover:text-white text-red-600 border-2 border-red-100 py-3 rounded-xl font-black transition-colors">{pct}% 팔기</button>
                ))}
              </div>
            </div>
          </Modal>
        </div>
      );
    }

    // --- [View: Bank] 은행 화면 ---
    function BankView({ assets, dbData, db, showAlert, showConfirm }) {
      const bankProducts = dbData.bank;
      const deposits = Object.values(dbData.deposits).filter(d => d.userId === assets.id);
      const [showForm, setShowForm] = useState(false);
      const [showProductManager, setShowProductManager] = useState(false);
      const [now, setNow] = useState(Date.now());
      useEffect(() => { const timer = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(timer); }, []);
      
      const [selP, setSelP] = useState(''); const [dName, setDName] = useState(''); const [dAmt, setDAmt] = useState('');
      const [nNm, setNNm] = useState(''); const [nDay, setNDay] = useState(''); const [nRat, setNRate] = useState('');

      const handleCreate = async (e) => {
        e.preventDefault();
        const a = parseInt(dAmt, 10);
        if(!selP || !dName || isNaN(a) || a<=0) return showAlert('모든 필드를 올바르게 입력해주세요.');
        if(a > assets.cash) return showAlert('현금이 부족합니다.');
        const p = bankProducts.find(x=>x.id===selP);
        const m = new Date(); if(p.id==='test') m.setMinutes(m.getMinutes()+1); else m.setDate(m.getDate()+p.days);
        
        const updates = {};
        const ref = db.ref('economy_deposits').push();
        updates[`economy_deposits/${ref.key}`] = { id: ref.key, userId: assets.id, name: dName, productName: p.name, principal: a, rate: p.rate, maturityDate: m.toISOString(), createdAt: new Date().toISOString() };
        updates[`economy_users/${assets.id}/cash`] = assets.cash - a;
        updates[`economy_users/${assets.id}/deposit`] = assets.deposit + a;
        const tx = db.ref('economy_transactions').push().key;
        updates[`economy_transactions/${tx}`] = { id: tx, userId: assets.id, type: '예금 가입', desc: dName, amount: `-${formatMoney(a)}`, balance: formatMoney(assets.cash-a), isPositive: false, timestamp: Date.now(), date: formatDate(new Date()) };
        await db.ref().update(updates);
        setShowForm(false); setSelP(''); setDName(''); setDAmt(''); showAlert('예금이 생성되었습니다.');
      };

      const handleProcess = (id, isM) => {
        const d = deposits.find(x=>x.id===id);
        const ret = isM ? Math.floor(d.principal * (1+d.rate)) : d.principal;
        showConfirm(isM ? `만기되었습니다! ${formatMoney(ret)} 수령하시겠습니까?` : '중도해지 시 이자는 포기됩니다. 진행할까요?', async () => {
          const updates = {};
          updates[`economy_deposits/${id}`] = null;
          updates[`economy_users/${assets.id}/cash`] = assets.cash + ret;
          updates[`economy_users/${assets.id}/deposit`] = assets.deposit - d.principal;
          const tx = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${tx}`] = { id: tx, userId: assets.id, type: isM?'만기 수령':'중도 해지', desc: d.name, amount: `+${formatMoney(ret)}`, balance: formatMoney(assets.cash+ret), isPositive: true, timestamp: Date.now(), date: formatDate(new Date()) };
          await db.ref().update(updates);
          showAlert('처리 완료되었습니다.');
        });
      };

      const handleAdd = (e) => {
        e.preventDefault();
        const id = db.ref('economy_bank_products').push().key;
        db.ref(`economy_bank_products/${id}`).set({ id, name: nNm, days: parseInt(nDay,10), rate: parseFloat(nRat)/100, rateText: `${parseFloat(nRat)}%` });
        setNNm(''); setNDay(''); setNRate(''); showAlert('상품 등록 완료.');
      };

      return (
        <div className="animate-fade-in space-y-8">
          <div className="flex justify-between bg-white p-8 rounded-3xl shadow-xl border-2 border-purple-100 items-center">
            <div><h1 className="text-3xl font-black flex items-center gap-3"><i className="fa-solid fa-building-columns text-purple-600"></i> HH 은행</h1></div>
            {assets.role === 'admin' ? <button onClick={()=>setShowProductManager(true)} className="bg-purple-900 text-white px-6 py-3 rounded-xl font-bold shadow-lg">상품 관리</button> : <button onClick={()=>setShowForm(true)} className="bg-purple-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg">새 예금 가입</button>}
          </div>

          <Modal isOpen={showForm} title="예금 가입" onClose={()=>setShowForm(false)}>
            <form onSubmit={handleCreate} className="space-y-4">
              <CustomDropdown options={bankProducts.map(p=>({value:p.id, label:`${p.name} (${p.rateText})`}))} value={selP} onChange={setSelP} placeholder="상품 선택" />
              <input type="text" required placeholder="예금 이름" className="w-full bg-purple-50 p-4 rounded-xl font-bold outline-none" value={dName} onChange={e=>setDName(e.target.value)} />
              <input type="number" required placeholder={`가입 금액 (보유: ${formatMoney(assets.cash)})`} className="w-full bg-purple-50 p-4 rounded-xl font-bold outline-none" value={dAmt} onChange={e=>setDAmt(e.target.value)} />
              <button type="submit" className="w-full bg-purple-600 text-white p-4 rounded-xl font-black shadow-lg">가입완료</button>
            </form>
          </Modal>

          <Modal isOpen={showProductManager} title="은행 상품 관리" onClose={()=>setShowProductManager(false)}>
            <div className="space-y-4">
              {bankProducts.map(p => <div key={p.id} className="flex justify-between bg-purple-50 p-4 rounded-xl font-bold items-center border border-purple-100"><span>{p.name} ({p.days}일, {p.rateText})</span><button onClick={()=>db.ref(`economy_bank_products/${p.id}`).remove()} className="text-red-500"><i className="fa-solid fa-trash"></i></button></div>)}
              <form onSubmit={handleAdd} className="bg-purple-100 p-4 rounded-xl space-y-2 mt-4 border border-purple-200">
                <input required placeholder="상품명" className="w-full p-3 rounded-lg font-bold outline-none" value={nNm} onChange={e=>setNNm(e.target.value)} />
                <div className="flex gap-2"><input type="number" required placeholder="기간(일)" className="w-full p-3 rounded-lg font-bold outline-none" value={nDay} onChange={e=>setNDay(e.target.value)} /><input type="number" step="0.1" required placeholder="이자(%)" className="w-full p-3 rounded-lg font-bold outline-none" value={nRat} onChange={e=>setNRate(e.target.value)} /></div>
                <button type="submit" className="w-full bg-purple-800 text-white p-3 rounded-lg font-bold">추가</button>
              </form>
            </div>
          </Modal>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            {deposits.map(d => {
              const isM = now >= new Date(d.maturityDate).getTime();
              return (
                <div key={d.id} className={`bg-white p-6 rounded-3xl border-4 ${isM?'border-purple-400 shadow-xl':'border-purple-100'} flex flex-col hover:-translate-y-1 transition-all`}>
                  <h4 className="font-black text-xl mb-4">{d.name}</h4>
                  <div className="text-sm font-bold text-gray-500 space-y-2 mb-6">
                    <div className="flex justify-between"><span>원금</span><span className="text-purple-900">{formatMoney(d.principal)}</span></div>
                    <div className="flex justify-between"><span>이자율</span><span>{d.rate*100}%</span></div>
                    <div className="flex justify-between"><span>만기일</span><span>{formatDate(new Date(d.maturityDate))}</span></div>
                  </div>
                  {assets.role !== 'admin' && <button onClick={()=>handleProcess(d.id, isM)} className={`mt-auto py-3 rounded-xl font-black text-white ${isM?'bg-purple-600':'bg-slate-300'}`}>{isM ? '만기 수령' : '중도 해지'}</button>}
                </div>
              );
            })}
            {deposits.length === 0 && <div className="col-span-full py-20 text-center font-bold text-purple-300 text-xl">가입된 예금이 없습니다.</div>}
          </div>
        </div>
      );
    }

    // --- [View: Store] 상점 화면 ---
    function StoreView({ assets, dbData, db, showAlert, showConfirm }) {
      const [tab, setTab] = useState('buy');
      const storeProducts = dbData.store;
      const myItems = dbData.inventory.filter(i=>i.userId===assets.id);
      
      const [showForm, setShowForm] = useState(false);
      const [nNm, setNNm] = useState(''); const [nIco, setNIco] = useState('🎁'); const [nPri, setNPri] = useState('');
      const [nStk, setNStk] = useState('99'); const [nDes, setNDes] = useState(''); const [nRef, setNRef] = useState(true);

      const handleBuy = (p) => {
        if(p.stock<=0) return;
        if(assets.cash < p.price) return showAlert('현금이 부족합니다.');
        showConfirm(`${p.name} 구매할까요?`, () => {
          const updates = {};
          updates[`economy_users/${assets.id}/cash`] = assets.cash - p.price;
          updates[`economy_store_products/${p.id}/stock`] = p.stock - 1;
          const i = db.ref('economy_inventory').push().key;
          updates[`economy_inventory/${i}`] = { id: i, userId: assets.id, productId: p.id, productName: p.name, icon: p.icon, price: p.price, purchasedAt: Date.now(), isRefundable: p.refundable, refundLimitHours: p.refundLimitHours };
          const tx = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${tx}`] = { id: tx, userId: assets.id, type: '상점 구매', desc: p.name, amount: `-${formatMoney(p.price)}`, balance: formatMoney(assets.cash-p.price), isPositive: false, timestamp: Date.now(), date: formatDate(new Date()) };
          db.ref().update(updates); showAlert('구매 완료!');
        });
      };

      const handleUse = (i) => {
        showConfirm('사용하면 사라집니다. 쓰시겠습니까?', () => {
          const updates = {};
          updates[`economy_inventory/${i.id}`] = null;
          const tx = db.ref('economy_transactions').push().key;
          updates[`economy_transactions/${tx}`] = { id: tx, userId: assets.id, type: '아이템 사용', desc: i.productName, amount: '0G', balance: formatMoney(assets.cash), isPositive: false, timestamp: Date.now(), date: formatDate(new Date()) };
          db.ref().update(updates); showAlert('사용했습니다!');
        });
      };

      const handleAdd = (e) => {
        e.preventDefault();
        const id = db.ref('economy_store_products').push().key;
        db.ref(`economy_store_products/${id}`).set({ id, name: nNm, icon: nIco, price: parseInt(nPri,10), stock: parseInt(nStk,10), desc: nDes, refundable: nRef, refundLimitHours: 24 });
        setShowForm(false); setNNm(''); setNPri(''); showAlert('상품 등록 완료');
      };

      return (
        <div className="animate-fade-in space-y-8">
          <div className="flex justify-between bg-white p-8 rounded-3xl shadow-xl border-2 border-purple-100">
            <h1 className="text-3xl font-black flex items-center gap-3"><i className="fa-solid fa-store text-fuchsia-600"></i> 상점 & 보관함</h1>
            <div className="flex gap-2">
              <button onClick={()=>setTab('buy')} className={`px-5 py-2 rounded-xl font-bold transition-colors ${tab==='buy'?'bg-fuchsia-600 text-white':'bg-fuchsia-50 text-fuchsia-900 hover:bg-fuchsia-100'}`}>상점</button>
              {assets.role !== 'admin' && <button onClick={()=>setTab('inv')} className={`px-5 py-2 rounded-xl font-bold transition-colors ${tab==='inv'?'bg-fuchsia-600 text-white':'bg-fuchsia-50 text-fuchsia-900 hover:bg-fuchsia-100'}`}>보관함 ({myItems.length})</button>}
              {assets.role === 'admin' && <button onClick={()=>setTab('mng')} className={`px-5 py-2 rounded-xl font-bold transition-colors ${tab==='mng'?'bg-fuchsia-600 text-white':'bg-fuchsia-50 text-fuchsia-900 hover:bg-fuchsia-100'}`}>관리</button>}
            </div>
          </div>

          <Modal isOpen={showForm} title="상품 등록" onClose={()=>setShowForm(false)}>
            <form onSubmit={handleAdd} className="space-y-4">
              <input required placeholder="상품명" className="w-full p-4 bg-fuchsia-50 rounded-xl font-bold outline-none" value={nNm} onChange={e=>setNNm(e.target.value)} />
              <input required placeholder="이모지 (예: 🎁)" className="w-full p-4 bg-fuchsia-50 rounded-xl font-bold outline-none" value={nIco} onChange={e=>setNIco(e.target.value)} />
              <input required type="number" placeholder="가격" className="w-full p-4 bg-fuchsia-50 rounded-xl font-bold outline-none" value={nPri} onChange={e=>setNPri(e.target.value)} />
              <input placeholder="설명" className="w-full p-4 bg-fuchsia-50 rounded-xl font-bold outline-none" value={nDes} onChange={e=>setNDes(e.target.value)} />
              <button className="w-full py-4 bg-fuchsia-600 text-white rounded-xl font-black">등록하기</button>
            </form>
          </Modal>

          {tab === 'buy' && (
            <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
              {storeProducts.map(p => (
                <div key={p.id} className="bg-white p-6 rounded-3xl border-2 border-purple-50 shadow-lg flex flex-col items-center text-center hover:-translate-y-2 transition-all relative">
                  <div className="text-5xl mb-4 drop-shadow-md">{p.icon}</div>
                  <h4 className="font-black text-lg mb-1">{p.name}</h4>
                  <p className="text-xs text-gray-400 mb-4 line-clamp-2 h-8">{p.desc}</p>
                  <p className="font-black text-fuchsia-600 mb-4">{formatMoney(p.price)} <span className="text-xs text-gray-400">(잔여: {p.stock})</span></p>
                  {assets.role !== 'admin' && <button onClick={()=>handleBuy(p)} disabled={p.stock<=0} className="w-full bg-fuchsia-600 text-white py-3 rounded-xl font-bold disabled:bg-gray-300">구매</button>}
                </div>
              ))}
            </div>
          )}

          {tab === 'inv' && (
             <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
               {myItems.map(i => (
                 <div key={i.id} className="bg-white p-6 rounded-3xl border-4 border-fuchsia-100 shadow-xl flex items-center justify-between hover:-translate-y-1 transition-transform">
                   <div className="flex items-center gap-4"><div className="text-4xl">{i.icon}</div><div className="font-black text-lg">{i.productName}</div></div>
                   <button onClick={()=>handleUse(i)} className="bg-fuchsia-600 text-white px-5 py-3 rounded-xl font-bold">사용</button>
                 </div>
               ))}
               {myItems.length === 0 && <div className="col-span-full py-20 text-center font-bold text-fuchsia-300 text-xl">보관함이 비어있습니다.</div>}
             </div>
          )}

          {tab === 'mng' && assets.role === 'admin' && (
             <div className="space-y-4">
               <button onClick={()=>setShowForm(true)} className="bg-fuchsia-600 text-white px-6 py-3 rounded-xl font-bold mb-4 shadow-lg">새 상품 등록</button>
               {storeProducts.map(p => (
                 <div key={p.id} className="bg-white p-4 rounded-xl border border-fuchsia-100 flex justify-between items-center font-bold">
                   <span>{p.icon} {p.name} ({formatMoney(p.price)} / 재고: {p.stock})</span>
                   <button onClick={()=>db.ref(`economy_store_products/${p.id}`).remove()} className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors"><i className="fa-solid fa-trash"></i></button>
                 </div>
               ))}
             </div>
          )}
        </div>
      );
    }

    // ============================================================================
    // [6] 메인 애플리케이션 컴포넌트 (App)
    // ============================================================================
    function App() {
      // 상태 관리
      const [currentUser, setCurrentUser] = useState(null); 
      const [isDBLoaded, setIsDBLoaded] = useState(false);
      const [loadingProgress, setLoadingProgress] = useState(0); 
      const [dbData, setDbData] = useState({ users: {}, deposits: {}, txs: [], bank: [], store: [], inventory: [], stocks: [], settings: INITIAL_SETTINGS });
      const [view, setView] = useState('dashboard');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      
      const [alertData, setAlertData] = useState(null);
      const [confirmData, setConfirmData] = useState(null);
      const [promptData, setPromptData] = useState(null);
      
      const showAlert = (message, onConfirm) => setAlertData({ message, onConfirm });
      const showConfirm = (message, onConfirm) => setConfirmData({ message, onConfirm });
      const showPrompt = (title, message, defaultValue, onConfirm) => setPromptData({ title, message, value: defaultValue, onConfirm });

      // 로딩 애니메이션 타이머
      useEffect(() => {
        if (!isDBLoaded) {
          const timer = setInterval(() => {
            setLoadingProgress(prev => prev >= 95 ? 95 : prev + Math.floor(Math.random() * 15) + 1);
          }, 150);
          return () => clearInterval(timer);
        } else {
          setLoadingProgress(100);
        }
      }, [isDBLoaded]);

      // Firebase 실시간 구독 및 데이터 동기화
      useEffect(() => {
        const rootRef = db.ref('/');
        const onDataChange = rootRef.on('value', (snap) => {
          const val = snap.val() || {};
          
          if (!val.economy_users) {
            const updates = {};
            USERS_DATA.forEach(u => { updates[`economy_users/${u.id}`] = { ...u, cash: 0, deposit: 0, level: 1, donated: 0, portfolio: {} }; });
            INITIAL_BANK_PRODUCTS.forEach(p => updates[`economy_bank_products/${p.id}`] = p);
            INITIAL_STORE_PRODUCTS.forEach(s => updates[`economy_store_products/${s.id}`] = s);
            INITIAL_STOCKS.forEach(st => updates[`economy_stocks/${st.id}`] = st);
            updates[`economy_settings`] = INITIAL_SETTINGS;
            db.ref().update(updates);
          }

          setDbData({
            users: val.economy_users || {},
            deposits: val.economy_deposits || {},
            txs: val.economy_transactions ? Object.values(val.economy_transactions).sort((a,b) => b.timestamp - a.timestamp) : [],
            bank: val.economy_bank_products ? Object.values(val.economy_bank_products).sort((a,b) => a.days - b.days) : [],
            store: val.economy_store_products ? Object.values(val.economy_store_products) : [],
            inventory: val.economy_inventory ? Object.values(val.economy_inventory).sort((a,b) => b.purchasedAt - a.purchasedAt) : [],
            stocks: val.economy_stocks ? Object.values(val.economy_stocks) : [],
            settings: val.economy_settings || INITIAL_SETTINGS
          });
          
          setIsDBLoaded(true);
        });

        return () => rootRef.off('value', onDataChange);
      }, []);

      // 주가 데이터 갱신 (설정된 주기에 따라 실행)
      useEffect(() => {
        if (!isDBLoaded) return;
        const s = dbData.settings;
        const intervalMs = (s.updateInterval?.days * 86400000) + (s.updateInterval?.hours * 3600000) + (s.updateInterval?.minutes * 60000) || 3600000;
        
        if (s.finnhubKey && Date.now() - (s.stockLastUpdated || 0) > intervalMs) {
          fetchAndStoreRealStocks(db, dbData.stocks, s);
        }
      }, [isDBLoaded, dbData.settings, dbData.stocks]);

      const handleLogin = (id, u) => {
        showAlert(`환영합니다, ${u.name}님!`, () => {
          setCurrentUser(id);
          setView('dashboard');
        });
      };

      const handleLogout = () => showConfirm('로그아웃 하시겠습니까?', () => setCurrentUser(null));

      // 데이터가 로딩 중이거나 아직 로그인하지 않은 경우 (로그인 화면 렌더링)
      if (!currentUser || !isDBLoaded) {
        return (
          <div className="relative">
            <LoginView onLogin={handleLogin} users={Object.values(dbData.users)} showAlert={showAlert} />
            {(!isDBLoaded || loadingProgress < 100) && (
