              <div className="fixed inset-0 z-[200] bg-purple-950/80 backdrop-blur-sm flex flex-col items-center justify-center animate-fade-in">
                <i className="fa-solid fa-circle-notch fa-spin text-6xl text-fuchsia-400 mb-6"></i>
                <div className="text-3xl font-black text-white tracking-widest drop-shadow-lg">Loading {loadingProgress}%...</div>
                <p className="text-purple-300 font-bold mt-4">데이터를 불러오고 있습니다.</p>
              </div>
            )}
            <Modal isOpen={!!alertData} title="알림" icon={<i className="fa-solid fa-circle-exclamation text-purple-600"></i>} onClose={() => { if(alertData.onConfirm) alertData.onConfirm(); setAlertData(null); }}>
              <div className="space-y-6">
                <p className="text-purple-800 font-bold text-center leading-relaxed whitespace-pre-wrap">{alertData?.message}</p>
                <button onClick={() => { if(alertData.onConfirm) alertData.onConfirm(); setAlertData(null); }} className="w-full bg-purple-600 text-white font-black py-4 rounded-2xl">확인</button>
              </div>
            </Modal>
          </div>
        );
      }

      const myUser = dbData.users[currentUser];
      let realStockValue = 0;
      if (myUser.portfolio) {
        Object.keys(myUser.portfolio).forEach(stockId => {
          const pData = myUser.portfolio[stockId];
          const stockInfo = dbData.stocks.find(s => s.id === stockId);
          const curPrice = stockInfo ? stockInfo.currentPrice : pData.avgPrice;
          realStockValue += (pData.qty * curPrice);
        });
      }
      const myTotalAssets = (myUser.cash || 0) + (myUser.deposit || 0) + realStockValue;

      return (
        <div className="min-h-screen bg-[#F5F3FF] text-purple-950 font-sans pb-20 relative">
          <Modal isOpen={!!alertData} title="알림" icon={<i className="fa-solid fa-circle-exclamation text-purple-600"></i>} onClose={() => { if(alertData.onConfirm) alertData.onConfirm(); setAlertData(null); }}>
            <div className="space-y-6">
              <p className="text-purple-800 font-bold text-center leading-relaxed whitespace-pre-wrap">{alertData?.message}</p>
              <button onClick={() => { if(alertData.onConfirm) alertData.onConfirm(); setAlertData(null); }} className="w-full bg-purple-600 hover:bg-purple-700 text-white font-black py-4 rounded-2xl shadow-lg">확인</button>
            </div>
          </Modal>

          <Modal isOpen={!!confirmData} title="확인이 필요합니다" icon={<i className="fa-solid fa-circle-question text-fuchsia-600"></i>} onClose={() => setConfirmData(null)}>
            <div className="space-y-6">
              <p className="text-purple-800 font-bold text-center leading-relaxed whitespace-pre-wrap">{confirmData?.message}</p>
              <div className="flex gap-4">
                <button onClick={() => { confirmData.onConfirm(); setConfirmData(null); }} className="flex-1 bg-purple-600 text-white font-black py-4 rounded-2xl shadow-lg">진행</button>
                <button onClick={() => setConfirmData(null)} className="flex-1 bg-purple-50 text-purple-700 font-black py-4 rounded-2xl border-2 border-purple-200">취소</button>
              </div>
            </div>
          </Modal>

          <Modal isOpen={!!promptData} title={promptData?.title} onClose={() => setPromptData(null)}>
            <div className="space-y-6">
              <p className="text-purple-700 font-bold text-sm text-center">{promptData?.message}</p>
              <input type="text" autoFocus className="w-full bg-purple-50 border-2 border-purple-200 rounded-2xl px-5 py-4 font-black text-lg text-center outline-none" value={promptData?.value} onChange={e => setPromptData({...promptData, value: e.target.value})} />
              <div className="flex gap-4">
                <button onClick={() => { promptData.onConfirm(promptData.value); setPromptData(null); }} className="flex-1 bg-purple-600 text-white font-black py-4 rounded-2xl">확인</button>
                <button onClick={() => setPromptData(null)} className="flex-1 bg-purple-50 text-purple-700 font-black py-4 rounded-2xl border-2 border-purple-200">취소</button>
              </div>
            </div>
          </Modal>

          <header className="sticky top-0 z-40 bg-white/90 backdrop-blur-xl border-b-2 border-purple-100 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center gap-8">
                <a href="#" onClick={(e) => { e.preventDefault(); setView('dashboard'); setIsMobileMenuOpen(false); }} className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-gradient-to-br from-purple-600 to-fuchsia-600 rounded-xl flex items-center justify-center shadow-lg"><i className="fa-solid fa-graduation-cap text-white text-lg"></i></div>
                  <span className="text-2xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-purple-800 to-fuchsia-700">HH 경제교실</span>
                </a>
                <nav className={`absolute top-16 left-0 w-full bg-white border-b-2 border-purple-100 md:static md:w-auto md:border-none md:bg-transparent flex-col md:flex-row md:flex ${isMobileMenuOpen ? 'flex' : 'hidden'}`}>
                  {[{ id: 'dashboard', label: '대시보드' }, { id: 'invest', label: '투자(주식)' }, { id: 'bank', label: '은행' }, { id: 'store', label: '상점/보관함' }].map((item) => (
                    <a key={item.id} href={`#${item.id}`} onClick={(e) => { e.preventDefault(); setView(item.id); setIsMobileMenuOpen(false); }}
                      className={`px-6 py-4 md:px-4 md:py-2.5 text-sm font-extrabold transition-all border-b md:border-none border-purple-50 md:rounded-xl ${view === item.id ? 'text-white bg-purple-600 shadow-md' : 'text-purple-700 hover:bg-purple-100'}`}>
                      {item.label}
                    </a>
                  ))}
                </nav>
              </div>
              <div className="flex items-center gap-4">
                <div className="text-right hidden sm:block"><p className="text-sm font-black text-purple-900">{myUser.name}</p><p className="text-xs font-bold text-purple-500">{myUser.role === 'admin' ? '선생님' : '학생'}</p></div>
                <button onClick={handleLogout} className="p-2.5 text-purple-400 hover:text-white bg-purple-50 hover:bg-rose-500 rounded-xl"><i className="fa-solid fa-arrow-right-from-bracket text-lg"></i></button>
                <button className="md:hidden p-2.5 text-purple-600 bg-purple-100 rounded-xl" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}><i className="fa-solid fa-bars text-lg"></i></button>
              </div>
            </div>
          </header>

          <main className="flex-1 max-w-7xl w-full mx-auto px-4 py-8 space-y-8">
            <div className="relative bg-gradient-to-br from-purple-700 via-purple-600 to-fuchsia-600 rounded-[2.5rem] p-8 sm:p-10 text-white shadow-2xl border-4 border-purple-500/30 overflow-hidden">
              <div className="absolute top-0 right-0 -mt-16 -mr-16 w-64 h-64 bg-white opacity-10 rounded-full blur-3xl"></div>
              <div className="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-8">
                <div>
                  <div className="flex items-center gap-4 mb-4">
                    <p className="text-2xl font-bold opacity-90">{myUser.name}의 자산</p>
                    {myUser.role === 'student' && <div className="flex items-center gap-2 bg-white/20 backdrop-blur-xl rounded-full px-4 py-1.5"><i className="fa-solid fa-trophy text-yellow-300"></i><span className="text-base font-extrabold">레벨 {myUser.level}</span></div>}
                  </div>
                  <h2 className="text-6xl sm:text-7xl font-black tracking-tighter mb-2 drop-shadow-xl">{formatMoney(myTotalAssets)}</h2>
                  <p className="text-purple-200 text-lg font-bold ml-1">총 자산 평가금액</p>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 w-full md:w-auto mt-6 md:mt-0">
                  {[{l:'현금', v:myUser.cash, i:'fa-wallet', bg:'bg-white/20'}, {l:'예금', v:myUser.deposit, i:'fa-piggy-bank', bg:'bg-white/10'}, {l:'증권 평가금', v:realStockValue, i:'fa-chart-line', bg:'bg-white/5'}].map(a => (
                    <div key={a.l} className="bg-white/10 backdrop-blur-xl border border-white/20 p-5 rounded-3xl min-w-[140px] shadow-xl">
                      <p className="text-sm font-extrabold text-purple-100 mb-3 flex items-center gap-2"><span className={`p-2 rounded-xl ${a.bg}`}><i className={`fa-solid ${a.i} text-white`}></i></span> {a.l}</p>
                      <p className="text-2xl font-black tracking-tight">{formatMoney(a.v)}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {view === 'dashboard' && <DashboardView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} showPrompt={showPrompt} />}
            {view === 'invest' && <InvestView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} onForceUpdateStocks={() => fetchAndStoreRealStocks(db, dbData.stocks, dbData.settings)} />}
            {view === 'bank' && <BankView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
            {view === 'store' && <StoreView assets={myUser} dbData={dbData} db={db} showAlert={showAlert} showConfirm={showConfirm} />}
          </main>
        </div>
      );
    }

    // ============================================================================
    // [7] 렌더링 부착 (React 18)
    // ============================================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
